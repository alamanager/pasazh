  rialSelect.innerHTML = `
    <option value="">ЩҶЩҲШ№ Ш§Ш¬Ш§ШұЩҮ: ЩҮЩ…ЩҮ</option>
    <option value="ЫҢЪ© ШұЫҢШ§Щ„ЫҢ" ${rialFilter==="ЫҢЪ© ШұЫҢШ§Щ„ЫҢ"?"selected":""}>ЫҢЪ© ШұЫҢШ§Щ„ЫҢ (Щ…Ш§Щ„Ъ© Ш№Щ„Ш§Ш§Щ„ШҜЫҢЩҶ)</option>
    <option value="ШҜЩҲ ШұЫҢШ§Щ„ЫҢ" ${rialFilter==="ШҜЩҲ ШұЫҢШ§Щ„ЫҢ"?"selected":""}>ШҜЩҲ ШұЫҢШ§Щ„ЫҢ (Щ…Ш§Щ„Ъ© ШәЫҢШұ Ш§ШІ Ш№Щ„Ш§Ш§Щ„ШҜЫҢЩҶ)</option>`;
  rialSelect.addEventListener("change", (e)=>{ rialFilter = e.target.value || null; renderMain(); });
  toolbar.appendChild(rialSelect);

  if(currentPasazhData.expirySettings.column){
    const expirySelect = document.createElement("select");
    expirySelect.className = "filter-select" + (expiryFilter ? " date-filter-active" : "");
    expirySelect.innerHTML = `
      <option value="">ЩҲШ¶Ш№ЫҢШӘ ЩӮШұШ§ШұШҜШ§ШҜ: ЩҮЩ…ЩҮ</option>
      <option value="expired" ${expiryFilter==="expired"?"selected":""}>Щ…ЩҶЩӮШ¶ЫҢвҖҢШҙШҜЩҮ</option>
      <option value="soon" ${expiryFilter==="soon"?"selected":""}>ЩҶШІШҜЫҢЪ© Ш§ЩҶЩӮШ¶Ш§</option>`;
    expirySelect.addEventListener("change", (e)=>{ expiryFilter = e.target.value || null; renderMain(); });
    toolbar.appendChild(expirySelect);
  }

  if(Object.keys(activeFilters).length || searchText || onlyUpdated || dateFilter || rialFilter){
    const clearBtn = document.createElement("button");
    clearBtn.className = "btn btn-outline small";
    clearBtn.textContent = "ЩҫШ§Ъ© Ъ©ШұШҜЩҶ ЩҒЫҢЩ„ШӘШұЩҮШ§";
    clearBtn.addEventListener("click", ()=>{ activeFilters = {}; searchText = ""; onlyUpdated = false; dateFilter = null; rialFilter = null; expiryFilter = null; renderMain(); });
    toolbar.appendChild(clearBtn);
  }

  const countSpan = document.createElement("span");
  countSpan.className = "result-count";
  countSpan.id = "resultCount";
  toolbar.appendChild(countSpan);
  main.appendChild(toolbar);

  // ---- Toolbar row 2: structure tools ----
  const toolbar2 = document.createElement("div");
  toolbar2.className = "toolbar";
  const editColsBtn = document.createElement("button");
  editColsBtn.className = "btn btn-outline small"; editColsBtn.textContent = "ЩҲЫҢШұШ§ЫҢШҙ ШіШӘЩҲЩҶвҖҢЩҮШ§";
  editColsBtn.addEventListener("click", openColumnEditor);
  const filterColsBtn = document.createElement("button");
  filterColsBtn.className = "btn btn-outline small"; filterColsBtn.textContent = "ШіШӘЩҲЩҶвҖҢЩҮШ§ЫҢ ЩҒЫҢЩ„ШӘШұ";
  filterColsBtn.addEventListener("click", openFilterColumnsEditor);
  const addRowBtn = document.createElement("button");
  addRowBtn.className = "btn btn-brass small"; addRowBtn.textContent = "+ ШұШҜЫҢЩҒ Ш¬ШҜЫҢШҜ";
  addRowBtn.addEventListener("click", addNewRow);
  const clearMarksBtn = document.createElement("button");
  clearMarksBtn.className = "btn btn-danger small"; clearMarksBtn.textContent = "ЩҫШ§Ъ©вҖҢЪ©ШұШҜЩҶ ШұЩҶЪҜвҖҢЩҮШ§ (ШҙШұЩҲШ№ Щ…Ш§ЩҮ Ш¬ШҜЫҢШҜ)";
  clearMarksBtn.title = "ЩҮЩ…ЩҮвҖҢЫҢ ЩҶШҙШ§ЩҶвҖҢЩҮШ§ЫҢ В«ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢвҖҢШҙШҜЩҮВ» Ш§ЫҢЩҶ ЩҫШ§ШіШ§Ъҳ (ЩҮЩ…ЩҮ Ш·ШЁЩӮШ§ШӘ) ЩҫШ§Ъ© Щ…ЫҢвҖҢШҙЩҮ";
  clearMarksBtn.addEventListener("click", clearAllUpdatedMarks);
  toolbar2.appendChild(editColsBtn);
  toolbar2.appendChild(filterColsBtn);
  toolbar2.appendChild(addRowBtn);
  const convertDigitsBtn = document.createElement("button");
  convertDigitsBtn.className = "btn btn-outline small"; convertDigitsBtn.textContent = "рҹ”Ө Ш§Ш№ШҜШ§ШҜ ЩҒШ§ШұШіЫҢ вҶ’ Ш§ЩҶЪҜЩ„ЫҢШіЫҢ (Ш§ЫҢЩҶ Ш·ШЁЩӮЩҮ)";
  convertDigitsBtn.addEventListener("click", convertDigitsThisFloor);
  toolbar2.appendChild(convertDigitsBtn);
  toolbar2.appendChild(clearMarksBtn);
  main.appendChild(toolbar2);

  const tableWrap = document.createElement("div");
  tableWrap.className = "table-wrap"; tableWrap.id = "tableWrap";
  main.appendChild(tableWrap);

  renderTableOnly();
}

let sortState = {};
let flashRowIdx = null;
function sortKey(){ return currentPasazhId + ":" + currentFloorIdx; }

function renderTableOnly(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  let rows = getFilteredRows(floor);
  const wrap = document.getElementById("tableWrap");
  const countEl = document.getElementById("resultCount");
  if(countEl) countEl.textContent = rows.length + " Ш§ШІ " + floor.rows.length + " ЩҲШ§ШӯШҜ";

  const statCards = document.getElementById("statCards");
  if(statCards){
    statCards.innerHTML = buildStatCardsHTML(floor);
    bindStatCardEvents();
  }

  const visibleCols = floor.columns.filter(c=> !(floor.hiddenColumns||[]).includes(c));
  const sort = sortState[sortKey()];
  if(sort){
    rows = [...rows].sort((a,b)=>{
      const va = String(a[sort.col]||""), vb = String(b[sort.col]||"");
      const da = parseFlexibleDate(va), db = parseFlexibleDate(vb);
      const na = parseFloat(normalizeDigits(va).replace(/,/g,"")), nb = parseFloat(normalizeDigits(vb).replace(/,/g,""));
      let cmp;
      if(da !== null && db !== null){ cmp = da - db; }
      else if(!isNaN(na) && !isNaN(nb) && va.trim()!=="" && vb.trim()!==""){ cmp = na - nb; }
      else { cmp = va.localeCompare(vb, "fa"); }
      return sort.dir === "asc" ? cmp : -cmp;
    });
  }

  let html = "<table><colgroup><col style='width:112px'>";
  visibleCols.forEach(c=> html += `<col data-col-width="${escapeHtml(c)}" style="width:${(floor.columnWidths&&floor.columnWidths[c])||140}px">`);
  html += "</colgroup><thead><tr><th></th>";
  visibleCols.forEach(c=>{
    const arrow = sort && sort.col===c ? (sort.dir==="asc" ? " в–І" : " в–ј") : "";
    html += `<th class="col-th" data-col="${escapeHtml(c)}" title="Ъ©Щ„ЫҢЪ© ШЁШұШ§ЫҢ Щ…ШұШӘШЁвҖҢШіШ§ШІЫҢ">${escapeHtml(c)}${arrow}<span class="col-resize-handle"></span></th>`;
  });
  html += "</tr></thead><tbody>";

  if(rows.length === 0){
    html += `<tr><td colspan="${visibleCols.length+1}" style="text-align:center;color:var(--slate-soft);padding:30px;">Щ…ЩҲШұШҜЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ</td></tr>`;
  } else {
    rows.forEach(r=>{
      const realIdx = floor.rows.indexOf(r);
      const isEditing = editingRowKey === realIdx;
      const styleParts = [];
      if(!isEditing && r.__updatedAt) styleParts.push("background:var(--updated-bg);border-inline-start:3px solid var(--brass);");
      if(r.__rowHeight) styleParts.push(`height:${r.__rowHeight}px;`);
      const rowStyle = styleParts.length ? ` style="${styleParts.join(" ")}"` : "";
      html += `<tr data-row-idx="${realIdx}"${rowStyle}>`;
      if(isEditing){
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="Ш°Ш®ЫҢШұЩҮ">рҹ’ҫ</button>
            <button class="row-action cancel-btn" data-act="cancel" title="Ш§ЩҶШөШұШ§ЩҒ">вң•</button>
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      } else {
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="ЩҲЫҢШұШ§ЫҢШҙ">вңҺ</button>
            <button class="row-action del-btn" data-act="del" title="ШӯШ°ЩҒ ШұШҜЫҢЩҒ">рҹ—‘</button>
            <button class="row-action edit-btn" data-act="attach" title="ЩҫЫҢЩҲШіШӘвҖҢЩҮШ§${r.__attachments&&r.__attachments.length?' ('+r.__attachments.length+')':''}">рҹ“Һ</button>
            ${r.__updatedAt ? `<button class="row-action clear-btn" data-act="clearmark" title="ЩҫШ§Ъ©вҖҢЪ©ШұШҜЩҶ ШұЩҶЪҜ Ш§ЫҢЩҶ ШұШҜЫҢЩҒ">рҹ§№</button>` : ""}
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      }
      visibleCols.forEach(c=>{
        const v = r[c] === undefined ? "" : r[c];
        if(isEditing){
          html += `<td><input type="text" class="cell-edit-input" data-col="${escapeHtml(c)}" value="${escapeHtml(v)}"></td>`;
        } else {
          const expiryCol = currentPasazhData.expirySettings.column;
          const expStatus = (expiryCol && c === expiryCol) ? getExpiryStatus(r, expiryCol) : null;
          const cls = expStatus === "expired" ? "tag tag-expired" : expStatus === "soon" ? "tag tag-expiring" : styleForValue(v);
          const clampStyle = r.__rowHeight ? ` style="display:block;max-height:${Math.max(16,r.__rowHeight-18)}px;overflow:hidden;"` : "";
          let inner = cls ? `<span class="${cls}">${escapeHtml(v)}</span>` : `<span class="cell-clamp-normal"${clampStyle}>${escapeHtml(v)}</span>`;
          if(looksLikeDate(v)){
            inner += `<button class="date-plus-btn" data-act="plusyear" data-col="${escapeHtml(c)}" title="ЫҢЪ© ШіШ§Щ„ Ш§Ш¶Ш§ЩҒЩҮ Ъ©ЩҶ">+ЫұШіШ§Щ„</button>`;
          }
          inner += `<span class="fill-handle" title="ШЁЪ©Шҙ ЩҫШ§ЫҢЫҢЩҶ ШЁШұШ§ЫҢ Ъ©ЩҫЫҢ Ш§ЫҢЩҶ Щ…ЩӮШҜШ§Шұ ШұЩҲЫҢ ШұШҜЫҢЩҒвҖҢЩҮШ§ЫҢ ШЁШ№ШҜЫҢ"></span>`;
          html += `<td data-col="${escapeHtml(c)}">${inner}</td>`;
        }
      });
      html += "</tr>";
    });
  }
  html += "</tbody></table>";
  wrap.innerHTML = html;

  if(flashRowIdx !== null){
    const tr = wrap.querySelector(`tr[data-row-idx="${flashRowIdx}"]`);
    if(tr) tr.classList.add("flash-update");
    flashRowIdx = null;
  }

  document.getElementById("onlyUpdatedChk")?.addEventListener("change",(e)=>{ onlyUpdated = e.target.checked; renderTableOnly(); });

  // enter/escape while editing a cell
  wrap.querySelectorAll(".cell-edit-input").forEach(inp=>{
    inp.addEventListener("keydown", (e)=>{
      const rowTr = inp.closest("tr");
      if(e.key === "Enter"){ e.preventDefault(); rowTr.querySelector('button[data-act="edit"]')?.click(); }
      else if(e.key === "Escape"){ e.preventDefault(); rowTr.querySelector('button[data-act="cancel"]')?.click(); }
    });
  });

  attachFillHandles(wrap, "tr[data-row-idx]",
    (tr)=> floor.rows[parseInt(tr.dataset.rowIdx, 10)],
    ()=> renderTableOnly());

  // header click to sort (ignore clicks on the resize handle)
  wrap.querySelectorAll("th.col-th").forEach(th=>{
    th.addEventListener("click", (e)=>{
      if(e.target.classList.contains("col-resize-handle")) return;
      const col = th.dataset.col;
      const key = sortKey();
      const cur = sortState[key];
      if(cur && cur.col === col) sortState[key] = cur.dir === "asc" ? {col, dir:"desc"} : null;
      else sortState[key] = {col, dir:"asc"};
      renderTableOnly();
    });
  });

  // drag-to-resize columns
  wrap.querySelectorAll("th.col-th").forEach(th=>{
    const handle = th.querySelector(".col-resize-handle");
    const col = th.dataset.col;
    handle.addEventListener("click", (e)=> e.stopPropagation());
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const startX = e.clientX;
      const startWidth = (floor.columnWidths && floor.columnWidths[col]) || th.offsetWidth;
      const colEl = wrap.querySelector(`col[data-col-width="${CSS.escape(col)}"]`);
      function onMove(ev){
        const delta = ev.clientX - startX;
        const newWidth = Math.max(50, Math.round(startWidth + delta));
        if(colEl) colEl.style.width = newWidth + "px";
        floor.columnWidths[col] = newWidth;
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  // drag-to-resize row heights
  wrap.querySelectorAll(".row-resize-handle").forEach(handle=>{
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const tr = handle.closest("tr[data-row-idx]");
      const realIdx = parseInt(tr.dataset.rowIdx, 10);
      const r = floor.rows[realIdx];
      const startY = e.clientY;
      const startHeight = tr.offsetHeight;
      function onMove(ev){
        const delta = ev.clientY - startY;
        const newHeight = Math.max(32, Math.round(startHeight + delta));
        tr.style.height = newHeight + "px";
        r.__rowHeight = newHeight;
        tr.querySelectorAll(".cell-clamp-normal").forEach(el=>{
          el.style.display = "block";
          el.style.overflow = "hidden";
          el.style.maxHeight = Math.max(16, newHeight-18) + "px";
        });
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  wrap.onclick = (e)=>{
    const actBtn = e.target.closest("[data-act]");
    if(actBtn){
      const tr = actBtn.closest("tr[data-row-idx]");
      const realIdx = parseInt(tr.dataset.rowIdx, 10);
      const act = actBtn.dataset.act;

      if(act === "edit"){
        if(editingRowKey === realIdx){
          const inputs = tr.querySelectorAll(".cell-edit-input");
          inputs.forEach(inp=>{ floor.rows[realIdx][inp.dataset.col] = inp.value; });
          floor.rows[realIdx].__updatedAt = new Date().toISOString();
          editingRowKey = null;
          markDirty();
          flashRowIdx = realIdx;
        } else {
          editingRowKey = realIdx;
        }
        renderTableOnly();
      } else if(act === "cancel"){
        editingRowKey = null;
        renderTableOnly();
      } else if(act === "del"){
        if(confirm("Ш§ЫҢЩҶ ШұШҜЫҢЩҒ ШӯШ°ЩҒ ШЁШҙЩҮШҹ")){
          floor.rows.splice(realIdx,1);
          markDirty(); renderFloorRail(); renderTableOnly();
        }
      } else if(act === "plusyear"){
        const col = actBtn.dataset.col;
        floor.rows[realIdx][col] = bumpYear(floor.rows[realIdx][col]);
        floor.rows[realIdx].__updatedAt = new Date().toISOString();
        markDirty(); flashRowIdx = realIdx; renderTableOnly();
      } else if(act === "clearmark"){
        delete floor.rows[realIdx].__updatedAt;
        markDirty(); renderTableOnly();
      } else if(act === "attach"){
        openAttachmentsModal(floor.rows[realIdx], ()=> renderTableOnly());
      }
      return;
    }

    const zoomTd = e.target.closest("td[data-col]");
    if(zoomTd){
      const col = zoomTd.dataset.col;
      const tr = zoomTd.closest("tr[data-row-idx]");
      const realIdx = parseInt(tr.dataset.rowIdx, 10);
      openCellZoomModal(col, floor.rows[realIdx][col] || "", (val)=>{
        floor.rows[realIdx][col] = val;
        floor.rows[realIdx].__updatedAt = new Date().toISOString();
        markDirty();
        flashRowIdx = realIdx;
        renderTableOnly();
      });
    }
  };
}

function addNewRow(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  const newRow = {};
  floor.columns.forEach(c=> newRow[c] = "");
  newRow.__updatedAt = new Date().toISOString();
  floor.rows.push(newRow);
  editingRowKey = floor.rows.length - 1;
  flashRowIdx = floor.rows.length - 1;
  markDirty(); renderFloorRail(); renderTableOnly();
}

function clearAllUpdatedMarks(){
  if(!currentPasazhData) return;
  if(!confirm("ЩҮЩ…ЩҮвҖҢЫҢ ЩҶШҙШ§ЩҶвҖҢЩҮШ§ЫҢ В«ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢвҖҢШҙШҜЩҮВ» Ш§ЫҢЩҶ ЩҫШ§ШіШ§Ъҳ (ЩҮЩ…ЩҮвҖҢЫҢ Ш·ШЁЩӮШ§ШӘ) ЩҫШ§Ъ© ШЁШҙЩҮШҹ Ш§ЫҢЩҶ Ъ©Ш§Шұ ШЁШұШ§ЫҢ ШҙШұЩҲШ№ ШҜЩҲШұЩҮвҖҢЫҢ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ Щ…Ш§ЩҮ ШЁШ№ШҜЩҮ.")) return;
  currentPasazhData.floors.forEach(f=> f.rows.forEach(r=> delete r.__updatedAt));
  markDirty();
  if(currentFloorIdx === "ALL") renderAllTableOnly(); else renderTableOnly();
  showToast("ЩҶШҙШ§ЩҶвҖҢЩҮШ§ЫҢ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ ЩҫШ§Ъ© ШҙШҜЩҶШҜ", "ok");
}

function convertDigitsInRows(rows){
  let changed = 0;
  rows.forEach(r=>{
    Object.keys(r).forEach(k=>{
      if(k.startsWith("__")) return;
      const v = r[k];
      if(typeof v !== "string") return;
      const norm = normalizeDigits(v);
      if(norm !== v){ r[k] = norm; changed++; }
    });
  });
  return changed;
}
function convertDigitsThisFloor(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  if(!floor) return;
  if(!confirm(`ЩҮЩ…ЩҮвҖҢЫҢ Ш§Ш№ШҜШ§ШҜ ЩҒШ§ШұШіЫҢ/Ш№ШұШЁЫҢ ШӘЩҲЫҢ Ш·ШЁЩӮЩҮвҖҢЫҢ В«${floor.name}В» ШЁЩҮ Ш§ЩҶЪҜЩ„ЫҢШіЫҢ ШӘШЁШҜЫҢЩ„ ШЁШҙЩҶШҹ`)) return;
  const changed = convertDigitsInRows(floor.rows);
  markDirty(); renderTableOnly();
  showToast(changed ? `${changed} Щ…ЩӮШҜШ§Шұ ШӘШЁШҜЫҢЩ„ ШҙШҜ` : "ЪҶЫҢШІЫҢ ШЁШұШ§ЫҢ ШӘШЁШҜЫҢЩ„ ЩҫЫҢШҜШ§ ЩҶШҙШҜ", "ok");
}
function convertDigitsAllFloors(){
  if(!currentPasazhData) return;
  if(!confirm("ЩҮЩ…ЩҮвҖҢЫҢ Ш§Ш№ШҜШ§ШҜ ЩҒШ§ШұШіЫҢ/Ш№ШұШЁЫҢ ШӘЩҲЫҢ Ъ©Щ„ Ш·ШЁЩӮШ§ШӘ Ш§ЫҢЩҶ ЩҫШ§ШіШ§Ъҳ ШЁЩҮ Ш§ЩҶЪҜЩ„ЫҢШіЫҢ ШӘШЁШҜЫҢЩ„ ШЁШҙЩҶШҹ")) return;
  let changed = 0;
  currentPasazhData.floors.forEach(f=> changed += convertDigitsInRows(f.rows));
  markDirty(); renderAllTableOnly();
  showToast(changed ? `${changed} Щ…ЩӮШҜШ§Шұ ШӘШЁШҜЫҢЩ„ ШҙШҜ` : "ЪҶЫҢШІЫҢ ШЁШұШ§ЫҢ ШӘШЁШҜЫҢЩ„ ЩҫЫҢШҜШ§ ЩҶШҙШҜ", "ok");
}

/* ================= COLUMN STRUCTURE EDITOR ================= */
function openColumnEditor(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  render();

  function render(){
    let html = `<h3>ЩҲЫҢШұШ§ЫҢШҙ ШіШӘЩҲЩҶвҖҢЩҮШ§ЫҢ В«${escapeHtml(floor.name)}В»</h3>
      <p class="hint">ШӘШұШӘЫҢШЁШҢ Ш№ЩҶЩҲШ§ЩҶШҢ Ш№ШұШ¶ (ЩҫЫҢЪ©ШіЩ„) ЩҲ ЩҶЩ…Ш§ЫҢШҙ ЩҮШұ ШіШӘЩҲЩҶ ШұЩҲ ШӘШәЫҢЫҢШұ ШЁШҜЩҮ. ШӘШәЫҢЫҢШұШ§ШӘ ЩҮШұ ШұШҜЫҢЩҒ ШЁШ№ШҜ Ш§ШІ ШІШҜЩҶ В«Ш«ШЁШӘ ШӘШәЫҢЫҢШұШ§ШӘВ» Ш§Ш№Щ…Ш§Щ„ Щ…ЫҢвҖҢШҙЩҮ.</p>
      <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:10px; padding:10px; background:var(--paper-2); border-radius:8px;">
        <div style="flex:1;"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px;">Ш№ШұШ¶ ЩҮЩ…ЩҮвҖҢЫҢ ШіШӘЩҲЩҶвҖҢЩҮШ§ (px)</label><input type="number" id="bulkColWidth" placeholder="Щ…Ш«Щ„Ш§ 140" min="40" max="600"></div>
        <button class="btn btn-outline small" id="applyBulkWidth">Ш§Ш№Щ…Ш§Щ„ ШЁЩҮ ЩҮЩ…ЩҮ</button>
      </div>
      <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:14px; padding:10px; background:var(--paper-2); border-radius:8px;">
        <div style="flex:1;"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px;">Ш§ШұШӘЩҒШ§Ш№ ЩҮЩ…ЩҮвҖҢЫҢ ШұШҜЫҢЩҒвҖҢЩҮШ§ЫҢ Ш§ЫҢЩҶ Ш·ШЁЩӮЩҮ (px)</label><input type="number" id="bulkRowHeight" placeholder="Щ…Ш«Щ„Ш§ 44" min="32" max="400"></div>
        <button class="btn btn-outline small" id="applyBulkHeight">Ш§Ш№Щ…Ш§Щ„ ШЁЩҮ ЩҮЩ…ЩҮ</button>
      </div>
      <div id="colEditList">`;
    floor.columns.forEach((col, idx)=>{
      const hidden = (floor.hiddenColumns||[]).includes(col);
      const width = (floor.columnWidths && floor.columnWidths[col]) || 140;
      html += `
        <div class="col-edit-row" data-idx="${idx}">
          <button class="btn btn-outline small" data-act="up">в–І</button>
          <button class="btn btn-outline small" data-act="down">в–ј</button>
          <input type="text" class="col-name-input" value="${escapeHtml(col)}">
          <input type="number" class="col-width-input" value="${width}" min="40" max="600">
          <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" class="col-hide-input" ${hidden?'':'checked'}> ЩҶЩ…Ш§ЫҢШҙ</label>
          <button class="btn btn-danger small" data-act="del">ШӯШ°ЩҒ</button>
        </div>`;
    });
    html += `</div>
      <div class="field" style="margin-top:14px;">
        <label>Ш§ЩҒШІЩҲШҜЩҶ ШіШӘЩҲЩҶ Ш¬ШҜЫҢШҜ</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="newColName" placeholder="ЩҶШ§Щ… ШіШӘЩҲЩҶ Ш¬ШҜЫҢШҜ">
          <button class="btn btn-brass" id="addColBtn">Ш§ЩҒШІЩҲШҜЩҶ</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-brass" id="saveColEdits">Ш«ШЁШӘ ШӘШәЫҢЫҢШұШ§ШӘ</button>
        <button class="btn btn-outline" onclick="window.__closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button>
      </div>`;
    openModal(html);

    document.getElementById("applyBulkWidth").addEventListener("click", ()=>{
      const val = parseInt(document.getElementById("bulkColWidth").value, 10);
      if(!val || val < 40){ showToast("ЫҢЩҮ Ш№ШҜШҜ Щ…Ш№ШӘШЁШұ ШЁШұШ§ЫҢ Ш№ШұШ¶ ЩҲШ§ШұШҜ Ъ©ЩҶ", "err"); return; }
      document.querySelectorAll("#colEditList .col-width-input").forEach(inp=> inp.value = val);
      showToast("Ш№ШұШ¶ ЩҮЩ…ЩҮвҖҢЫҢ ШіШӘЩҲЩҶвҖҢЩҮШ§ ШӘЩҶШёЫҢЩ… ШҙШҜШӣ ШЁШұШ§ЫҢ Ш°Ш®ЫҢШұЩҮ В«Ш«ШЁШӘ ШӘШәЫҢЫҢШұШ§ШӘВ» ШұЩҲ ШЁШІЩҶ", "ok");
    });
    document.getElementById("applyBulkHeight").addEventListener("click", ()=>{
      const val = parseInt(document.getElementById("bulkRowHeight").value, 10);
      if(!val || val < 32){ showToast("ЫҢЩҮ Ш№ШҜШҜ Щ…Ш№ШӘШЁШұ ШЁШұШ§ЫҢ Ш§ШұШӘЩҒШ§Ш№ ЩҲШ§ШұШҜ Ъ©ЩҶ", "err"); return; }
      floor.rows.forEach(r=> r.__rowHeight = val);
      markDirty();
      renderTableOnly();
      showToast("Ш§ШұШӘЩҒШ§Ш№ ЩҮЩ…ЩҮвҖҢЫҢ ШұШҜЫҢЩҒвҖҢЩҮШ§ ШӘЩҶШёЫҢЩ… ШҙШҜ", "ok");
    });

    document.getElementById("addColBtn").addEventListener("click", ()=>{
      const name = document.getElementById("newColName").value.trim();
      if(!name) return;
      if(floor.columns.includes(name)){ showToast("Ш§ЫҢЩҶ ШіШӘЩҲЩҶ Ш§ШІ ЩӮШЁЩ„ ЩҮШіШӘ","err"); return; }
      floor.columns.push(name);
      floor.columnWidths[name] = 140;
      floor.rows.forEach(r=> r[name] = "");
      markDirty();
      render();
    });

    document.getElementById("colEditList").addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-act]");
      if(!btn) return;
      const rowEl = btn.closest(".col-edit-row");
      const idx = parseInt(rowEl.dataset.idx, 10);
      const act = btn.dataset.act;
      if(act === "up" && idx > 0){
        [floor.columns[idx-1], floor.columns[idx]] = [floor.columns[idx], floor.columns[idx-1]];
        markDirty(); render();
      } else if(act === "down" && idx < floor.columns.length-1){
        [floor.columns[idx+1], floor.columns[idx]] = [floor.columns[idx], floor.columns[idx+1]];
        markDirty(); render();
      } else if(act === "del"){
        const col = floor.columns[idx];
        if(!confirm(`ШіШӘЩҲЩҶ В«${col}В» ШӯШ°ЩҒ ШЁШҙЩҮШҹ ШҜШ§ШҜЩҮвҖҢЩҮШ§ЫҢ Ш§ЫҢЩҶ ШіШӘЩҲЩҶ Ш§ШІ ЩҮЩ…ЩҮвҖҢЫҢ ШұШҜЫҢЩҒвҖҢЩҮШ§ ЩҫШ§Ъ© Щ…ЫҢвҖҢШҙЩҮ.`)) return;
        floor.columns.splice(idx,1);
        delete floor.columnWidths[col];
        floor.hiddenColumns = (floor.hiddenColumns||[]).filter(c=>c!==col);
        floor.filterColumns = (floor.filterColumns||[]).filter(c=>c!==col);
        floor.rows.forEach(r=> delete r[col]);
        markDirty(); render();
      }
    });

    document.getElementById("saveColEdits").addEventListener("click", ()=>{
      const rowsEls = document.querySelectorAll("#colEditList .col-edit-row");
      const renameMap = {};
      rowsEls.forEach(rowEl=>{
        const idx = parseInt(rowEl.dataset.idx, 10);
        const oldName = floor.columns[idx];
        const newName = rowEl.querySelector(".col-name-input").value.trim() || oldName;
        const width = parseInt(rowEl.querySelector(".col-width-input").value, 10) || 140;
        const visible = rowEl.querySelector(".col-hide-input").checked;
        if(newName !== oldName) renameMap[oldName] = newName;
        floor.columnWidths[newName] = width;
        if(oldName !== newName) delete floor.columnWidths[oldName];
        floor.hiddenColumns = floor.hiddenColumns || [];
        if(!visible){ if(!floor.hiddenColumns.includes(newName)) floor.hiddenColumns.push(newName); }
        else { floor.hiddenColumns = floor.hiddenColumns.filter(c=>c!==newName && c!==oldName); }
      });
      floor.columns = floor.columns.map(c=> renameMap[c] || c);
      floor.filterColumns = (floor.filterColumns||[]).map(c=> renameMap[c] || c);
      floor.rows.forEach(r=>{
        Object.keys(renameMap).forEach(oldName=>{
          if(oldName in r){ r[renameMap[oldName]] = r[oldName]; if(renameMap[oldName] !== oldName) delete r[oldName]; }
        });
      });
      markDirty();
      closeModal();
      renderFloorRail();
      renderMain();
      showToast("ШіШӘЩҲЩҶвҖҢЩҮШ§ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ ШҙШҜЩҶШҜ", "ok");
    });
  }
}

function openFilterColumnsEditor(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  floor.filterColumns = floor.filterColumns || [];
  let html = `<h3>ШіШӘЩҲЩҶвҖҢЩҮШ§ЫҢ ЩҒЫҢЩ„ШӘШұ</h3><p class="hint">Щ…ШҙШ®Шө Ъ©ЩҶ Ъ©ШҜЩҲЩ… ШіШӘЩҲЩҶвҖҢЩҮШ§ЫҢ Ш§ЫҢЩҶ Ш·ШЁЩӮЩҮ ШЁШ§Щ„Ш§ЫҢ Ш¬ШҜЩҲЩ„ ШЁЩҮвҖҢШөЩҲШұШӘ ЩҒЫҢЩ„ШӘШұ (Ъ©ШҙЩҲЫҢЫҢ) ЩҶШҙЩҲЩҶ ШҜШ§ШҜЩҮ ШЁШҙЩҶ.</p><div style="max-height:340px;overflow:auto;">`;
  floor.columns.forEach(col=>{
    const checked = floor.filterColumns.includes(col);
    html += `<label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;"><input type="checkbox" class="filtercol-check" value="${escapeHtml(col)}" ${checked?'checked':''}> ${escapeHtml(col)}</label>`;
  });
  html += `</div><div class="modal-actions"><button class="btn btn-brass" id="saveFilterCols">Ш«ШЁШӘ</button><button class="btn btn-outline" onclick="window.__closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button></div>`;
  openModal(html);
  document.getElementById("saveFilterCols").addEventListener("click", ()=>{
    floor.filterColumns = Array.from(document.querySelectorAll(".filtercol-check:checked")).map(el=>el.value);
    markDirty(); closeModal(); renderMain();
  });
}

/* ================= PASAZH SWITCH / ADD ================= */
async function switchToPasazh(id){
  setLoading(true, "ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҫШ§ШіШ§Ъҳ...");
  try{
    currentPasazhId = id;
    currentFloorIdx = 0; activeFilters = {}; searchText = ""; onlyUpdated = false; dateFilter = null; rialFilter = null; expiryFilter = null; editingRowKey = null;
    currentPasazhData = await loadPasazhData(id);
    renderPasazhSelect(); renderUpdateChip(); renderFloorRail(); renderMain();
  }catch(e){
    showToast("Ш®Ш·Ш§ ШҜШұ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҫШ§ШіШ§Ъҳ", "err");
  }finally{
    setLoading(false);
  }
}
document.getElementById("pasazhSelect").addEventListener("change", (e)=>{ if(e.target.value) switchToPasazh(e.target.value); });

document.getElementById("moreMenuBtn").addEventListener("click", openMoreMenuModal);

function renamePasazhAction(){
  if(!currentPasazhData){ showToast("Ш§ЩҲЩ„ ЫҢЪ© ЩҫШ§ШіШ§Ъҳ ШұЩҲ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶ", "err"); return; }
  const val = prompt("ЩҶШ§Щ… Ш¬ШҜЫҢШҜ ЩҫШ§ШіШ§Ъҳ:", currentPasazhData.name);
  if(val && val.trim()){
    currentPasazhData.name = val.trim();
    const idxEntry = pasazhIndex.find(p=>p.id===currentPasazhId);
    if(idxEntry) idxEntry.name = val.trim();
    markDirty();
    renderPasazhSelect();
    showToast("ЩҶШ§Щ… ЩҫШ§ШіШ§Ъҳ ШӘШәЫҢЫҢШұ Ъ©ШұШҜ", "ok");
  }
}

function deletePasazhAction(){
  if(!currentPasazhData){ showToast("Ш§ЩҲЩ„ ЫҢЪ© ЩҫШ§ШіШ§Ъҳ ШұЩҲ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶ", "err"); return; }
  if(!confirm(`ЩҫШ§ШіШ§Ъҳ В«${currentPasazhData.name}В» ШЁШ§ ЩҮЩ…ЩҮвҖҢЫҢ Ш·ШЁЩӮШ§ШӘ ЩҲ Ш§Ш·Щ„Ш§Ш№Ш§ШӘШҙ Ъ©Ш§Щ…Щ„Ш§ЩӢ ШӯШ°ЩҒ ШЁШҙЩҮШҹ Ш§ЫҢЩҶ Ъ©Ш§Шұ ШәЫҢШұЩӮШ§ШЁЩ„вҖҢШЁШұЪҜШҙШӘЩҮ.`)) return;
  const idToDelete = currentPasazhId;
  pasazhIndex = pasazhIndex.filter(p=>p.id !== idToDelete);
  delete pasazhData[idToDelete];
  markDirty();
  if(pasazhIndex.length){
    switchToPasazh(pasazhIndex[0].id);
  } else {
    currentPasazhId = null;
    currentPasazhData = null;
    renderPasazhSelect();
    renderUpdateChip();
    renderFloorRail();
    renderMain();
  }
  showToast("ЩҫШ§ШіШ§Ъҳ ШӯШ°ЩҒ ШҙШҜ", "ok");
}

document.getElementById("chipEditLabel").addEventListener("click", ()=>{
  if(!currentPasazhData) return;
  const val = prompt("ШЁШұЪҶШіШЁ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ Ш¬ШҜЫҢШҜ:", currentPasazhData.lastUpdateLabel || "");
  if(val !== null){ currentPasazhData.lastUpdateLabel = val.trim(); markDirty(); renderUpdateChip(); }
});

document.getElementById("addPasazhBtn").addEventListener("click", ()=>{
  openModal(`
    <h3>Ш§ЩҒШІЩҲШҜЩҶ ЩҫШ§ШіШ§Ъҳ Ш¬ШҜЫҢШҜ</h3>
    <p class="hint">Ш§ШіЩ… ЩҫШ§ШіШ§Ъҳ ШұЩҲ ЩҲШ§ШұШҜ Ъ©ЩҶШҢ ШЁШ№ШҜ ЩҒШ§ЫҢЩ„ Ш§Ъ©ШіЩ„Шҙ ШұЩҲ ЩҲШ§ШұШҜ Щ…ЫҢвҖҢЪ©ЩҶЫҢЩ… (ЫҢШ§ ШҜШіШӘЫҢ Ш·ШЁЩӮЩҮ/ШіШӘЩҲЩҶ Ш§Ш¶Ш§ЩҒЩҮ Ъ©ЩҶ).</p>
    <div class="field"><label>ЩҶШ§Щ… ЩҫШ§ШіШ§Ъҳ</label><input type="text" id="newPasazhName" placeholder="Щ…Ш«Щ„Ш§: Ш№Щ„Ш§Ш§Щ„ШҜЫҢЩҶ ЫҢЪ©"></div>
    <div class="modal-actions">
      <button class="btn btn-brass" id="confirmAddPasazh">ШіШ§Ш®ШӘ ЩҫШ§ШіШ§Ъҳ</button>
      <button class="btn btn-outline" onclick="window.__closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button>
    </div>`);
  document.getElementById("confirmAddPasazh").addEventListener("click", async ()=>{
    const name = document.getElementById("newPasazhName").value.trim();
    if(!name){ showToast("Ш§ШіЩ… ЩҫШ§ШіШ§Ъҳ ШұЩҲ ЩҲШ§ШұШҜ Ъ©ЩҶ", "err"); return; }
    const id = slugify(name);
    try{
      await savePasazhData(id, {name, lastUpdateLabel:"", lastUpdateDate:"", floors:[]});
      pasazhIndex.push({id, name});
      await saveIndex();
      closeModal();
      await switchToPasazh(id);
      showToast('ЩҫШ§ШіШ§Ъҳ "' + name + '" ШіШ§Ш®ШӘЩҮ ШҙШҜ.', "ok");
    }catch(e){
      showToast("Ш®Ш·Ш§ ШҜШұ ШіШ§Ш®ШӘ ЩҫШ§ШіШ§Ъҳ", "err");
    }
  });
});

/* ================= IMPORT EXCEL ================= */
document.getElementById("importExcelBtn").addEventListener("click", ()=> document.getElementById("excelFileInput").click());
document.getElementById("excelFileInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0]; e.target.value = "";
  if(!file) return;
  setLoading(true, "ШҜШұ ШӯШ§Щ„ Ш®ЩҲШ§ЩҶШҜЩҶ ЩҒШ§ЫҢЩ„ Ш§Ъ©ШіЩ„...");
  let floors;
  try{
    if(typeof XLSX === "undefined") throw new Error("Ъ©ШӘШ§ШЁШ®Ш§ЩҶЩҮвҖҢЫҢ Ш§Ъ©ШіЩ„ ЩҮЩҶЩҲШІ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҶШҙШҜЩҮШӣ Ш§ЫҢЩҶШӘШұЩҶШӘШӘ ШұЩҲ ЪҶЪ© Ъ©ЩҶ ЩҲ ШҜЩҲШЁШ§ШұЩҮ ШӘЩ„Ш§Шҙ Ъ©ЩҶ");
    const buf = await file.arrayBuffer();
    floors = parseWorkbook(buf);
    if(floors.length === 0) throw new Error("ЩҮЫҢЪҶ Ш·ШЁЩӮЩҮ/ШҙЫҢШӘЫҢ ШЁШ§ ШҜШ§ШҜЩҮвҖҢЫҢ ЩӮШ§ШЁЩ„вҖҢШӘШҙШ®ЫҢШө ШӘЩҲ Ш§ЫҢЩҶ ЩҒШ§ЫҢЩ„ ЩҫЫҢШҜШ§ ЩҶШҙШҜ");
  }catch(err){
    setLoading(false);
    showToast("ЩҒШ§ЫҢЩ„ Ш§Ъ©ШіЩ„ ЩӮШ§ШЁЩ„ Ш®ЩҲШ§ЩҶШҜЩҶ ЩҶШЁЩҲШҜ: " + (err && err.message ? err.message : "Ш®Ш·Ш§ЫҢ ЩҶШ§Щ…ШҙШ®Шө"), "err");
    return;
  }
  setLoading(false);

  const totalRows = floors.reduce((s,f)=>s+f.rows.length,0);
  const floorList = floors.map(f=>`${f.name} (${f.rows.length} ЩҲШ§ШӯШҜ)`).join("ШҢ ");
  const options = pasazhIndex.map(p=>`<option value="${p.id}" ${p.id===currentPasazhId?'selected':''}>${escapeHtml(p.name)}</option>`).join("");

  openModal(`
    <h3>ЩҲШ§ШұШҜ Ъ©ШұШҜЩҶ Ш§Ъ©ШіЩ„</h3>
    <p class="hint">${floors.length} Ш·ШЁЩӮЩҮ ЩҲ ${totalRows} ЩҲШ§ШӯШҜ ЩҫЫҢШҜШ§ ШҙШҜ: ${escapeHtml(floorList)}</p>
    <div class="field">
      <label>Ш§ЫҢЩҶ Ш§Ш·Щ„Ш§Ш№Ш§ШӘ Щ…ШұШЁЩҲШ· ШЁЩҮ Ъ©ШҜЩҲЩ… ЩҫШ§ШіШ§ЪҳЩҮШҹ</label>
      <select id="importTargetSelect">${options}<option value="__new__">+ ШіШ§Ш®ШӘ ЩҫШ§ШіШ§Ъҳ Ш¬ШҜЫҢШҜ ШЁШ§ Ш§ЫҢЩҶ Ш§Ъ©ШіЩ„</option></select>
    </div>
    <div class="field" id="newNameField" style="display:${pasazhIndex.length? 'none':'block'}">
      <label>ЩҶШ§Щ… ЩҫШ§ШіШ§Ъҳ Ш¬ШҜЫҢШҜ</label>
      <input type="text" id="importNewName" placeholder="Щ…Ш«Щ„Ш§: Ш№Щ„Ш§Ш§Щ„ШҜЫҢЩҶ ЫҢЪ©">
    </div>
    <div class="field">

        name = existing ? existing.name : "ЩҫШ§ШіШ§Ъҳ";
      }

      let data = await loadPasazhData(targetId);

/* ================= EXPORT / IMPORT SHARED JSON FILE (+ optional online sync) ================= */
async function buildBackupObject(){
  const all = {exportedAt: new Date().toISOString(), pasazhIndex, pasazhData: {}};
  for(const p of pasazhIndex){ all.pasazhData[p.id] = await loadPasazhData(p.id); }
  return all;
}

async function applyBackupObject(parsed){
  if(!parsed || !parsed.pasazhIndex || !parsed.pasazhData) throw new Error("bad format");
  for(const p of parsed.pasazhIndex){
    const data = parsed.pasazhData[p.id];
    if(data) await savePasazhData(p.id, normalizePasazh(data));
    const existing = pasazhIndex.find(x=>x.id===p.id);
    if(existing) Object.assign(existing, p);
    else pasazhIndex.push(p);
  }
  await saveIndex();
}

async function exportJsonBackup(){
  setLoading(true, "ШҜШұ ШӯШ§Щ„ ШўЩ…Ш§ШҜЩҮвҖҢШіШ§ШІЫҢ ЩҒШ§ЫҢЩ„...");
  try{
    const all = await buildBackupObject();
    const blob = new Blob([JSON.stringify(all, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "backup-pasazh-" + fmtDateToday() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);

  }catch(e){

}

/* ---- Online sync (Cloudflare Pages Function + KV) with real per-user login ---- */
const SYNC_API = "/api/data";
const AUTH_TOKEN_KEY = "pasazh-manager-auth-token";
const AUTH_INFO_KEY = "pasazh-manager-auth-info";
let authToken = null;
let authInfo = null; // {username, role, allowedPasazhIds}

function loadAuthFromStorage(){
  try{
    authToken = localStorage.getItem(AUTH_TOKEN_KEY) || null;
    const raw = localStorage.getItem(AUTH_INFO_KEY);
    authInfo = raw ? JSON.parse(raw) : null;
  }catch(e){ authToken = null; authInfo = null; }
}
function saveAuthToStorage(){
  try{
    if(authToken) localStorage.setItem(AUTH_TOKEN_KEY, authToken); else localStorage.removeItem(AUTH_TOKEN_KEY);
    if(authInfo) localStorage.setItem(AUTH_INFO_KEY, JSON.stringify(authInfo)); else localStorage.removeItem(AUTH_INFO_KEY);
  }catch(e){}
}
function isLoggedIn(){ return !!authToken; }
function authHeaders(){
  return authToken ? { "Authorization": "Bearer " + authToken } : {};
}
function logout(){
  authToken = null; authInfo = null; saveAuthToStorage();
  stopAutoSync(); autoSyncEnabled = false;
  try{ localStorage.setItem(AUTO_SYNC_KEY, "0"); }catch(e){}
  showToast("Ш§ШІ ШӯШіШ§ШЁ Ш®Ш§ШұШ¬ ШҙШҜЫҢ", "ok");
}

/* ---- Auto-sync: near-real-time background pull/push (polling-based) ---- */
const AUTO_SYNC_KEY = "pasazh-manager-autosync";
let autoSyncEnabled = false;
let lastServerSnapshot = null;
let autoPushTimer = null;
let autoPullInterval = null;

function isEditingActive(){
  return editingRowKey !== null || editingAllRowRef !== null || document.getElementById("overlay")?.classList.contains("open");
}

async function silentPull(){
  if(!autoSyncEnabled || !isLoggedIn()) return;
  try{
    const res = await fetch(SYNC_API, { headers: authHeaders() });
    if(res.status === 401){ authToken=null; authInfo=null; saveAuthToStorage(); stopAutoSync(); return; }
    if(!res.ok) return;
    const text = await res.text();
    if(text === lastServerSnapshot) return; // nothing new
    if(isEditingActive()) return; // don't yank the table out from under an active edit; try again next tick
    let parsed;
    try{ parsed = JSON.parse(text); }catch(e){ return; }
    if(!parsed){ lastServerSnapshot = text; return; }
    await applyBackupObject(parsed);
    lastServerSnapshot = text;
    markClean();
    renderPasazhSelect(); renderUpdateChip(); renderFloorRail();
    if(currentPasazhData){ if(currentFloorIdx === "ALL") renderAllTableOnly(); else renderTableOnly(); }
    else renderMain();
    showToast("ЫҢЩҮ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ Ш¬ШҜЫҢШҜ Ш§ШІ ЫҢЪ©ЫҢ ШҜЫҢЪҜЩҮ ШҜШұЫҢШ§ЩҒШӘ ШҙШҜ", "ok");
  }catch(e){ /* silent вҖ” will retry next tick */ }
}

async function silentPush(){
  if(!autoSyncEnabled || !isLoggedIn()) return;
  try{
    const all = await buildBackupObject();
    const bodyStr = JSON.stringify(all);
    const res = await fetch(SYNC_API, {
      method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
      body: bodyStr
    });
    if(res.status === 401){ authToken=null; authInfo=null; saveAuthToStorage(); stopAutoSync(); return; }
    if(res.ok){ lastServerSnapshot = bodyStr; markClean(); }
  }catch(e){ /* silent вҖ” will retry on next edit */ }
}

function scheduleAutoPush(){
  if(!autoSyncEnabled || !isLoggedIn()) return;
  clearTimeout(autoPushTimer);
  autoPushTimer = setTimeout(silentPush, 3500);
}

function startAutoSync(){
  stopAutoSync();
  if(!autoSyncEnabled || !isLoggedIn()) return;
  autoPullInterval = setInterval(silentPull, 10000);
  silentPull();
}
function stopAutoSync(){
  if(autoPullInterval) clearInterval(autoPullInterval);
  autoPullInterval = null;
  clearTimeout(autoPushTimer);
}

  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{ logout(); closeModal(); openSyncSettingsModal(); });
  const manageBtn = document.getElementById("manageUsersBtn");
  if(manageBtn) manageBtn.addEventListener("click", ()=>{ closeModal(); openUserManagementModal(); });

async function openUserManagementModal(){
  openModal(`<h3>Щ…ШҜЫҢШұЫҢШӘ Ъ©Ш§ШұШЁШұШ§ЩҶ</h3><p class="hint">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</p>`);

    const res = await fetch("/api/users", { headers: authHeaders() });
    const users = await res.json();
    if(!res.ok) throw new Error(users.error || "Ш®Ш·Ш§ ШҜШұ ШҜШұЫҢШ§ЩҒШӘ Щ„ЫҢШіШӘ Ъ©Ш§ШұШЁШұШ§ЩҶ");

function renderUserManagementList(users){

  users.forEach(u=>{
    const allowedNames = (u.allowedPasazhIds||[]).map(id=>{
      const p = pasazhIndex.find(x=>x.id===id);
      return p ? p.name : id;
    }).join("ШҢ ") || "вҖ”";
    html += `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);">
      <div style="min-width:0;">
        <b>${escapeHtml(u.username)}</b> <span style="font-size:11px;color:var(--slate-soft);">(${u.role==='admin'?'Щ…ШҜЫҢШұ Ъ©Щ„':'Ъ©Ш§ШұШЁШұ Щ…ШӯШҜЩҲШҜ'})</span>
        <div style="font-size:11.5px;color:var(--slate-soft);">${u.role==='admin' ? 'ШҜШіШӘШұШіЫҢ ШЁЩҮ ЩҮЩ…ЩҮвҖҢЫҢ ЩҫШ§ШіШ§ЪҳЩҮШ§' : 'ШҜШіШӘШұШіЫҢ: '+escapeHtml(allowedNames)}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-outline small" data-act="edituser" data-username="${escapeHtml(u.username)}">ЩҲЫҢШұШ§ЫҢШҙ</button>
        <button class="btn btn-danger small" data-act="deluser" data-username="${escapeHtml(u.username)}">ШӯШ°ЩҒ</button>
      </div>
    </div>`;
  });
  html += `</div>
    <div class="modal-actions"><button class="btn btn-brass" id="addUserBtn">+ Ъ©Ш§ШұШЁШұ Ш¬ШҜЫҢШҜ</button><button class="btn btn-outline" onclick="window.__closeModal()">ШЁШіШӘЩҶ</button></div>`;
  openModal(html);

  document.getElementById("addUserBtn").addEventListener("click", ()=> openUserEditModal(null));
  document.querySelectorAll('[data-act="edituser"]').forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const u = users.find(x=>x.username===btn.dataset.username);
      openUserEditModal(u);
    });
  });
  document.querySelectorAll('[data-act="deluser"]').forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm(`Ъ©Ш§ШұШЁШұ В«${btn.dataset.username}В» ШӯШ°ЩҒ ШЁШҙЩҮШҹ`)) return;
      try{
        const res = await fetch("/api/users", {
          method: "POST",
          headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
          body: JSON.stringify({ action: "delete", username: btn.dataset.username })
        });
        if(!res.ok) throw new Error();
        showToast("Ъ©Ш§ШұШЁШұ ШӯШ°ЩҒ ШҙШҜ", "ok");
        openUserManagementModal();
      }catch(e){ showToast("Ш®Ш·Ш§ ШҜШұ ШӯШ°ЩҒ Ъ©Ш§ШұШЁШұ", "err"); }
    });
  });
}

  openModal(`
    <h3>${isNew ? "Ъ©Ш§ШұШЁШұ Ш¬ШҜЫҢШҜ" : "ЩҲЫҢШұШ§ЫҢШҙ Ъ©Ш§ШұШЁШұ"}</h3>
    <div class="field"><label>ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ</label><input type="text" id="userUsernameInput" value="${user?escapeHtml(user.username):''}" ${isNew?'':'readonly'}></div>
    <div class="field"><label>ШұЩ…ШІ Ш№ШЁЩҲШұ ${isNew?'':'(Ш§ЪҜЩҮ Ш®Ш§Щ„ЫҢ ШЁШ°Ш§ШұЫҢШҢ ШӘШәЫҢЫҢШұ ЩҶЩ…ЫҢвҖҢЪ©ЩҶЩҮ)'}</label><input type="password" id="userPasswordInput" placeholder="${isNew?'ШұЩ…ШІ Ш№ШЁЩҲШұ':'ШұЩ…ШІ Ш¬ШҜЫҢШҜ (Ш§Ш®ШӘЫҢШ§ШұЫҢ)'}"></div>
    <div class="field"><label>ЩҶЩӮШҙ</label>
      <select id="userRoleSelect">
        <option value="user" ${user&&user.role==='user'?'selected':''}>Ъ©Ш§ШұШЁШұ Щ…ШӯШҜЩҲШҜ (ЩҒЩӮШ· ЩҫШ§ШіШ§ЪҳЩҮШ§ЫҢ Ш§ЩҶШӘШ®Ш§ШЁЫҢ)</option>
        <option value="admin" ${user&&user.role==='admin'?'selected':''}>Щ…ШҜЫҢШұ Ъ©Щ„ (ШҜШіШӘШұШіЫҢ ШЁЩҮ ЩҮЩ…ЩҮ)</option>
      </select>
    </div>
    <div class="field"><label>ШҜШіШӘШұШіЫҢ ШЁЩҮ ЩҫШ§ШіШ§ЪҳЩҮШ§ (ЩҒЩӮШ· ШЁШұШ§ЫҢ Ъ©Ш§ШұШЁШұ Щ…ШӯШҜЩҲШҜ)</label><div id="userPasazhList" style="max-height:220px;overflow:auto;">${pasazhChecks || '<p class="hint">ЩҮЩҶЩҲШІ ЩҫШ§ШіШ§ЪҳЫҢ ЩҶШіШ§Ш®ШӘЫҢ.</p>'}</div></div>
    <div class="modal-actions">
      <button class="btn btn-brass" id="saveUserBtn">Ш°Ш®ЫҢШұЩҮ</button>
      <button class="btn btn-outline" onclick="window.__closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button>
    </div>`);
  document.getElementById("saveUserBtn").addEventListener("click", async ()=>{
    const username = document.getElementById("userUsernameInput").value.trim();
    const password = document.getElementById("userPasswordInput").value;
    const role = document.getElementById("userRoleSelect").value;
    const allowedPasazhIds = Array.from(document.querySelectorAll(".user-pasazh-check:checked")).map(el=>el.value);
    if(!username){ showToast("ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ Щ„Ш§ШІЩ…ЩҮ", "err"); return; }
    if(isNew && !password){ showToast("ШЁШұШ§ЫҢ Ъ©Ш§ШұШЁШұ Ш¬ШҜЫҢШҜ ШұЩ…ШІ Щ„Ш§ШІЩ…ЩҮ", "err"); return; }
    try{
      const payload = { username, role, allowedPasazhIds };
      if(password) payload.password = password;
      const res = await fetch("/api/users", {
        method: "POST",
        headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "Ш®Ш·Ш§");
      showToast("Ш°Ш®ЫҢШұЩҮ ШҙШҜ", "ok");
      openUserManagementModal();
    }catch(e){ showToast("Ш®Ш·Ш§: " + e.message, "err"); }
  });
}

/* ================= EXCEL EXPORT (styled, RTL, floor or whole pasazh) ================= */
const XLSX_TITLE_STYLE = {
  font:{ bold:true, sz:13, color:{rgb:"FFFFFF"}, name:"Tahoma" },
  fill:{ fgColor:{rgb:"1B2430"} },
  alignment:{ horizontal:"center", vertical:"center" }
};
const XLSX_HEADER_STYLE = {
  font:{ bold:true, color:{rgb:"FFFFFF"}, sz:11.5, name:"Tahoma" },
  fill:{ fgColor:{rgb:"2B3140"} },
  alignment:{ horizontal:"center", vertical:"center", wrapText:true },
  border:{
    top:{style:"thin", color:{rgb:"B98D3E"}}, bottom:{style:"medium", color:{rgb:"B98D3E"}},
    left:{style:"thin", color:{rgb:"B98D3E"}}, right:{style:"thin", color:{rgb:"B98D3E"}}
  }
};
const XLSX_BORDER_THIN = {
  top:{style:"thin", color:{rgb:"E3DDCC"}}, bottom:{style:"thin", color:{rgb:"E3DDCC"}},
  left:{style:"thin", color:{rgb:"E3DDCC"}}, right:{style:"thin", color:{rgb:"E3DDCC"}}
};
const XLSX_CELL_STYLE = {
  font:{ name:"Tahoma", sz:10.5 },
  alignment:{ horizontal:"center", vertical:"center", wrapText:true },
  border: XLSX_BORDER_THIN
};
const XLSX_CELL_STYLE_ALT = Object.assign({}, XLSX_CELL_STYLE, { fill:{ fgColor:{rgb:"F7F4EE"} } });
const XLSX_CELL_STYLE_UPDATED = Object.assign({}, XLSX_CELL_STYLE, { fill:{ fgColor:{rgb:"FBE0A0"} }, font:{ name:"Tahoma", sz:10.5, bold:true } });

function computeContentWidthFromRows(rows, col){
  let maxLen = col.length;
  rows.forEach(r=>{
    const len = String(r[col] === undefined ? "" : r[col]).length;
    if(len > maxLen) maxLen = len;
  });
  const wch = maxLen > 22 ? 22 : maxLen + 3;
  return Math.max(7, Math.min(26, wch));
}

function buildStyledSheetGeneric(headerCols, dataRows, updatedFlags, titleText, widths){
  const titleRow = new Array(Math.max(headerCols.length,1)).fill("");
  titleRow[0] = titleText;
  const aoa = [titleRow, headerCols, ...dataRows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  const titleAddr = XLSX.utils.encode_cell({r:0, c:0});
  if(ws[titleAddr]) ws[titleAddr].s = XLSX_TITLE_STYLE;
  if(headerCols.length > 1){
    ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0, c:headerCols.length-1} }];
  }
  headerCols.forEach((c, ci)=>{
    const addr = XLSX.utils.encode_cell({r:1, c:ci});
    if(ws[addr]) ws[addr].s = XLSX_HEADER_STYLE;
  });
  dataRows.forEach((row, ri)=>{
    const isUpdatedRow = !!updatedFlags[ri];
    headerCols.forEach((c, ci)=>{
      const addr = XLSX.utils.encode_cell({r: ri+2, c:ci});
      if(ws[addr]) ws[addr].s = isUpdatedRow ? XLSX_CELL_STYLE_UPDATED : ((ri % 2 === 0) ? XLSX_CELL_STYLE : XLSX_CELL_STYLE_ALT);
    });
  });

  ws['!cols'] = widths;
  ws['!rows'] = [{ hpt: 24 }, { hpt: 30 }];
  if(headerCols.length){
    const lastCol = XLSX.utils.encode_col(headerCols.length-1);
    ws['!autofilter'] = { ref: `A2:${lastCol}${aoa.length}` };
  }
  return ws;
}

function buildStyledSheet(floor, titleText){
  const visibleCols = floor.columns.filter(c=> !(floor.hiddenColumns||[]).includes(c));
  const dataRows = floor.rows.map(r=> visibleCols.map(c=> r[c]===undefined?"":r[c]));
  const updatedFlags = floor.rows.map(r=> !!r.__updatedAt);
  const widths = visibleCols.map(c=> ({ wch: computeContentWidthFromRows(floor.rows, c) }));
  return buildStyledSheetGeneric(visibleCols, dataRows, updatedFlags, titleText, widths);
}

function buildStyledSheetFilteredFloor(floor, titleText){
  const visibleCols = floor.columns.filter(c=> !(floor.hiddenColumns||[]).includes(c));
  const rows = getFilteredRows(floor);
  const dataRows = rows.map(r=> visibleCols.map(c=> r[c]===undefined?"":r[c]));
  const updatedFlags = rows.map(r=> !!r.__updatedAt);
  const widths = visibleCols.map(c=> ({ wch: computeContentWidthFromRows(rows, c) }));
  return buildStyledSheetGeneric(visibleCols, dataRows, updatedFlags, titleText, widths);
}

function buildStyledSheetFilteredAll(titleText){
  const cfg = getAllViewConfig();
  const unionCols = getUnionColumns();
  const visibleCols = unionCols.filter(c=> !(cfg.hiddenColumns||[]).includes(c));
  const entries = getFilteredAllEntries();
  const headerCols = ["Ш·ШЁЩӮЩҮ", ...visibleCols];
  const dataRows = entries.map(e=> [currentPasazhData.floors[e.floorIdx].name, ...visibleCols.map(c=> e.row[c]===undefined?"":e.row[c])]);
  const updatedFlags = entries.map(e=> !!e.row.__updatedAt);
  const plainRows = entries.map(e=> e.row);
  const widths = [{wch:14}, ...visibleCols.map(c=> ({ wch: computeContentWidthFromRows(plainRows, c) }))];
  return buildStyledSheetGeneric(headerCols, dataRows, updatedFlags, titleText, widths);
}

function makeRtlWorkbook(){
  const wb = XLSX.utils.book_new();
  wb.Workbook = { Views: [{ RTL: true }] };
  return wb;
}
function safeSheetName(name){
  return (name || "Sheet").replace(/[\\\/\?\*\[\]:]/g, " ").slice(0,31);
}
function sheetTitleFor(floor){
  const updateInfo = currentPasazhData.lastUpdateLabel || currentPasazhData.lastUpdateDate || "вҖ”";
  return `${currentPasazhData.name}   |   ${floor.name}   |   ШўШ®ШұЫҢЩҶ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ: ${updateInfo}`;
}

/* ---- Image helpers (resize before upload to keep KV entries small) ---- */
function resizeImageToDataUrl(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function fileToDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function loadAndRenderMapImage(floor){
  try{
    const res = await fetch("/api/file?key=" + encodeURIComponent(floor.mapImageKey), { headers: authHeaders() });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Ш®Ш·Ш§ ШҜШұ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Ш№Ъ©Ші");
    const img = document.getElementById("floorMapImg");
    if(!img) return;
    img.onload = ()=> renderMapPins(floor);
    img.src = data.dataUrl;
    const wrap = document.getElementById("floorMapImgWrap");
    wrap.addEventListener("click", (e)=>{
      if(e.target.closest(".map-pin")) return;
      const rect = wrap.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      openAddPinModal(floor, x, y);
    });

    showToast("Ш®Ш·Ш§ ШҜШұ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Ш№Ъ©Ші ЩҶЩӮШҙЩҮ: " + e.message, "err");

    dot.style.left = pin.x + "%";
    dot.style.top = pin.y + "%";

    dot.addEventListener("click", (e)=>{
      e.stopPropagation();
      const row = floor.rows[pin.rowIndex];

      closeModal();

      currentFloorIdx = floorIdx;
      flashRowIdx = pin.rowIndex;
      renderFloorRail(); renderMain();
    });
    dot.addEventListener("contextmenu", (e)=>{
      e.preventDefault(); e.stopPropagation();
      if(!confirm("Ш§ЫҢЩҶ ЩҫЫҢЩҶ ШӯШ°ЩҒ ШЁШҙЩҮШҹ")) return;

}

    btn.addEventListener("click", ()=>{

      row.__attachments.splice(idx,1);
      markDirty();
      renderAttachmentsModal(row, onChange);
      if(onChange) onChange();
    });
  });

/* ---- Monthly Jalali snapshot (best-effort: triggered when an admin opens the app) ---- */
async function maybeCreateMonthlyBackup(){
  if(!isLoggedIn() || !authInfo || authInfo.role !== "admin") return;
  try{
    const now = new Date();
    const [jy, jm] = gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
    const monthKey = jy + "-" + String(jm).padStart(2,"0");
    await fetch("/api/monthly-backup", {
      method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
      body: JSON.stringify({ jalaliMonthKey: monthKey })
    });
  }catch(e){ /* silent вҖ” will just retry next time the app opens */ }
}

    const results = [];

      const data = pasazhData[pIdx.id];
      if(!data) return;
      (data.floors||[]).forEach(floor=>{
        floor.rows.forEach(row=>{
          const hit = floor.columns.some(c=> String(row[c]||"").toLowerCase().includes(q));
          if(hit) results.push({ pasazhId: pIdx.id, pasazhName: data.name, floorName: floor.name, row, columns: floor.columns });
          if(results.length >= 80) return;
        });
      });
    });
    if(results.length === 0){ resultsBox.innerHTML = '<p class="hint">ЪҶЫҢШІЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ</p>'; return; }

      const preview = r.columns.slice(0,3).map(c=> r.row[c]).filter(v=>v && v!=="*").join(" вҖ” ");
      return `<div class="global-search-item" data-idx="${i}">

      </div>`;
    }).join("");
    resultsBox.querySelectorAll(".global-search-item").forEach(el=>{
      el.addEventListener("click", async ()=>{
        const r = results[parseInt(el.dataset.idx,10)];
        closeModal();
        setLoading(true, "ШҜШұ ШӯШ§Щ„ ШұЩҒШӘЩҶ ШЁЩҮ ЩҲШ§ШӯШҜ...");
        await switchToPasazh(r.pasazhId);
        const floorIdx = currentPasazhData.floors.findIndex(f=> f.name === r.floorName);
        if(floorIdx >= 0){
          currentFloorIdx = floorIdx;
          flashRowIdx = currentPasazhData.floors[floorIdx].rows.indexOf(r.row);
          renderFloorRail(); renderMain();
        }
        setLoading(false);
      });
    });
  });

  openModal(`<h3>Щ„Ш§ЪҜ ШӘШәЫҢЫҢШұШ§ШӘ</h3><p class="hint">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</p>`);
  try{
    const res = await fetch("/api/auditlog", { headers: authHeaders() });
    const log = await res.json();
    if(!res.ok) throw new Error(log.error || "Ш®Ш·Ш§ ШҜШұ ШҜШұЫҢШ§ЩҒШӘ Щ„Ш§ЪҜ");

      return;
    }
    const rows = log.slice().reverse().map(e=>{
      const d = new Date(e.ts);
      const when = d.toLocaleString("fa-IR");
      return `<div style="padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px;">
        <b>${escapeHtml(e.username)}</b> <span style="color:var(--slate-soft);">(${e.role==='admin'?'Щ…ШҜЫҢШұ Ъ©Щ„':'Ъ©Ш§ШұШЁШұ Щ…ШӯШҜЩҲШҜ'})</span>
        вҖ” ${escapeHtml((e.pasazhNames||[]).join('ШҢ ') || 'вҖ”')}
        <div style="color:var(--slate-soft);font-size:11px;">${when}</div>
      </div>`;
    }).join("");
    openModal(`<h3>Щ„Ш§ЪҜ ШӘШәЫҢЫҢШұШ§ШӘ</h3><p class="hint">ШўШ®ШұЫҢЩҶ ${log.length} ШӘШәЫҢЫҢШұ (ЩҒЩӮШ· ШЁШұШ§ЫҢ Щ…ШҜЫҢШұ Ъ©Щ„ ЩӮШ§ШЁЩ„ Щ…ШҙШ§ЩҮШҜЩҮвҖҢШіШӘ).</p>
      <div style="max-height:380px;overflow:auto;">${rows}</div>
      <div class="modal-actions"><button class="btn btn-outline" onclick="window.__closeModal()">ШЁШіШӘЩҶ</button></div>`);

  }

/* ================= THEME (light/dark) ================= */
const THEME_KEY = "pasazh-manager-theme";
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("themeToggleBtn");
  if(btn) btn.textContent = theme === "dark" ? "вҳҖпёҸ" : "рҹҢҷ";
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}
document.getElementById("themeToggleBtn").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(cur === "dark" ? "light" : "dark");
});

/* ================= INIT ================= */
function showSplashCredit(){
  const el = document.getElementById("splashCredit");
  if(!el) return;
  requestAnimationFrame(()=> el.classList.add("show"));
  setTimeout(()=>{
    el.classList.remove("show");
    setTimeout(()=> el.remove(), 600);
  }, 2200);
}

function attachFillHandles(wrap, rowSelector, getRowObj, rerender){
  wrap.querySelectorAll(".fill-handle").forEach(handle=>{
    handle.addEventListener("click", (e)=> e.stopPropagation());
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      const td = handle.closest("td[data-col]");
      const col = td.dataset.col;
      const startTr = td.closest(rowSelector);
      if(!startTr) return;
      const startObj = getRowObj(startTr);
      const value = startObj[col] || "";
      let dragRows = [startTr];
      startTr.classList.add("fill-preview-row");

      function onMove(ev){
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        const tr = el ? el.closest(rowSelector) : null;
        if(!tr || !wrap.contains(tr)) return;
        const allTrs = Array.from(wrap.querySelectorAll(rowSelector));
        const startIdx = allTrs.indexOf(startTr);
        const curIdx = allTrs.indexOf(tr);
        if(startIdx === -1 || curIdx === -1) return;
        const a = Math.min(startIdx, curIdx), b = Math.max(startIdx, curIdx);
        allTrs.forEach((t,i)=> t.classList.toggle("fill-preview-row", i>=a && i<=b));
        dragRows = allTrs.slice(a, b+1);
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        if(dragRows.length > 1){
          const now = new Date().toISOString();
          dragRows.forEach(tr=>{
            const obj = getRowObj(tr);
            obj[col] = value;
            obj.__updatedAt = now;
          });
          markDirty();
          showToast(`Щ…ЩӮШҜШ§Шұ ШұЩҲЫҢ ${dragRows.length} ШұШҜЫҢЩҒ Ъ©ЩҫЫҢ ШҙШҜ`, "ok");
          rerender();
        } else {
          wrap.querySelectorAll(".fill-preview-row").forEach(t=> t.classList.remove("fill-preview-row"));
        }
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}

function openCellZoomModal(colLabel, value, onSave){
  renderView();

  function renderView(){
    openModal(`
      <h3>${escapeHtml(colLabel)}</h3>
      <div class="cell-zoom-body">${value ? escapeHtml(value) : '<span style="color:var(--slate-soft)">(Ш®Ш§Щ„ЫҢ)</span>'}</div>
      <div class="modal-actions">
        ${onSave ? '<button class="btn btn-brass" id="cellZoomEditBtn">ЩҲЫҢШұШ§ЫҢШҙ</button>' : ''}
        <button class="btn btn-outline" onclick="window.__closeModal()">ШЁШіШӘЩҶ</button>
      </div>
    `);
    if(onSave){
      document.getElementById("cellZoomEditBtn").addEventListener("click", renderEdit);
    }
  }

  function renderEdit(){
    openModal(`
      <h3>${escapeHtml(colLabel)}</h3>
      <textarea id="cellZoomInput" class="cell-zoom-input" rows="5">${escapeHtml(value||"")}</textarea>
      <div class="modal-actions">
        <button class="btn btn-brass" id="cellZoomSave">Ш°Ш®ЫҢШұЩҮ</button>
        <button class="btn btn-outline" id="cellZoomCancel">Ш§ЩҶШөШұШ§ЩҒ</button>
      </div>
    `);
    const input = document.getElementById("cellZoomInput");
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
    document.getElementById("cellZoomSave").addEventListener("click", ()=>{
      onSave(input.value);
      closeModal();
    });
    document.getElementById("cellZoomCancel").addEventListener("click", renderView);
    input.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && (e.ctrlKey || e.metaKey)){ e.preventDefault(); document.getElementById("cellZoomSave").click(); }
      else if(e.key === "Escape"){ e.preventDefault(); renderView(); }
    });
  }
}

function init(){
  let savedTheme = "light";
  try{ savedTheme = localStorage.getItem(THEME_KEY) || "light"; }catch(e){}
  applyTheme(savedTheme);

  try{ autoSyncEnabled = localStorage.getItem(AUTO_SYNC_KEY) === "1"; }catch(e){ autoSyncEnabled = false; }
  loadAuthFromStorage();

  const restored = loadLocalIfAny();
  renderPasazhSelect();
  if(restored){
    switchToPasazh(pasazhIndex[0].id);
  } else {
    renderMain();
  }
  showSplashCredit();
  if(autoSyncEnabled) startAutoSync();
  if(isLoggedIn()) maybeCreateMonthlyBackup();
}
init();
})();
