<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر ثبت واحدها | مدیریت پاساژ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!--
  توجه درباره‌ی آفلاین بودن:
  همه‌ی داده‌ها و منطق این برنامه کاملاً محلی هستن و به هیچ سروری وصل نمی‌شن.
  فقط خط پایین (کتابخونه‌ی خواندن/نوشتن اکسل) از اینترنت لود می‌شه، چون
  حجمش زیاده و نمی‌شه مستقیم داخل همین فایل نوشتش.

  اگه می‌خواید این صفحه حتی بار اولی که باز می‌شه هم به اینترنت نیاز نداشته باشه:
  1) یک‌بار (با اینترنت) این آدرس رو باز کنید و فایل رو ذخیره کنید:
     https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js
  2) فایل دانلود شده رو با اسم "xlsx.bundle.js" کنار همین فایل HTML
     (تو همون پوشه‌ی فایل‌سرور) بذارید.
  3) خط زیر رو به این تغییر بدید:
     <script src="xlsx.bundle.js"></script>
  از این به بعد دیگه هیچ‌وقت به اینترنت نیاز نداره، حتی بار اول.
-->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root{
    --ink:#1B2430; --ink-2:#242F3E;
    --paper:#F7F4EE; --paper-2:#EFEAE0;
    --brass:#B98D3E; --brass-light:#D9B876;
    --slate:#2B3140; --slate-soft:#6B7180;
    --settled:#4C7A5B; --settled-bg:#E6EEE8;
    --debt:#B24C4C; --debt-bg:#F5E6E6;
    --updated-bg:#FBE0A0;
    --line:#DCD5C4; --radius:12px;
    --card-bg:#fff; --input-bg:#fff;
    --row-alt:#FCFAF5; --row-hover:#FBF9F4; --row-alt-hover:#FBF6EA;
  }
  html[data-theme="dark"]{
    --ink:#0F1319; --ink-2:#161C25;
    --paper:#171B21; --paper-2:#20252D;
    --brass:#C79A4B; --brass-light:#E0B979;
    --slate:#E7E3D8; --slate-soft:#93A0AC;
    --settled:#7FBF95; --settled-bg:#20342A;
    --debt:#E68686; --debt-bg:#3A2426;
    --updated-bg:#4A3A16;
    --line:#333B45;
    --card-bg:#20252D; --input-bg:#262C35;
    --row-alt:#252B34; --row-hover:#282F39; --row-alt-hover:#2B333E;
  }
  html[data-theme="dark"] body{ background:var(--paper); }
  button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; border-radius:4px; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ font-family:'Vazirmatn', Tahoma, 'Segoe UI', Arial, sans-serif; background:var(--paper); color:var(--slate); min-height:100vh; transition:background-color .25s ease, color .25s ease; animation:pageIn .4s ease-out; }
  @keyframes pageIn{ from{opacity:0;} to{opacity:1;} }
  ::-webkit-scrollbar{height:10px;width:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .topbar{ background:linear-gradient(155deg, var(--ink), var(--ink-2)); color:#fff; padding:14px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:50; box-shadow:0 3px 16px rgba(0,0,0,.22); }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; margin-left:8px; }
  .brand .mark{ width:30px;height:30px;border-radius:8px; background:linear-gradient(155deg, var(--brass-light), var(--brass)); display:flex;align-items:center;justify-content:center; color:var(--ink); font-weight:800; font-size:14px; box-shadow:0 2px 8px rgba(185,141,62,.4); }
  select, input[type=text], input[type=number], input[type=date]{ font-family:inherit; background:var(--input-bg); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px; color:var(--slate); outline:none; transition:border-color .15s, box-shadow .15s, background-color .2s; }
  select:focus, input:focus{ border-color:var(--brass); box-shadow:0 0 0 3px rgba(185,141,62,.18); }
  .topbar select{ min-width:170px; }
  .pasazh-picker{ display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:10px; padding:2px 4px 2px 10px; transition:background-color .15s, border-color .15s; }
  .pasazh-picker:hover{ background:rgba(255,255,255,.13); border-color:rgba(217,184,118,.4); }
  .pasazh-picker-icon{ font-size:14px; opacity:.85; }
  .pasazh-picker select{ background:transparent; border:none; color:#fff; font-weight:700; padding:8px 4px; min-width:150px; }
  .pasazh-picker select:focus{ box-shadow:none; }
  .pasazh-picker select option{ color:var(--slate); background:var(--card-bg); font-weight:500; }
  .btn{ border:none; border-radius:9px; padding:9px 15px; font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; transition:transform .12s ease, box-shadow .12s ease, background-color .15s ease, color .15s ease, border-color .15s ease; }
  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:scale(.97) translateY(0); }
  .btn-brass{ background:linear-gradient(155deg, var(--brass-light), var(--brass)); color:#fff; box-shadow:0 2px 8px rgba(185,141,62,.35); }
  .btn-brass:hover{ box-shadow:0 4px 14px rgba(185,141,62,.5); }
  .btn-ghost{ background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.22); }
  .btn-ghost:hover{ background:rgba(255,255,255,.16); }
  .btn-outline{ background:var(--card-bg); color:var(--slate); border:1px solid var(--line); }
  .btn-outline:hover{ border-color:var(--brass); color:var(--brass); box-shadow:0 2px 8px rgba(185,141,62,.15); }
  .btn-danger{ background:var(--debt-bg); color:var(--debt); }
  .btn-danger:hover{ box-shadow:0 2px 8px rgba(178,76,76,.25); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none !important; }
  .btn.small{ padding:5px 9px; font-size:12px; }
  .spacer{ flex:1; }
  .update-chip{ display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); padding:6px 12px; border-radius:999px; font-size:12.5px; color:#EAE3D3; transition:background-color .2s; }
  .update-chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--brass-light); box-shadow:0 0 0 3px rgba(217,184,118,.25); }
  .mini-btn{ border:none; background:rgba(255,255,255,.15); color:#fff; border-radius:6px; padding:2px 7px; font-size:11px; cursor:pointer; transition:background-color .15s; }
  .mini-btn:hover{ background:rgba(255,255,255,.28); }

  .menu-grid-label{ font-size:11px; font-weight:700; color:var(--slate-soft); margin:16px 2px 7px; letter-spacing:.4px; }
  .menu-grid-label:first-child{ margin-top:0; }
  .menu-tiles{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .menu-tile{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; background:var(--paper-2); border:1px solid var(--line); border-radius:12px; padding:16px 10px; cursor:pointer; font-family:inherit; font-size:12.5px; color:var(--slate); font-weight:600; text-align:center; transition:transform .15s, box-shadow .15s, border-color .15s, background-color .15s; }
  .menu-tile:hover{ transform:translateY(-3px); box-shadow:0 10px 22px rgba(185,141,62,.2); border-color:var(--brass); background:var(--card-bg); }
  .menu-tile:active{ transform:translateY(-1px) scale(.98); }
  .menu-tile-icon{ font-size:23px; line-height:1; }
  .menu-tile.danger{ color:var(--debt); }
  .menu-tile.danger:hover{ border-color:var(--debt); box-shadow:0 10px 22px rgba(178,76,76,.2); background:var(--debt-bg); }

  .layout{ display:flex; align-items:flex-start; min-height:calc(100vh - 64px); }
  .floor-rail{ width:180px; flex-shrink:0; padding:20px 10px; display:flex; flex-direction:column; gap:6px; position:sticky; top:64px; max-height:calc(100vh - 64px); overflow-y:auto; }
  .floor-tab{ background:var(--paper-2); border:1px solid var(--line); border-left:none; border-radius:10px 0 0 10px; padding:9px 12px; font-size:13px; font-weight:600; cursor:pointer; color:var(--slate-soft); text-align:right; margin-left:-1px; display:flex; align-items:center; justify-content:space-between; gap:6px; transition:background-color .15s, box-shadow .15s, color .15s, transform .1s; }
  .floor-tab:hover{ transform:translateX(-2px); }
  .floor-tab .floor-main{ min-width:0; }
  .floor-tab .count{ font-weight:400; font-size:11px; opacity:.7; display:block; margin-top:2px; }
  .floor-tab.active{ background:var(--paper); color:var(--ink); border-color:var(--brass); box-shadow:-3px 0 0 var(--brass) inset, 0 2px 8px rgba(0,0,0,.05); }
  .floor-icon-btn{ border:none; background:transparent; cursor:pointer; font-size:12px; opacity:.55; padding:2px; transition:opacity .15s, transform .15s; }
  .floor-icon-btn:hover{ opacity:1; transform:scale(1.15); }
  .floor-tab.all-floors-tab{ background:var(--paper-2); font-weight:700; border-bottom:2px solid var(--line); margin-bottom:4px; }
  .floor-tab.all-floors-tab.active{ box-shadow:-3px 0 0 var(--brass) inset, 0 2px 8px rgba(0,0,0,.05); }
  .add-floor-btn{ margin-top:6px; border:1px dashed var(--line); background:transparent; color:var(--slate-soft); border-radius:8px; padding:8px; font-size:12.5px; cursor:pointer; transition:border-color .15s, color .15s; }
  .add-floor-btn:hover{ border-color:var(--brass); color:var(--brass); }
  .main{ flex:1; min-width:0; padding:22px 24px 40px; }

  .stat-cards{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; margin-bottom:10px; }
  .stat-card{ background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); padding:11px 18px; min-width:110px; box-shadow:0 1px 4px rgba(27,36,48,.04); animation:fadeInRow .3s ease both; transition:background-color .2s, transform .15s, box-shadow .15s; }
  .stat-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(27,36,48,.1); }
  .stat-card .num{ font-size:19px; font-weight:800; color:var(--ink); display:block; font-variant-numeric:tabular-nums; }
  .stat-card .lbl{ font-size:11.5px; color:var(--slate-soft); }
  .stat-card.debt .num{ color:var(--debt); }
  .stat-card.settled .num{ color:var(--settled); }
  .stat-card.updated .num{ color:var(--brass); }
  .stat-group{ background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); padding:8px 14px; box-shadow:0 1px 4px rgba(27,36,48,.04); animation:fadeInRow .3s ease both; }
  .stat-group-head{ display:flex; align-items:center; justify-content:space-between; gap:14px; font-size:11.5px; font-weight:700; color:var(--slate-soft); margin-bottom:6px; }
  .stat-remove{ border:none; background:transparent; cursor:pointer; color:var(--debt); font-size:11px; opacity:.55; padding:0; }
  .stat-remove:hover{ opacity:1; }
  .stat-group-chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .stat-chip{ background:var(--paper-2); border-radius:999px; padding:3px 10px; font-size:12px; color:var(--slate); white-space:nowrap; }
  .stat-chip b{ color:var(--brass); font-variant-numeric:tabular-nums; }
  .add-stat-btn{ align-self:center; }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); padding:11px 14px; margin-bottom:10px; box-shadow:0 1px 4px rgba(27,36,48,.04); transition:background-color .2s; }
  .toolbar input[type=text]{ min-width:200px; flex:1; }
  .filter-select{ min-width:120px; }
  .result-count{ font-size:12.5px; color:var(--slate-soft); margin-inline-start:auto; white-space:nowrap; }
  .updated-check{ display:flex; align-items:center; gap:6px; font-size:12.5px; white-space:nowrap; color:var(--slate); }
  .date-filter-active{ border-color:var(--brass) !important; color:var(--brass) !important; background:var(--paper-2) !important; font-weight:700; }
  .global-search-item{ padding:10px 8px; border-bottom:1px solid var(--line); cursor:pointer; border-radius:8px; transition:background-color .12s; }
  .global-search-item:hover{ background:var(--paper-2); }
  .global-search-item-title{ font-size:13.5px; font-weight:600; color:var(--slate); }
  .global-search-item-meta{ font-size:11.5px; color:var(--slate-soft); margin-top:2px; }
  .tag-expired{ background:var(--debt-bg); color:var(--debt); }
  .tag-expiring{ background:#FBE0A0; color:#8a5a00; }
  html[data-theme="dark"] .tag-expiring{ background:#5a4319; color:#f0c96a; }
  .map-pin{ position:absolute; width:18px; height:18px; background:var(--brass); border:2px solid #fff; border-radius:50%; transform:translate(-50%,-50%); cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.35); transition:transform .12s, background-color .12s; }
  .map-pin:hover{ background:var(--debt); transform:translate(-50%,-50%) scale(1.35); z-index:5; }

  .table-wrap{ background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); overflow:auto; max-height:calc(100vh - 320px); box-shadow:0 1px 6px rgba(27,36,48,.05); transition:background-color .2s; }
  table{ border-collapse:collapse; width:100%; font-size:13px; min-width:600px; table-layout:fixed; }
  thead th:first-child, tbody td:first-child{ position:sticky; right:0; z-index:6; }
  thead th:first-child{ z-index:9; }
  tbody td:first-child{ background:var(--card-bg); box-shadow:1px 0 0 var(--line); }
  tbody tr:nth-child(even) td:first-child{ background:var(--row-alt); }
  table.table-auto{ table-layout:fixed; }
  table.table-auto th, table.table-auto td{ padding:8px 12px; }
  table.table-auto tbody td{ max-height:70px; }
  table.table-auto .cell-clamp{ display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  table.table-auto thead th:nth-child(1), table.table-auto thead th:nth-child(2){ position:sticky; z-index:9; }
  table.table-auto thead th:nth-child(1){ right:0; }
  table.table-auto thead th:nth-child(2){ right:112px; }
  table.table-auto tbody td:nth-child(1), table.table-auto tbody td:nth-child(2){ position:sticky; z-index:5; background:var(--card-bg); }
  table.table-auto tbody tr:nth-child(even) td:nth-child(1), table.table-auto tbody tr:nth-child(even) td:nth-child(2){ background:var(--row-alt); }
  table.table-auto tbody td:nth-child(1){ right:0; }
  table.table-auto tbody td:nth-child(2){ right:112px; box-shadow:1px 0 0 var(--line); }
  thead th{ position:sticky; top:0; background:linear-gradient(180deg, var(--ink-2), #1E2836); color:#EFEAE0; padding:10px 10px; text-align:center; font-weight:600; white-space:normal; word-break:break-word; line-height:1.4; border-left:1px solid rgba(255,255,255,.06); font-size:12px; vertical-align:middle; cursor:pointer; user-select:none; z-index:7; box-shadow:0 3px 6px rgba(0,0,0,.18); }
  thead th:hover{ background:linear-gradient(180deg, #2C3A4C, #1E2836); }
  th.col-th{ position:relative; }
  .col-resize-handle{ position:absolute; top:0; bottom:0; left:0; width:6px; cursor:col-resize; }
  tbody td:first-child{ position:relative; }
  .row-resize-handle{ position:absolute; left:0; right:0; bottom:-4px; height:8px; cursor:row-resize; z-index:5; }
  .row-resize-handle:hover, .row-resize-handle.active{ background:rgba(185,141,62,.55); }
  tbody td[data-col]{ cursor:zoom-in; position:relative; text-align:center; }
  tbody td{ text-align:center; }
  tbody td:first-child{ text-align:center; }
  .fill-handle{ position:absolute; bottom:0; left:0; width:9px; height:9px; background:var(--brass); border:1.5px solid var(--card-bg); border-radius:2px; cursor:crosshair; opacity:0; transition:opacity .12s; z-index:3; }
  td[data-col]:hover .fill-handle{ opacity:1; }
  tr.fill-preview-row{ background:rgba(185,141,62,.18) !important; }
  tr.fill-preview-row td:first-child{ background:rgba(185,141,62,.18) !important; }
  .cell-zoom-body{ font-size:15.5px; line-height:2; white-space:pre-wrap; word-break:break-word; color:var(--slate); max-height:60vh; overflow:auto; padding:8px 4px; }
  .cell-zoom-input{ width:100%; font-family:inherit; font-size:15px; line-height:1.9; padding:12px; border:1px solid var(--line); border-radius:8px; background:var(--input-bg); color:var(--slate); resize:vertical; min-height:110px; }

  .splash-credit{ position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; background:rgba(15,19,25,.4); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity .5s ease; }
  .splash-credit.show{ opacity:1; }
  .splash-credit-inner{ background:linear-gradient(155deg, var(--ink), var(--ink-2)); color:#EFEAE0; padding:22px 44px; border-radius:16px; font-size:18px; font-weight:800; letter-spacing:.3px; box-shadow:0 20px 60px rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.12); animation:modalIn .35s ease-out; text-align:center; }
  .splash-credit-inner small{ display:block; font-size:11.5px; font-weight:500; color:var(--brass-light); margin-top:6px; letter-spacing:0; }
  .col-resize-handle:hover, .col-resize-handle.active{ background:rgba(185,141,62,.6); }
  tbody td{ padding:8px 10px; border-bottom:1px solid var(--line); color:var(--slate); white-space:normal; word-break:break-word; }
  tbody tr{ transition:background-color .15s; animation:fadeInRow .25s ease both; }
  tbody tr:hover{ background:var(--row-hover); }
  tbody tr:nth-child(even){ background:var(--row-alt); }
  tbody tr:nth-child(even):hover{ background:var(--row-alt-hover); }
  tbody tr.flash-update{ animation:flashUpdate 1.1s ease; }
  .tag{ display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; }
  .tag-settled{ background:var(--settled-bg); color:var(--settled); }
  .tag-debt{ background:var(--debt-bg); color:var(--debt); }
  .cell-edit-input{ width:100%; padding:4px 6px; font-size:12.5px; }
  .row-actions-wrap{ display:flex; flex-wrap:wrap; gap:4px; align-items:center; justify-content:center; }
  .row-action{ border:none; cursor:pointer; font-size:13px; padding:4px 7px; min-width:26px; text-align:center; border-radius:6px; transition:background-color .15s, transform .1s; }
  .row-action:hover{ transform:translateY(-1px); }
  .row-action.edit-btn{ background:var(--paper-2); color:var(--slate); }
  .row-action.edit-btn:hover{ background:var(--brass-light); }
  .row-action.cancel-btn{ background:#EDEDED; color:var(--slate-soft); }
  .row-action.clear-btn{ background:var(--paper-2); color:var(--brass); }
  .row-action.clear-btn:hover{ background:var(--brass-light); color:#fff; }
  .row-action.cancel-btn:hover{ background:#DEDEDE; }
  .row-action.del-btn{ background:var(--debt-bg); color:var(--debt); font-weight:700; }
  .row-action.del-btn:hover{ background:#EAC3C3; }
  .date-plus-btn{ border:none; background:var(--paper-2); color:var(--slate); border-radius:5px; padding:1px 6px; font-size:10.5px; cursor:pointer; margin-inline-start:5px; transition:background-color .15s; }
  .date-plus-btn:hover{ background:var(--brass-light); }

  @keyframes fadeInRow{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  @keyframes flashUpdate{ 0%{ background:var(--brass-light); } 100%{ background:var(--updated-bg); } }
  @keyframes modalIn{ from{opacity:0; transform:translateY(16px) scale(.94);} to{opacity:1; transform:translateY(0) scale(1);} }
  @keyframes toastIn{ from{opacity:0; transform:translate(-50%, 12px);} to{opacity:1; transform:translate(-50%, 0);} }

  .empty-state{ text-align:center; padding:70px 20px; color:var(--slate-soft); }
  .empty-state h2{ color:var(--ink); font-size:20px; margin-bottom:8px;}
  .empty-state p{ font-size:14px; margin-bottom:20px; line-height:2; }

  .overlay{ position:fixed; inset:0; background:rgba(15,19,25,.55); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; backdrop-filter:blur(5px); transition:opacity .2s; }
  .overlay.open{ display:flex; }
  .modal{ background:var(--card-bg); border-radius:16px; width:100%; max-width:480px; max-height:88vh; overflow:auto; padding:26px; box-shadow:0 24px 60px rgba(0,0,0,.32); animation:modalIn .18s ease-out; border-top:3px solid var(--brass); }
  .modal h3{ margin:0 0 4px; font-size:17px; color:var(--ink); }
  .modal p.hint{ font-size:12.5px; color:var(--slate-soft); margin:0 0 16px; line-height:1.9; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:5px; color:var(--slate); }
  .field input, .field select{ width:100%; }

  .toast.show{ display:flex; animation:toastIn .25s ease-out; }

  .toast-action-btn{ border:none; background:rgba(255,255,255,.22); color:#fff; padding:5px 12px; border-radius:7px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; transition:background-color .15s; }
  .toast-action-btn:hover{ background:rgba(255,255,255,.35); }

  .spinner{ width:38px; height:38px; border-radius:50%; border:3px solid var(--line); border-top-color:var(--brass); border-right-color:var(--brass-light); animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .file-input-hidden{ display:none; }

  @media (max-width: 780px){
    .layout{ flex-direction:column; }
    .floor-rail{ position:static; width:100%; flex-direction:row; overflow-x:auto; max-height:none; padding:12px 14px; gap:8px; }

    .topbar{ padding:10px 12px; gap:8px; }
    .topbar select{ min-width:120px; font-size:13px; }
    .btn{ padding:8px 11px; font-size:12.5px; }
    .stat-cards{ gap:6px; }
    .stat-card{ min-width:88px; padding:8px 12px; }

    .toolbar{ padding:8px 10px; gap:6px; }
    .toolbar input[type=text]{ min-width:140px; }
    .table-wrap{ max-height:calc(100vh - 260px); border-radius:8px; }
    thead th:first-child, tbody td:first-child{ min-width:82px; }
    .row-action{ font-size:12px; padding:5px 8px; }
  }
  @media (max-width: 480px){
    .brand{ font-size:15px; }
    .update-chip{ display:none !important; }
    .main{ padding:6px; }
    .table-wrap{ max-height:calc(100vh - 230px); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="mark">پ</span> دفتر ثبت واحدها</div>

  <div class="splash-credit-inner">طراحی و ساخت: سینا سپهرزاده<small>دفتر ثبت واحدها</small></div>
</div>

<script>
(function(){
"use strict";

/* ================= STATE ================= */
let pasazhIndex = [];      // [{id, name, lastUpdateLabel, lastUpdateDate}]
let pasazhData = {};       // id -> {name, lastUpdateLabel, lastUpdateDate, floors:[...]}
let currentPasazhId = null;
let currentPasazhData = null;
let currentFloorIdx = 0;
let activeFilters = {};
let searchText = "";
let onlyUpdated = false;
let dateFilter = null; // {col, from, to, fromStr, toStr}
let rialFilter = null; // "یک ریالی" | "دو ریالی" | null
let expiryFilter = null; // "expired" | "soon" | null

function gregorianToJalali(gy, gm, gd){
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let gy2 = (gm > 2) ? (gy + 1) : gy;
  let days = 355666 + (365*gy) + Math.floor((gy2+3)/4) - Math.floor((gy2+99)/100) + Math.floor((gy2+399)/400) + gd + g_d_m[gm-1];
  let jy = -1595 + (33 * Math.floor(days/12053));
  days %= 12053;
  jy += 4 * Math.floor(days/1461);
  days %= 1461;
  if(days > 365){ jy += Math.floor((days-1)/365); days = (days-1) % 365; }
  let jm, jd;
  if(days < 186){ jm = 1 + Math.floor(days/31); jd = 1 + (days % 31); }
  else { jm = 7 + Math.floor((days-186)/30); jd = 1 + ((days-186) % 30); }
  return [jy, jm, jd];
}
function todayJalaliNum(){
  const now = new Date();
  const [jy,jm,jd] = gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
  return jy*10000 + jm*100 + jd;
}
function jalaliNumPlusMonths(baseNum, months){
  const jy = Math.floor(baseNum/10000), jm = Math.floor((baseNum%10000)/100), jd = baseNum%100;
  const totalM = (jm - 1) + months;
  const newY = jy + Math.floor(totalM/12);
  const newM = (totalM % 12) + 1;
  return newY*10000 + newM*100 + jd;
}
function getExpiryStatus(row, column){
  if(!column) return null;
  const num = parseFlexibleDate(row[column]);
  if(num === null) return null;
  const today = todayJalaliNum();
  if(num < today) return "expired";
  const settings = currentPasazhData ? currentPasazhData.expirySettings : null;
  const months = settings ? (settings.months || 2) : 2;
  const threshold = jalaliNumPlusMonths(today, months);
  if(num <= threshold) return "soon";
  return null;
}
let editingRowKey = null;
let hasUnsavedChanges = false;

const LOCAL_KEY = "pasazh-manager-db-v1";

/* ================= HELPERS ================= */
function slugify(name){
  const base = (name || "pasazh").trim().replace(/[\s\/\\'"]+/g, "-").slice(0, 40);
  return (base || "pasazh") + "-" + Math.random().toString(36).slice(2,7);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function fmtDateToday(){ return new Date().toISOString().slice(0,10); }
function normalizeDigits(str){
  if(str === undefined || str === null) return str;
  const persian = "۰۱۲۳۴۵۶۷۸۹";
  const arabic = "٠١٢٣٤٥٦٧٨٩";
  return String(str).replace(/[۰-۹٠-٩]/g, (ch)=>{
    let idx = persian.indexOf(ch);
    if(idx > -1) return String(idx);
    idx = arabic.indexOf(ch);
    if(idx > -1) return String(idx);
    return ch;
  });
}
function bumpYear(str){
  const s = normalizeDigits(String(str||""));
  const m = s.match(/\d{4}/);
  if(!m) return str;
  const y = parseInt(m[0],10) + 1;
  return s.slice(0,m.index) + y + s.slice(m.index + m[0].length);
}
function looksLikeDate(v){
  if(!v) return false;
  return /^\d{2,4}[\/\-.]\d{1,2}[\/\-.]\d{1,2}$/.test(normalizeDigits(String(v).trim()));
}
function parseFlexibleDate(v){
  if(!v) return null;
  const m = normalizeDigits(String(v).trim()).match(/^(\d{2,4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if(!m) return null;
  const y = parseInt(m[1],10), mo = parseInt(m[2],10), d = parseInt(m[3],10);
  if(mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return y*10000 + mo*100 + d; // comparable number, e.g. 1404/1/5 -> 14040105
}
function getDateLikeColumns(columns, rows){
  return columns.filter(c=>{
    const vals = rows.map(r=>r[c]).filter(v=>v);
    if(vals.length === 0) return false;
    const matches = vals.filter(v=>looksLikeDate(v)).length;
    return matches / vals.length > 0.25;
  });
}

function findColumnByHints(columns, hints){
  return columns.find(c=> hints.every(h=> c.includes(h)));
}
function isAlaeddinOwner(name){
  if(!name) return false;
  const n = String(name).trim()
    .replace(/[\u200c\s]/g, "")   // remove ZWNJ and spaces (علای‌الدین -> علایالدین)
    .replace(/[ءأإئٔ]/g, "")        // remove hamza variants (علاءالدین -> علاالدین)
    .replace(/ي/g, "ی")
    .replace(/ك/g, "ک");
  return n.startsWith("علا") && n.includes("الدین");
}
function isRentedRow(row, statusCol, tenantNameCol){
  if(statusCol && row[statusCol] !== undefined && row[statusCol] !== ""){
    const v = String(row[statusCol]).trim();
    if(v === "مستاجر") return true;
    if(v === "مالک") return false;
  }
  if(tenantNameCol){
    const v = String(row[tenantNameCol]||"").trim();
    return v !== "" && v !== "*";
  }
  return false;
}
function getRialType(row, columns){
  const ownerCol = findColumnByHints(columns, ["نام","مالک"]) || findColumnByHints(columns, ["مالک"]);
  if(!ownerCol) return null;
  const statusCol = findColumnByHints(columns, ["وضعیت","واحد"]);
  const tenantNameCol = findColumnByHints(columns, ["نام","مستاجر"]);
  if(!isRentedRow(row, statusCol, tenantNameCol)) return null;
  return isAlaeddinOwner(row[ownerCol]) ? "یک ریالی" : "دو ریالی";
}
function openDateFilterModal(columns, currentFilter, onApply, onClear){
  const options = columns.map(c=>`<option value="${escapeHtml(c)}" ${currentFilter && currentFilter.col===c?'selected':''}>${escapeHtml(c)}</option>`).join("");
  openModal(`
    <h3>فیلتر بر اساس تاریخ</h3>
    <p class="hint">یه ستون تاریخ و یه بازه انتخاب کن. فرمت‌های مختلف (با یا بدون صفر ابتدایی، جداکننده / یا -) تشخیص داده می‌شن — مثلاً 1404/1/5 و 1404/01/05 یکی حساب می‌شن.</p>
    <div class="field"><label>ستون تاریخ</label><select id="dateFilterCol">${options}</select></div>
    <div class="field"><label>از تاریخ (اختیاری)</label><input type="text" id="dateFilterFrom" placeholder="مثلا 1404/01/01" value="${currentFilter && currentFilter.fromStr ? escapeHtml(currentFilter.fromStr) : ''}"></div>
    <div class="field"><label>تا تاریخ (اختیاری)</label><input type="text" id="dateFilterTo" placeholder="مثلا 1404/12/29" value="${currentFilter && currentFilter.toStr ? escapeHtml(currentFilter.toStr) : ''}"></div>
    <div class="modal-actions">
      <button class="btn btn-brass" id="applyDateFilterBtn">اعمال فیلتر</button>
      ${currentFilter ? '<button class="btn btn-danger" id="clearDateFilterBtn">پاک‌کردن فیلتر تاریخ</button>' : ''}
      <button class="btn btn-outline" onclick="window.__closeModal()">انصراف</button>
    </div>
  `);
  document.getElementById("applyDateFilterBtn").addEventListener("click", ()=>{
    const col = document.getElementById("dateFilterCol").value;
    const fromStr = document.getElementById("dateFilterFrom").value.trim();
    const toStr = document.getElementById("dateFilterTo").value.trim();
    if(!fromStr && !toStr){ showToast("حداقل یکی از تاریخ‌های از/تا رو وارد کن", "err"); return; }
    if(fromStr && !parseFlexibleDate(fromStr)){ showToast("فرمت «از تاریخ» درست نیست", "err"); return; }
    if(toStr && !parseFlexibleDate(toStr)){ showToast("فرمت «تا تاریخ» درست نیست", "err"); return; }
    closeModal();
    onApply({ col, from: fromStr ? parseFlexibleDate(fromStr) : null, to: toStr ? parseFlexibleDate(toStr) : null, fromStr, toStr });
  });
  const clearBtn = document.getElementById("clearDateFilterBtn");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ closeModal(); onClear(); });
}
function showToast(msg, type, action){
  const t = document.getElementById("toast");
  t.innerHTML = "";
  const span = document.createElement("span");
  span.textContent = msg;
  t.appendChild(span);
  if(action){
    const btn = document.createElement("button");
    btn.textContent = action.label;
    btn.className = "toast-action-btn";
    btn.addEventListener("click", ()=>{ action.onClick(); t.className = "toast"; });
    t.appendChild(btn);
  }
  t.className = "toast show" + (type ? " " + type : "");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>{ t.className = "toast"; }, action ? 6000 : 3400);
}
function setLoading(on, text){
  const el = document.getElementById("loadingOverlay");
  document.getElementById("loadingText").textContent = text || "در حال بارگذاری...";
  el.className = "loading-overlay" + (on ? " open" : "");
}
function openModal(html){
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("modalBody").innerHTML = "";
}
document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id === "overlay") closeModal(); });
window.__closeModal = closeModal;

/* ================= NORMALIZATION (backward compatibility) ================= */
function detectFilterableColumns(floor){
  const result = [];
  floor.columns.forEach(col=>{
    const values = floor.rows.map(r=>r[col]).filter(v=>v!==undefined && v!=="");
    if(values.length === 0) return;
    const distinct = Array.from(new Set(values));
    if(distinct.length > 1 && distinct.length <= 12 && distinct.length < values.length * 0.6){
      result.push({col, options: distinct.sort()});
    }
  });
  return result;
}
function normalizeFloor(floor){
  floor.hiddenColumns = floor.hiddenColumns || [];
  floor.columnWidths = floor.columnWidths || {};
  floor.rows = floor.rows || [];
  floor.statColumns = floor.statColumns || [];

  // de-duplicate column names: two identically-named columns share one data
  // slot on each row, which made row-wide edits silently overwrite each other.
  const seenNames = {};
  floor.columns = (floor.columns||[]).map(c=>{
    if(seenNames[c] === undefined){ seenNames[c] = 1; return c; }
    seenNames[c]++;
    return c + " (" + seenNames[c] + ")";
  });

  if(!floor.filterColumns){
    floor.filterColumns = detectFilterableColumns(floor).map(o=>o.col);
  }
  return floor;
}
function normalizePasazh(data){
  data.floors = (data.floors||[]).map(normalizeFloor);
  data.allView = data.allView || {hiddenColumns:[], columnWidths:{}, filterColumns:[], statColumns:[], columnOrder:null, autoHiddenApplied:false};
  data.expirySettings = data.expirySettings || { column: null, months: 2 };
  return data;
}

/* ================= LOCAL PERSISTENCE (this computer only) ================= */
function persistLocal(){
  try{ localStorage.setItem(LOCAL_KEY, JSON.stringify({pasazhIndex, pasazhData})); }catch(e){ /* ignore */ }
}
function loadLocalIfAny(){
  try{
    const raw = localStorage.getItem(LOCAL_KEY);
    if(!raw) return false;
    const parsed = JSON.parse(raw);
    pasazhIndex = parsed.pasazhIndex || [];
    pasazhData = parsed.pasazhData || {};
    Object.keys(pasazhData).forEach(id=> normalizePasazh(pasazhData[id]));
    return pasazhIndex.length > 0;
  }catch(e){ return false; }
}
function markDirty(){ hasUnsavedChanges = true; renderDirtyBadge(); persistLocal(); scheduleAutoPush(); }
function markClean(){ hasUnsavedChanges = false; renderDirtyBadge(); persistLocal(); }
function renderDirtyBadge(){
  const chip = document.getElementById("dirtyChip");
  if(chip) chip.style.display = hasUnsavedChanges ? "flex" : "none";
}
window.addEventListener("beforeunload", (e)=>{
  // localStorage already keeps everything, this is just a nudge to export for other systems
});

async function loadPasazhData(id){ return pasazhData[id] ? normalizePasazh(pasazhData[id]) : null; }
async function savePasazhData(id, data){ pasazhData[id] = data; markDirty(); }
async function saveIndex(){ markDirty(); }

/* ================= EXCEL PARSING (import) ================= */
function parseWorkbook(arrayBuffer){
  const wb = XLSX.read(arrayBuffer, {type:"array"});
  const floors = [];
  wb.SheetNames.forEach(sheetName=>{
    const ws = wb.Sheets[sheetName];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:"", raw:false});
    if(!aoa || aoa.length < 2) return;

    let headerRowIdx = 1;
    for(let i=0; i<Math.min(aoa.length,4); i++){
      const nonEmpty = aoa[i].filter(c=>String(c).trim()!=="").length;
      if(nonEmpty >= 3){ headerRowIdx = i; break; }
    }
    const headerRow = aoa[headerRowIdx].map(c=>String(c).trim());
    const columns = [];
    const seenNames = {};
    headerRow.forEach((h, idx)=>{
      if(h === "") return;
      let key = h;
      if(seenNames[h] !== undefined){
        seenNames[h]++;
        key = h + " (" + seenNames[h] + ")";
      } else {
        seenNames[h] = 1;
      }
      columns.push({key, colIdx: idx});
    });
    if(columns.length === 0) return;

    const rows = [];
    for(let r = headerRowIdx+1; r < aoa.length; r++){
      const raw = aoa[r];
      if(!raw || raw.every(c=>String(c).trim()==="")) continue;
      const rowObj = {};
      let hasAny = false;
      columns.forEach(col=>{
        const v = raw[col.colIdx] !== undefined ? String(raw[col.colIdx]).trim() : "";
        rowObj[col.key] = v;
        if(v !== "") hasAny = true;
      });
      if(hasAny) rows.push(rowObj);
    }

    const floor = { name: sheetName, columns: columns.map(c=>c.key), hiddenColumns:[], columnWidths:{}, rows };
    floor.filterColumns = detectFilterableColumns(floor).map(o=>o.col);
    floors.push(floor);
  });
  return floors;
}

/* ================= RENDER: top selectors ================= */
function renderPasazhSelect(){
  const sel = document.getElementById("pasazhSelect");
  sel.innerHTML = "";
  if(pasazhIndex.length === 0){
    const opt = document.createElement("option");
    opt.textContent = "پاساژی ثبت نشده"; opt.value = "";
    sel.appendChild(opt); sel.disabled = true; return;
  }
  sel.disabled = false;
  pasazhIndex.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p.id; opt.textContent = p.name;
    if(p.id === currentPasazhId) opt.selected = true;
    sel.appendChild(opt);
  });
}
function renderUpdateChip(){
  const chip = document.getElementById("updateChip");
  if(!currentPasazhData){ chip.style.display = "none"; return; }
  chip.style.display = "flex";
  const label = currentPasazhData.lastUpdateLabel || currentPasazhData.lastUpdateDate || "نامشخص";
  document.getElementById("updateChipText").textContent = "آخرین به‌روزرسانی: " + label;
}

/* ================= RENDER: floor rail ================= */
function renderFloorRail(){
  const rail = document.getElementById("floorRail");
  rail.innerHTML = "";
  if(!currentPasazhData) return;

  const allTab = document.createElement("div");
  allTab.className = "floor-tab all-floors-tab" + (currentFloorIdx === "ALL" ? " active" : "");
  const totalAll = currentPasazhData.floors.reduce((s,f)=>s+f.rows.length,0);
  allTab.innerHTML = `<span class="floor-main">🏢 همه طبقات با هم<span class="count">${totalAll} واحد</span></span>`;
  allTab.addEventListener("click", ()=>{
    currentFloorIdx = "ALL"; activeFilters = {}; searchText = ""; onlyUpdated = false; dateFilter = null; rialFilter = null; expiryFilter = null; editingRowKey = null;
    renderFloorRail(); renderMain();
  });
  rail.appendChild(allTab);

  currentPasazhData.floors.forEach((floor, idx)=>{
    const div = document.createElement("div");
    div.className = "floor-tab" + (idx === currentFloorIdx ? " active" : "");
    div.innerHTML = `
      <span class="floor-main">${escapeHtml(floor.name)}<span class="count">${floor.rows.length} واحد</span></span>
      <span>
        <button class="floor-icon-btn" data-act="map" title="نقشه طبقه">🗺️</button>
        <button class="floor-icon-btn" data-act="rename" title="تغییر نام">✎</button>
        <button class="floor-icon-btn" data-act="delete" title="حذف طبقه">🗑</button>
      </span>`;
    div.addEventListener("click", (e)=>{
      const actBtn = e.target.closest("[data-act]");
      if(actBtn){
        e.stopPropagation();
        if(actBtn.dataset.act === "map"){
          openFloorMapView(floor);
        } else if(actBtn.dataset.act === "rename"){
          const val = prompt("نام جدید طبقه:", floor.name);
          if(val && val.trim()){ floor.name = val.trim(); markDirty(); renderFloorRail(); renderMain(); }
        } else if(actBtn.dataset.act === "delete"){
          if(currentPasazhData.floors.length <= 1){ showToast("حداقل باید یک طبقه بمونه","err"); return; }
          if(confirm(`طبقه «${floor.name}» با همه‌ی اطلاعاتش حذف بشه؟`)){
            currentPasazhData.floors.splice(idx,1);

/* ================= FILTER / SEARCH ================= */
function styleForValue(v){
  const s = String(v);
  if(/تسویه|✓/.test(s) && !/بدهکار|بدون/.test(s)) return "tag tag-settled";
  if(/بدهکار|بدون پرداختی|بدهی/.test(s)) return "tag tag-debt";
  return "";
}
function matchesDateFilter(row){
  if(!dateFilter) return true;
  const num = parseFlexibleDate(row[dateFilter.col]);
  if(num === null) return false;
  if(dateFilter.from !== null && num < dateFilter.from) return false;
  if(dateFilter.to !== null && num > dateFilter.to) return false;
  return true;
}
function getFilteredRows(floor){
  let rows = floor.rows;
  Object.keys(activeFilters).forEach(col=>{ rows = rows.filter(r=>r[col] === activeFilters[col]); });
  if(searchText.trim()){
    const q = searchText.trim().toLowerCase();
    rows = rows.filter(r=> floor.columns.some(c=> String(r[c]||"").toLowerCase().includes(q)));
  }
  if(onlyUpdated) rows = rows.filter(r=> !!r.__updatedAt);
  if(dateFilter) rows = rows.filter(matchesDateFilter);
  if(rialFilter) rows = rows.filter(r=> getRialType(r, floor.columns) === rialFilter);
  if(expiryFilter && currentPasazhData && currentPasazhData.expirySettings.column){
    rows = rows.filter(r=> getExpiryStatus(r, currentPasazhData.expirySettings.column) === expiryFilter);
  }
  return rows;
}

function computeColumnBreakdown(floor, col){
  const counts = {};
  floor.rows.forEach(r=>{
    const raw = r[col];
    const v = (raw === undefined || raw === "") ? "خالی" : String(raw);
    counts[v] = (counts[v]||0) + 1;
  });
  return Object.keys(counts).sort((a,b)=> counts[b]-counts[a]).map(v=>({value:v, count:counts[v]}));
}

function buildStatCardsHTML(floor){
  const updatedCount = floor.rows.filter(r=>r.__updatedAt).length;
  let html = `
    <div class="stat-card"><span class="num">${floor.rows.length}</span><span class="lbl">کل واحدها</span></div>
    <div class="stat-card updated"><span class="num">${updatedCount}</span><span class="lbl">به‌روزرسانی‌شده</span></div>`;
  const expiryCol = currentPasazhData.expirySettings.column;
  if(expiryCol && floor.columns.includes(expiryCol)){
    const expiredCount = floor.rows.filter(r=> getExpiryStatus(r, expiryCol) === "expired").length;
    const soonCount = floor.rows.filter(r=> getExpiryStatus(r, expiryCol) === "soon").length;
    html += `<div class="stat-card debt"><span class="num">${expiredCount}</span><span class="lbl">منقضی‌شده</span></div>`;
    html += `<div class="stat-card"><span class="num" style="color:#8a5a00;">${soonCount}</span><span class="lbl">نزدیک انقضا</span></div>`;
  }
  (floor.statColumns||[]).forEach(col=>{
    if(!floor.columns.includes(col)) return;
    const breakdown = computeColumnBreakdown(floor, col);
    html += `<div class="stat-group" data-col="${escapeHtml(col)}">
      <div class="stat-group-head"><span>${escapeHtml(col)}</span><button class="stat-remove" data-act="removestat" data-col="${escapeHtml(col)}" title="حذف این آمار">✕</button></div>
      <div class="stat-group-chips">${breakdown.map(b=>`<span class="stat-chip">${escapeHtml(b.value)}: <b>${b.count}</b></span>`).join("")}</div>
    </div>`;
  });
  html += `<button class="btn btn-outline small add-stat-btn" data-act="addstat">+ افزودن آمار</button>`;
  return html;
}

function getAllRows(){
  const list = [];
  currentPasazhData.floors.forEach((f, fi)=> f.rows.forEach(r=> list.push({row:r, floorIdx:fi})));
  return list;
}
function getAllViewConfig(){
  currentPasazhData.allView = currentPasazhData.allView || {hiddenColumns:[], columnWidths:{}, filterColumns:[], statColumns:[], columnOrder:null};
  return currentPasazhData.allView;
}
function getUnionColumns(){
  const cfg = getAllViewConfig();
  const raw = [];
  currentPasazhData.floors.forEach(f=> f.columns.forEach(c=>{ if(!raw.includes(c)) raw.push(c); }));
  if(!cfg.columnOrder){
    cfg.columnOrder = [...raw];
  } else {
    const existing = cfg.columnOrder.filter(c=> raw.includes(c));
    const newOnes = raw.filter(c=> !existing.includes(c));
    cfg.columnOrder = [...existing, ...newOnes];
  }

  // first time only: auto-hide columns that belong to fewer than half the floors,
  // so the merged view doesn't start out cluttered with dozens of sparse columns.
  if(!cfg.autoHiddenApplied){
    const floorCount = currentPasazhData.floors.length;
    const presenceCount = {};
    raw.forEach(c=>{
      presenceCount[c] = currentPasazhData.floors.filter(f=> f.columns.includes(c)).length;
    });
    cfg.hiddenColumns = cfg.hiddenColumns || [];
    raw.forEach(c=>{
      if(presenceCount[c] < Math.ceil(floorCount/2) && !cfg.hiddenColumns.includes(c)){
        cfg.hiddenColumns.push(c);
      }
    });
    cfg.autoHiddenApplied = true;
  }

  return cfg.columnOrder;
}
function getFilteredAllEntries(){
  let entries = getAllRows();
  const unionCols = getUnionColumns();
  Object.keys(activeFilters).forEach(col=>{ entries = entries.filter(e=> e.row[col] === activeFilters[col]); });

  }
  if(onlyUpdated) entries = entries.filter(e=> !!e.row.__updatedAt);
  if(dateFilter) entries = entries.filter(e=> matchesDateFilter(e.row));
  if(rialFilter) entries = entries.filter(e=> getRialType(e.row, currentPasazhData.floors[e.floorIdx].columns) === rialFilter);
  if(expiryFilter && currentPasazhData.expirySettings.column){
    entries = entries.filter(e=> getExpiryStatus(e.row, currentPasazhData.expirySettings.column) === expiryFilter);
  }
  return entries;
}

function renderAllTableOnly(){
  const cfg = getAllViewConfig();
  const unionCols = getUnionColumns();
  const visibleCols = unionCols.filter(c=> !(cfg.hiddenColumns||[]).includes(c));
  let entries = getFilteredAllEntries();

  const wrap = document.getElementById("tableWrapAll");
  const countEl = document.getElementById("resultCountAll");
  const totalAll = getAllRows().length;
  if(countEl) countEl.textContent = entries.length + " از " + totalAll + " واحد";

  const statCards = document.getElementById("statCardsAll");
  if(statCards){ statCards.innerHTML = buildAllStatCardsHTML(); bindAllStatCardEvents(); }

  const sKey = currentPasazhId + ":ALL";
  const sort = sortState[sKey];
  if(sort){
    entries = [...entries].sort((a,b)=>{
      const va = String(a.row[sort.col]||""), vb = String(b.row[sort.col]||"");
      const da = parseFlexibleDate(va), db = parseFlexibleDate(vb);
      const na = parseFloat(normalizeDigits(va).replace(/,/g,"")), nb = parseFloat(normalizeDigits(vb).replace(/,/g,""));
      let cmp;
      if(da !== null && db !== null){ cmp = da - db; }
      else if(!isNaN(na) && !isNaN(nb) && va.trim()!=="" && vb.trim()!==""){ cmp = na - nb; }
      else { cmp = va.localeCompare(vb, "fa"); }
      return sort.dir === "asc" ? cmp : -cmp;
    });
  }

  let html = "<table class='table-auto'><colgroup><col style='width:112px'><col style='width:110px'>";
  visibleCols.forEach(c=> html += `<col data-col-width="${escapeHtml(c)}" style="width:${(cfg.columnWidths&&cfg.columnWidths[c])||130}px">`);
  html += "</colgroup><thead><tr><th></th><th>طبقه</th>";
  visibleCols.forEach(c=>{
    const arrow = sort && sort.col===c ? (sort.dir==="asc" ? " ▲" : " ▼") : "";
    html += `<th class="col-th" data-col="${escapeHtml(c)}" title="کلیک برای مرتب‌سازی">${escapeHtml(c)}${arrow}<span class="col-resize-handle"></span></th>`;
  });
  html += "</tr></thead><tbody>";

  if(entries.length === 0){
    html += `<tr><td colspan="${visibleCols.length+2}" style="text-align:center;color:var(--slate-soft);padding:30px;">موردی پیدا نشد</td></tr>`;
  } else {
    entries.forEach((entry, i)=>{
      const floor = currentPasazhData.floors[entry.floorIdx];
      const r = entry.row;
      const isEditing = editingAllRowRef === r;
      const styleParts = [];
      if(!isEditing && r.__updatedAt) styleParts.push("background:var(--updated-bg);border-inline-start:3px solid var(--brass);");
      if(r.__rowHeight) styleParts.push(`height:${r.__rowHeight}px;`);
      const rowStyle = styleParts.length ? ` style="${styleParts.join(" ")}"` : "";
      html += `<tr data-entry-idx="${i}"${rowStyle}>`;
      if(isEditing){
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="ذخیره">💾</button>
            <button class="row-action cancel-btn" data-act="cancel" title="انصراف">✕</button>
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      } else {
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="ویرایش">✎</button>
            <button class="row-action del-btn" data-act="del" title="حذف ردیف">🗑</button>
            <button class="row-action edit-btn" data-act="attach" title="پیوست‌ها${r.__attachments&&r.__attachments.length?' ('+r.__attachments.length+')':''}">📎</button>
            ${r.__updatedAt ? `<button class="row-action clear-btn" data-act="clearmark" title="پاک‌کردن رنگ این ردیف">🧹</button>` : ""}
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      }
      html += `<td><b>${escapeHtml(floor.name)}</b></td>`;
      visibleCols.forEach(c=>{
        const v = r[c] === undefined ? "" : r[c];
        if(isEditing){
          html += `<td><input type="text" class="cell-edit-input" data-col="${escapeHtml(c)}" value="${escapeHtml(v)}"></td>`;
        } else {
          const expiryCol = currentPasazhData.expirySettings.column;
          const expStatus = (expiryCol && c === expiryCol) ? getExpiryStatus(r, expiryCol) : null;
          const cls = expStatus === "expired" ? "tag tag-expired" : expStatus === "soon" ? "tag tag-expiring" : styleForValue(v);
          const clampStyle = r.__rowHeight ? ` style="max-height:${Math.max(16,r.__rowHeight-18)}px;"` : "";
          let inner = cls ? `<span class="${cls}">${escapeHtml(v)}</span>` : `<span class="cell-clamp"${clampStyle}>${escapeHtml(v)}</span>`;
          if(looksLikeDate(v)){
            inner += `<button class="date-plus-btn" data-act="plusyear" data-col="${escapeHtml(c)}" title="یک سال اضافه کن">+۱سال</button>`;
          }
          inner += `<span class="fill-handle" title="بکش پایین برای کپی این مقدار روی ردیف‌های بعدی"></span>`;
          html += `<td data-col="${escapeHtml(c)}" title="${escapeHtml(v)}">${inner}</td>`;
        }
      });
      html += "</tr>";
    });
  }
  html += "</tbody></table>";
  wrap.innerHTML = html;

  if(flashAllRowRef){
    entries.forEach((entry, i)=>{
      if(entry.row === flashAllRowRef){
        const tr = wrap.querySelector(`tr[data-entry-idx="${i}"]`);
        if(tr) tr.classList.add("flash-update");
      }
    });
    flashAllRowRef = null;
  }

  wrap.querySelectorAll(".cell-edit-input").forEach(inp=>{
    inp.addEventListener("keydown", (e)=>{
      const rowTr = inp.closest("tr");
      if(e.key === "Enter"){ e.preventDefault(); rowTr.querySelector('button[data-act="edit"]')?.click(); }
      else if(e.key === "Escape"){ e.preventDefault(); rowTr.querySelector('button[data-act="cancel"]')?.click(); }
    });
  });

  attachFillHandles(wrap, "tr[data-entry-idx]",
    (tr)=> entries[parseInt(tr.dataset.entryIdx, 10)].row,
    ()=> renderAllTableOnly());

  wrap.querySelectorAll("th.col-th").forEach(th=>{
    th.addEventListener("click", (e)=>{
      if(e.target.classList.contains("col-resize-handle")) return;
      const col = th.dataset.col;
      const cur = sortState[sKey];
      if(cur && cur.col === col) sortState[sKey] = cur.dir === "asc" ? {col, dir:"desc"} : null;
      else sortState[sKey] = {col, dir:"asc"};
      renderAllTableOnly();
    });
  });

  wrap.querySelectorAll("th.col-th").forEach(th=>{
    const handle = th.querySelector(".col-resize-handle");
    const col = th.dataset.col;
    handle.addEventListener("click", (e)=> e.stopPropagation());
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const startX = e.clientX;
      cfg.columnWidths = cfg.columnWidths || {};
      const startWidth = cfg.columnWidths[col] || th.offsetWidth;
      const colEl = wrap.querySelector(`col[data-col-width="${CSS.escape(col)}"]`);
      function onMove(ev){
        const delta = ev.clientX - startX;
        const newWidth = Math.max(50, Math.round(startWidth + delta));
        if(colEl) colEl.style.width = newWidth + "px";
        cfg.columnWidths[col] = newWidth;
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  wrap.querySelectorAll(".row-resize-handle").forEach(handle=>{
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const tr = handle.closest("tr[data-entry-idx]");
      const idx = parseInt(tr.dataset.entryIdx, 10);
      const r = entries[idx].row;
      const startY = e.clientY;
      const startHeight = tr.offsetHeight;
      function onMove(ev){
        const delta = ev.clientY - startY;
        const newHeight = Math.max(32, Math.round(startHeight + delta));
        tr.style.height = newHeight + "px";
        r.__rowHeight = newHeight;
        tr.querySelectorAll(".cell-clamp").forEach(el=> el.style.maxHeight = Math.max(16,newHeight-18)+"px");
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  wrap.onclick = (e)=>{
    const actBtn = e.target.closest("[data-act]");
    if(actBtn){
      const tr = actBtn.closest("tr[data-entry-idx]");
      const idx = parseInt(tr.dataset.entryIdx, 10);
      const entry = entries[idx];
      const floor = currentPasazhData.floors[entry.floorIdx];
      const r = entry.row;
      const act = actBtn.dataset.act;

      if(act === "edit"){
        if(editingAllRowRef === r){
          const inputs = tr.querySelectorAll(".cell-edit-input");
          inputs.forEach(inp=>{ r[inp.dataset.col] = inp.value; });
          r.__updatedAt = new Date().toISOString();
          editingAllRowRef = null;
          markDirty();
          flashAllRowRef = r;
        } else {
          editingAllRowRef = r;
        }
        renderAllTableOnly();
      } else if(act === "cancel"){
        editingAllRowRef = null;
        renderAllTableOnly();
      } else if(act === "del"){
        if(confirm(`این ردیف (طبقه «${floor.name}») حذف بشه؟`)){
          const realIdx = floor.rows.indexOf(r);
          if(realIdx >= 0) floor.rows.splice(realIdx, 1);
          markDirty(); renderFloorRail(); renderAllTableOnly();
        }
      } else if(act === "plusyear"){
        const col = actBtn.dataset.col;
        r[col] = bumpYear(r[col]);
        r.__updatedAt = new Date().toISOString();
        markDirty(); flashAllRowRef = r; renderAllTableOnly();
      } else if(act === "clearmark"){
        delete r.__updatedAt;
        markDirty(); renderAllTableOnly();
      } else if(act === "attach"){
        openAttachmentsModal(r, ()=> renderAllTableOnly());
      }
      return;
    }

    const zoomTd = e.target.closest("td[data-col]");
    if(zoomTd){
      const col = zoomTd.dataset.col;
      const tr = zoomTd.closest("tr[data-entry-idx]");
      const idx = parseInt(tr.dataset.entryIdx, 10);
      const r = entries[idx].row;
      openCellZoomModal(col, r[col] || "", (val)=>{
        r[col] = val;
        r.__updatedAt = new Date().toISOString();
        markDirty();
        flashAllRowRef = r;
        renderAllTableOnly();
      });
    }
  };
}

  toolbar2.appendChild(convertDigitsBtn);
  toolbar2.appendChild(clearMarksBtn);
  main.appendChild(toolbar2);

  const tableWrap = document.createElement("div");
  tableWrap.className = "table-wrap"; tableWrap.id = "tableWrap";
  main.appendChild(tableWrap);

  renderTableOnly();
}

let sortState = {};
let flashRowIdx = null;
function sortKey(){ return currentPasazhId + ":" + currentFloorIdx; }

function renderTableOnly(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  let rows = getFilteredRows(floor);
  const wrap = document.getElementById("tableWrap");
  const countEl = document.getElementById("resultCount");
  if(countEl) countEl.textContent = rows.length + " از " + floor.rows.length + " واحد";

  const statCards = document.getElementById("statCards");
  if(statCards){
    statCards.innerHTML = buildStatCardsHTML(floor);
    bindStatCardEvents();
  }

  const visibleCols = floor.columns.filter(c=> !(floor.hiddenColumns||[]).includes(c));
  const sort = sortState[sortKey()];
  if(sort){
    rows = [...rows].sort((a,b)=>{
      const va = String(a[sort.col]||""), vb = String(b[sort.col]||"");
      const da = parseFlexibleDate(va), db = parseFlexibleDate(vb);
      const na = parseFloat(normalizeDigits(va).replace(/,/g,"")), nb = parseFloat(normalizeDigits(vb).replace(/,/g,""));
      let cmp;
      if(da !== null && db !== null){ cmp = da - db; }
      else if(!isNaN(na) && !isNaN(nb) && va.trim()!=="" && vb.trim()!==""){ cmp = na - nb; }
      else { cmp = va.localeCompare(vb, "fa"); }
      return sort.dir === "asc" ? cmp : -cmp;
    });
  }

  let html = "<table><colgroup><col style='width:112px'>";
  visibleCols.forEach(c=> html += `<col data-col-width="${escapeHtml(c)}" style="width:${(floor.columnWidths&&floor.columnWidths[c])||140}px">`);
  html += "</colgroup><thead><tr><th></th>";
  visibleCols.forEach(c=>{
    const arrow = sort && sort.col===c ? (sort.dir==="asc" ? " ▲" : " ▼") : "";
    html += `<th class="col-th" data-col="${escapeHtml(c)}" title="کلیک برای مرتب‌سازی">${escapeHtml(c)}${arrow}<span class="col-resize-handle"></span></th>`;
  });
  html += "</tr></thead><tbody>";

  if(rows.length === 0){
    html += `<tr><td colspan="${visibleCols.length+1}" style="text-align:center;color:var(--slate-soft);padding:30px;">موردی پیدا نشد</td></tr>`;
  } else {
    rows.forEach(r=>{
      const realIdx = floor.rows.indexOf(r);
      const isEditing = editingRowKey === realIdx;
      const styleParts = [];
      if(!isEditing && r.__updatedAt) styleParts.push("background:var(--updated-bg);border-inline-start:3px solid var(--brass);");
      if(r.__rowHeight) styleParts.push(`height:${r.__rowHeight}px;`);
      const rowStyle = styleParts.length ? ` style="${styleParts.join(" ")}"` : "";
      html += `<tr data-row-idx="${realIdx}"${rowStyle}>`;
      if(isEditing){
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="ذخیره">💾</button>
            <button class="row-action cancel-btn" data-act="cancel" title="انصراف">✕</button>
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      } else {
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="ویرایش">✎</button>
            <button class="row-action del-btn" data-act="del" title="حذف ردیف">🗑</button>
            <button class="row-action edit-btn" data-act="attach" title="پیوست‌ها${r.__attachments&&r.__attachments.length?' ('+r.__attachments.length+')':''}">📎</button>
            ${r.__updatedAt ? `<button class="row-action clear-btn" data-act="clearmark" title="پاک‌کردن رنگ این ردیف">🧹</button>` : ""}
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      }
      visibleCols.forEach(c=>{
        const v = r[c] === undefined ? "" : r[c];
        if(isEditing){
          html += `<td><input type="text" class="cell-edit-input" data-col="${escapeHtml(c)}" value="${escapeHtml(v)}"></td>`;
        } else {
          const expiryCol = currentPasazhData.expirySettings.column;
          const expStatus = (expiryCol && c === expiryCol) ? getExpiryStatus(r, expiryCol) : null;
          const cls = expStatus === "expired" ? "tag tag-expired" : expStatus === "soon" ? "tag tag-expiring" : styleForValue(v);
          const clampStyle = r.__rowHeight ? ` style="display:block;max-height:${Math.max(16,r.__rowHeight-18)}px;overflow:hidden;"` : "";
          let inner = cls ? `<span class="${cls}">${escapeHtml(v)}</span>` : `<span class="cell-clamp-normal"${clampStyle}>${escapeHtml(v)}</span>`;
          if(looksLikeDate(v)){
            inner += `<button class="date-plus-btn" data-act="plusyear" data-col="${escapeHtml(c)}" title="یک سال اضافه کن">+۱سال</button>`;
          }
          inner += `<span class="fill-handle" title="بکش پایین برای کپی این مقدار روی ردیف‌های بعدی"></span>`;
          html += `<td data-col="${escapeHtml(c)}">${inner}</td>`;
        }
      });
      html += "</tr>";
    });
  }
  html += "</tbody></table>";
  wrap.innerHTML = html;

  if(flashRowIdx !== null){
    const tr = wrap.querySelector(`tr[data-row-idx="${flashRowIdx}"]`);
    if(tr) tr.classList.add("flash-update");
    flashRowIdx = null;
  }

  document.getElementById("onlyUpdatedChk")?.addEventListener("change",(e)=>{ onlyUpdated = e.target.checked; renderTableOnly(); });

  // enter/escape while editing a cell
  wrap.querySelectorAll(".cell-edit-input").forEach(inp=>{
    inp.addEventListener("keydown", (e)=>{
      const rowTr = inp.closest("tr");
      if(e.key === "Enter"){ e.preventDefault(); rowTr.querySelector('button[data-act="edit"]')?.click(); }
      else if(e.key === "Escape"){ e.preventDefault(); rowTr.querySelector('button[data-act="cancel"]')?.click(); }
    });
  });

  attachFillHandles(wrap, "tr[data-row-idx]",
    (tr)=> floor.rows[parseInt(tr.dataset.rowIdx, 10)],
    ()=> renderTableOnly());

  // header click to sort (ignore clicks on the resize handle)
  wrap.querySelectorAll("th.col-th").forEach(th=>{
    th.addEventListener("click", (e)=>{
      if(e.target.classList.contains("col-resize-handle")) return;
      const col = th.dataset.col;
      const key = sortKey();
      const cur = sortState[key];
      if(cur && cur.col === col) sortState[key] = cur.dir === "asc" ? {col, dir:"desc"} : null;
      else sortState[key] = {col, dir:"asc"};
      renderTableOnly();
    });
  });

  // drag-to-resize columns
  wrap.querySelectorAll("th.col-th").forEach(th=>{
    const handle = th.querySelector(".col-resize-handle");
    const col = th.dataset.col;
    handle.addEventListener("click", (e)=> e.stopPropagation());
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const startX = e.clientX;
      const startWidth = (floor.columnWidths && floor.columnWidths[col]) || th.offsetWidth;
      const colEl = wrap.querySelector(`col[data-col-width="${CSS.escape(col)}"]`);
      function onMove(ev){
        const delta = ev.clientX - startX;
        const newWidth = Math.max(50, Math.round(startWidth + delta));
        if(colEl) colEl.style.width = newWidth + "px";
        floor.columnWidths[col] = newWidth;
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  // drag-to-resize row heights
  wrap.querySelectorAll(".row-resize-handle").forEach(handle=>{
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const tr = handle.closest("tr[data-row-idx]");
      const realIdx = parseInt(tr.dataset.rowIdx, 10);
      const r = floor.rows[realIdx];
      const startY = e.clientY;
      const startHeight = tr.offsetHeight;
      function onMove(ev){
        const delta = ev.clientY - startY;
        const newHeight = Math.max(32, Math.round(startHeight + delta));
        tr.style.height = newHeight + "px";
        r.__rowHeight = newHeight;
        tr.querySelectorAll(".cell-clamp-normal").forEach(el=>{
          el.style.display = "block";
          el.style.overflow = "hidden";
          el.style.maxHeight = Math.max(16, newHeight-18) + "px";
        });
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  wrap.onclick = (e)=>{
    const actBtn = e.target.closest("[data-act]");
    if(actBtn){
      const tr = actBtn.closest("tr[data-row-idx]");
      const realIdx = parseInt(tr.dataset.rowIdx, 10);
      const act = actBtn.dataset.act;

      if(act === "edit"){
        if(editingRowKey === realIdx){
          const inputs = tr.querySelectorAll(".cell-edit-input");
          inputs.forEach(inp=>{ floor.rows[realIdx][inp.dataset.col] = inp.value; });
          floor.rows[realIdx].__updatedAt = new Date().toISOString();
          editingRowKey = null;
          markDirty();
          flashRowIdx = realIdx;
        } else {
          editingRowKey = realIdx;
        }
        renderTableOnly();
      } else if(act === "cancel"){
        editingRowKey = null;
        renderTableOnly();
      } else if(act === "del"){
        if(confirm("این ردیف حذف بشه؟")){
          floor.rows.splice(realIdx,1);
          markDirty(); renderFloorRail(); renderTableOnly();
        }
      } else if(act === "plusyear"){
        const col = actBtn.dataset.col;
        floor.rows[realIdx][col] = bumpYear(floor.rows[realIdx][col]);
        floor.rows[realIdx].__updatedAt = new Date().toISOString();
        markDirty(); flashRowIdx = realIdx; renderTableOnly();
      } else if(act === "clearmark"){
        delete floor.rows[realIdx].__updatedAt;
        markDirty(); renderTableOnly();
      } else if(act === "attach"){
        openAttachmentsModal(floor.rows[realIdx], ()=> renderTableOnly());
      }
      return;
    }

    const zoomTd = e.target.closest("td[data-col]");
    if(zoomTd){
      const col = zoomTd.dataset.col;
      const tr = zoomTd.closest("tr[data-row-idx]");
      const realIdx = parseInt(tr.dataset.rowIdx, 10);
      openCellZoomModal(col, floor.rows[realIdx][col] || "", (val)=>{
        floor.rows[realIdx][col] = val;
        floor.rows[realIdx].__updatedAt = new Date().toISOString();
        markDirty();
        flashRowIdx = realIdx;
        renderTableOnly();
      });
    }
  };
}

function addNewRow(){
  const floor = currentPasazhData.floors[currentFloorIdx];

  floor.columns.forEach(c=> newRow[c] = "");
  newRow.__updatedAt = new Date().toISOString();

}

function clearAllUpdatedMarks(){
  if(!currentPasazhData) return;
  if(!confirm("همه‌ی نشان‌های «به‌روزرسانی‌شده» این پاساژ (همه‌ی طبقات) پاک بشه؟ این کار برای شروع دوره‌ی به‌روزرسانی ماه بعده.")) return;
  currentPasazhData.floors.forEach(f=> f.rows.forEach(r=> delete r.__updatedAt));
  markDirty();
  if(currentFloorIdx === "ALL") renderAllTableOnly(); else renderTableOnly();
  showToast("نشان‌های به‌روزرسانی پاک شدند", "ok");
}

function convertDigitsInRows(rows){
  let changed = 0;
  rows.forEach(r=>{
    Object.keys(r).forEach(k=>{
      if(k.startsWith("__")) return;
      const v = r[k];
      if(typeof v !== "string") return;
      const norm = normalizeDigits(v);
      if(norm !== v){ r[k] = norm; changed++; }
    });
  });
  return changed;
}
function convertDigitsThisFloor(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  if(!floor) return;
  if(!confirm(`همه‌ی اعداد فارسی/عربی توی طبقه‌ی «${floor.name}» به انگلیسی تبدیل بشن؟`)) return;
  const changed = convertDigitsInRows(floor.rows);
  markDirty(); renderTableOnly();
  showToast(changed ? `${changed} مقدار تبدیل شد` : "چیزی برای تبدیل پیدا نشد", "ok");
}
function convertDigitsAllFloors(){
  if(!currentPasazhData) return;
  if(!confirm("همه‌ی اعداد فارسی/عربی توی کل طبقات این پاساژ به انگلیسی تبدیل بشن؟")) return;
  let changed = 0;
  currentPasazhData.floors.forEach(f=> changed += convertDigitsInRows(f.rows));
  markDirty(); renderAllTableOnly();
  showToast(changed ? `${changed} مقدار تبدیل شد` : "چیزی برای تبدیل پیدا نشد", "ok");
}

function openColumnEditor(){
  const floor = currentPasazhData.floors[currentFloorIdx];
  render();

  function render(){
    let html = `<h3>ویرایش ستون‌های «${escapeHtml(floor.name)}»</h3>
      <p class="hint">ترتیب، عنوان، عرض (پیکسل) و نمایش هر ستون رو تغییر بده. تغییرات هر ردیف بعد از زدن «ثبت تغییرات» اعمال می‌شه.</p>
      <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:10px; padding:10px; background:var(--paper-2); border-radius:8px;">
        <div style="flex:1;"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px;">عرض همه‌ی ستون‌ها (px)</label><input type="number" id="bulkColWidth" placeholder="مثلا 140" min="40" max="600"></div>
        <button class="btn btn-outline small" id="applyBulkWidth">اعمال به همه</button>
      </div>
      <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:14px; padding:10px; background:var(--paper-2); border-radius:8px;">
        <div style="flex:1;"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px;">ارتفاع همه‌ی ردیف‌های این طبقه (px)</label><input type="number" id="bulkRowHeight" placeholder="مثلا 44" min="32" max="400"></div>
        <button class="btn btn-outline small" id="applyBulkHeight">اعمال به همه</button>
      </div>
      <div id="colEditList">`;
    floor.columns.forEach((col, idx)=>{
      const hidden = (floor.hiddenColumns||[]).includes(col);
      const width = (floor.columnWidths && floor.columnWidths[col]) || 140;
      html += `
        <div class="col-edit-row" data-idx="${idx}">
          <button class="btn btn-outline small" data-act="up">▲</button>
          <button class="btn btn-outline small" data-act="down">▼</button>
          <input type="text" class="col-name-input" value="${escapeHtml(col)}">
          <input type="number" class="col-width-input" value="${width}" min="40" max="600">
          <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" class="col-hide-input" ${hidden?'':'checked'}> نمایش</label>
          <button class="btn btn-danger small" data-act="del">حذف</button>
        </div>`;
    });
    html += `</div>
      <div class="field" style="margin-top:14px;">
        <label>افزودن ستون جدید</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="newColName" placeholder="نام ستون جدید">
          <button class="btn btn-brass" id="addColBtn">افزودن</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-brass" id="saveColEdits">ثبت تغییرات</button>
        <button class="btn btn-outline" onclick="window.__closeModal()">انصراف</button>
      </div>`;
    openModal(html);

    document.getElementById("applyBulkWidth").addEventListener("click", ()=>{
      const val = parseInt(document.getElementById("bulkColWidth").value, 10);
      if(!val || val < 40){ showToast("یه عدد معتبر برای عرض وارد کن", "err"); return; }
      document.querySelectorAll("#colEditList .col-width-input").forEach(inp=> inp.value = val);
      showToast("عرض همه‌ی ستون‌ها تنظیم شد؛ برای ذخیره «ثبت تغییرات» رو بزن", "ok");
    });
    document.getElementById("applyBulkHeight").addEventListener("click", ()=>{
      const val = parseInt(document.getElementById("bulkRowHeight").value, 10);
      if(!val || val < 32){ showToast("یه عدد معتبر برای ارتفاع وارد کن", "err"); return; }
      floor.rows.forEach(r=> r.__rowHeight = val);
      markDirty();
      renderTableOnly();
      showToast("ارتفاع همه‌ی ردیف‌ها تنظیم شد", "ok");
    });

    document.getElementById("addColBtn").addEventListener("click", ()=>{
      const name = document.getElementById("newColName").value.trim();
      if(!name) return;
      if(floor.columns.includes(name)){ showToast("این ستون از قبل هست","err"); return; }
      floor.columns.push(name);
      floor.columnWidths[name] = 140;
      floor.rows.forEach(r=> r[name] = "");
      markDirty();
      render();
    });

    document.getElementById("colEditList").addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-act]");
      if(!btn) return;
      const rowEl = btn.closest(".col-edit-row");
      const idx = parseInt(rowEl.dataset.idx, 10);
      const act = btn.dataset.act;
      if(act === "up" && idx > 0){
        [floor.columns[idx-1], floor.columns[idx]] = [floor.columns[idx], floor.columns[idx-1]];
        markDirty(); render();
      } else if(act === "down" && idx < floor.columns.length-1){
        [floor.columns[idx+1], floor.columns[idx]] = [floor.columns[idx], floor.columns[idx+1]];
        markDirty(); render();
      } else if(act === "del"){
        const col = floor.columns[idx];
        if(!confirm(`ستون «${col}» حذف بشه؟ داده‌های این ستون از همه‌ی ردیف‌ها پاک می‌شه.`)) return;
        floor.columns.splice(idx,1);
        delete floor.columnWidths[col];
        floor.hiddenColumns = (floor.hiddenColumns||[]).filter(c=>c!==col);
        floor.filterColumns = (floor.filterColumns||[]).filter(c=>c!==col);
        floor.rows.forEach(r=> delete r[col]);
        markDirty(); render();
      }
    });

    document.getElementById("saveColEdits").addEventListener("click", ()=>{
      const rowsEls = document.querySelectorAll("#colEditList .col-edit-row");
      const renameMap = {};
      rowsEls.forEach(rowEl=>{
        const idx = parseInt(rowEl.dataset.idx, 10);
        const oldName = floor.columns[idx];
        const newName = rowEl.querySelector(".col-name-input").value.trim() || oldName;
        const width = parseInt(rowEl.querySelector(".col-width-input").value, 10) || 140;
        const visible = rowEl.querySelector(".col-hide-input").checked;
        if(newName !== oldName) renameMap[oldName] = newName;
        floor.columnWidths[newName] = width;
        if(oldName !== newName) delete floor.columnWidths[oldName];
        floor.hiddenColumns = floor.hiddenColumns || [];
        if(!visible){ if(!floor.hiddenColumns.includes(newName)) floor.hiddenColumns.push(newName); }
        else { floor.hiddenColumns = floor.hiddenColumns.filter(c=>c!==newName && c!==oldName); }
      });
      floor.columns = floor.columns.map(c=> renameMap[c] || c);
      floor.filterColumns = (floor.filterColumns||[]).map(c=> renameMap[c] || c);
      floor.rows.forEach(r=>{
        Object.keys(renameMap).forEach(oldName=>{
          if(oldName in r){ r[renameMap[oldName]] = r[oldName]; if(renameMap[oldName] !== oldName) delete r[oldName]; }
        });
      });
      markDirty();
      closeModal();
      renderFloorRail();
      renderMain();
      showToast("ستون‌ها به‌روزرسانی شدند", "ok");
    });
  }
}

    currentPasazhId = id;

  }catch(e){

    setLoading(false);
  }
}

function deletePasazhAction(){
  if(!currentPasazhData){ showToast("اول یک پاساژ رو انتخاب کن", "err"); return; }
  if(!confirm(`پاساژ «${currentPasazhData.name}» با همه‌ی طبقات و اطلاعاتش کاملاً حذف بشه؟ این کار غیرقابل‌برگشته.`)) return;
  const idToDelete = currentPasazhId;
  pasazhIndex = pasazhIndex.filter(p=>p.id !== idToDelete);
  delete pasazhData[idToDelete];
  markDirty();
  if(pasazhIndex.length){
    switchToPasazh(pasazhIndex[0].id);
  } else {
    currentPasazhId = null;
    currentPasazhData = null;
    renderPasazhSelect();
    renderUpdateChip();
    renderFloorRail();
    renderMain();
  }
  showToast("پاساژ حذف شد", "ok");
}

document.getElementById("importExcelBtn").addEventListener("click", ()=> document.getElementById("excelFileInput").click());
document.getElementById("excelFileInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0]; e.target.value = "";
  if(!file) return;
  setLoading(true, "در حال خواندن فایل اکسل...");
  let floors;
  try{
    if(typeof XLSX === "undefined") throw new Error("کتابخانه‌ی اکسل هنوز بارگذاری نشده؛ اینترنتت رو چک کن و دوباره تلاش کن");
    const buf = await file.arrayBuffer();
    floors = parseWorkbook(buf);
    if(floors.length === 0) throw new Error("هیچ طبقه/شیتی با داده‌ی قابل‌تشخیص تو این فایل پیدا نشد");
  }catch(err){
    setLoading(false);
    showToast("فایل اکسل قابل خواندن نبود: " + (err && err.message ? err.message : "خطای نامشخص"), "err");
    return;
  }
  setLoading(false);

  const totalRows = floors.reduce((s,f)=>s+f.rows.length,0);
  const floorList = floors.map(f=>`${f.name} (${f.rows.length} واحد)`).join("، ");
  const options = pasazhIndex.map(p=>`<option value="${p.id}" ${p.id===currentPasazhId?'selected':''}>${escapeHtml(p.name)}</option>`).join("");

  openModal(`
    <h3>وارد کردن اکسل</h3>
    <p class="hint">${floors.length} طبقه و ${totalRows} واحد پیدا شد: ${escapeHtml(floorList)}</p>
    <div class="field">
      <label>این اطلاعات مربوط به کدوم پاساژه؟</label>
      <select id="importTargetSelect">${options}<option value="__new__">+ ساخت پاساژ جدید با این اکسل</option></select>
    </div>
    <div class="field" id="newNameField" style="display:${pasazhIndex.length? 'none':'block'}">
      <label>نام پاساژ جدید</label>
      <input type="text" id="importNewName" placeholder="مثلا: علاالدین یک">
    </div>
    <div class="field">
      <label>برچسب به‌روزرسانی (مثلا: تیر ۱۴۰۴)</label>
      <input type="text" id="updateLabelInput" placeholder="این ماه">
    </div>
    <p class="hint" style="color:var(--debt)">توجه: طبقاتِ همنام در پاساژ انتخابی با اطلاعات جدید جایگزین می‌شن.</p>
    <div class="modal-actions">
      <button class="btn btn-brass" id="confirmImport">ثبت اطلاعات</button>
      <button class="btn btn-outline" onclick="window.__closeModal()">انصراف</button>
    </div>`);

  const targetSel = document.getElementById("importTargetSelect");
  targetSel.addEventListener("change", ()=>{
    document.getElementById("newNameField").style.display = targetSel.value === "__new__" ? "block" : "none";
  });
  if(pasazhIndex.length === 0) targetSel.value = "__new__";

  document.getElementById("confirmImport").addEventListener("click", async ()=>{
    let targetId = targetSel.value;
    const label = document.getElementById("updateLabelInput").value.trim();
    setLoading(true, "در حال ذخیره اطلاعات...");
    try{
      let name;
      if(targetId === "__new__"){
        name = document.getElementById("importNewName").value.trim();
        if(!name){ setLoading(false); showToast("اسم پاساژ رو وارد کن", "err"); return; }
        targetId = slugify(name);
      } else {
        const existing = pasazhIndex.find(p=>p.id===targetId);
        name = existing ? existing.name : "پاساژ";
      }

      let data = await loadPasazhData(targetId);
      if(!data) data = {name, lastUpdateLabel:"", lastUpdateDate:"", floors:[]};

        else data.floors.push(newFloor);

      if(idxEntry){ idxEntry.name = name; idxEntry.lastUpdateLabel = label; }
      else pasazhIndex.push({id: targetId, name, lastUpdateLabel: label});

      await switchToPasazh(targetId);

    }catch(err){
      showToast("خطا در ذخیره‌سازی. دوباره تلاش کن.", "err");
    }finally{
      setLoading(false);
    }
  });
});

/* ================= EXPORT / IMPORT SHARED JSON FILE (+ optional online sync) ================= */
async function buildBackupObject(){
  const all = {exportedAt: new Date().toISOString(), pasazhIndex, pasazhData: {}};
  for(const p of pasazhIndex){ all.pasazhData[p.id] = await loadPasazhData(p.id); }
  return all;
}

async function applyBackupObject(parsed){
  if(!parsed || !parsed.pasazhIndex || !parsed.pasazhData) throw new Error("bad format");
  for(const p of parsed.pasazhIndex){
    const data = parsed.pasazhData[p.id];
    if(data) await savePasazhData(p.id, normalizePasazh(data));
    const existing = pasazhIndex.find(x=>x.id===p.id);
    if(existing) Object.assign(existing, p);
    else pasazhIndex.push(p);
  }
  await saveIndex();
}

async function exportJsonBackup(){
  setLoading(true, "در حال آماده‌سازی فایل...");
  try{
    const all = await buildBackupObject();
    const blob = new Blob([JSON.stringify(all, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "backup-pasazh-" + fmtDateToday() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    markClean();
    showToast("فایل دانلود شد. اون رو روی فایل‌سرور جایگزین فایل قبلی کنید تا بقیه هم ببینن.", "ok");
  }catch(e){
    showToast("خطا در ذخیره‌سازی فایل", "err");
  }finally{
    setLoading(false);
  }
}

document.getElementById("jsonFileInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0]; e.target.value = "";
