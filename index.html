/* ---- Online sync (Cloudflare Pages Function + KV) with real per-user login ---- */
const SYNC_API = "/api/data";
const AUTH_TOKEN_KEY = "pasazh-manager-auth-token";
const AUTH_INFO_KEY = "pasazh-manager-auth-info";
let authToken = null;
let authInfo = null; // {username, role, allowedPasazhIds}

function loadAuthFromStorage(){
  try{
    authToken = localStorage.getItem(AUTH_TOKEN_KEY) || null;
    const raw = localStorage.getItem(AUTH_INFO_KEY);
    authInfo = raw ? JSON.parse(raw) : null;
  }catch(e){ authToken = null; authInfo = null; }
}
function saveAuthToStorage(){
  try{
    if(authToken) localStorage.setItem(AUTH_TOKEN_KEY, authToken); else localStorage.removeItem(AUTH_TOKEN_KEY);
    if(authInfo) localStorage.setItem(AUTH_INFO_KEY, JSON.stringify(authInfo)); else localStorage.removeItem(AUTH_INFO_KEY);
  }catch(e){}
}
function isLoggedIn(){ return !!authToken; }
function authHeaders(){
  return authToken ? { "Authorization": "Bearer " + authToken } : {};
}
function logout(){
  authToken = null; authInfo = null; saveAuthToStorage();
  stopAutoSync(); autoSyncEnabled = false;
  try{ localStorage.setItem(AUTO_SYNC_KEY, "0"); }catch(e){}
  showToast("از حساب خارج شدی", "ok");
}

function openLoginModal(onSuccess){
  openModal(`
    <h3>ورود به حساب آنلاین</h3>
    <p class="hint">برای دریافت/ارسال از سرور مشترک، اول باید وارد بشی. مدیر کل باید از قبل برات یه یوزر ساخته باشه.</p>
    <div class="field"><label>نام کاربری</label><input type="text" id="loginUser"></div>
    <div class="field"><label>رمز عبور</label><input type="password" id="loginPass"></div>
    <div class="modal-actions">
      <button class="btn btn-brass" id="loginSubmitBtn">ورود</button>
      <button class="btn btn-outline" onclick="window.__closeModal()">انصراف</button>
    </div>`);
  const submit = async ()=>{
    const username = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value;
    if(!username || !password){ showToast("نام کاربری و رمز رو وارد کن", "err"); return; }
    setLoading(true, "در حال ورود...");
    try{
      const res = await fetch("/api/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      setLoading(false);
      if(!res.ok){ showToast(data.error || "ورود ناموفق بود", "err"); return; }
      authToken = data.token;
      authInfo = { username: data.username, role: data.role, allowedPasazhIds: data.allowedPasazhIds || [] };
      saveAuthToStorage();
      closeModal();
      showToast("خوش اومدی، " + data.username, "ok");
      maybeCreateMonthlyBackup();
      if(onSuccess) onSuccess();
    }catch(e){
      setLoading(false);
      showToast("خطا در اتصال به سرور", "err");
    }
  };
  document.getElementById("loginSubmitBtn").addEventListener("click", submit);
  document.getElementById("loginPass").addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); submit(); } });
}

function ensureLoggedIn(onSuccess){
  if(isLoggedIn()){ onSuccess(); return; }
  openLoginModal(onSuccess);
}

async function pullFromServer(){
  ensureLoggedIn(async ()=>{
    setLoading(true, "در حال دریافت آخرین نسخه از سرور...");
    try{
      const res = await fetch(SYNC_API, { headers: authHeaders() });
      if(res.status === 401){ authToken=null; authInfo=null; saveAuthToStorage(); setLoading(false); showToast("نشستت منقضی شده، دوباره وارد شو", "err"); return; }
      const text = await res.text();
      let parsed;
      try{ parsed = JSON.parse(text); }
      catch(e){ throw new Error("سرور جواب معتبر نداد؛ احتمالاً /api/data هنوز دیپلوی نشده (کد " + res.status + ")"); }
      if(!res.ok) throw new Error((parsed && parsed.error) || ("خطای سرور " + res.status));
      if(!parsed){ setLoading(false); showToast("هنوز چیزی روی سرور ذخیره نشده", "err"); return; }
      await applyBackupObject(parsed);
      lastServerSnapshot = text;
      markClean();
      setLoading(false);
      showToast("آخرین نسخه از سرور دریافت شد", "ok");
      if(pasazhIndex.length) await switchToPasazh(currentPasazhId || pasazhIndex[0].id);
      else renderPasazhSelect();
    }catch(e){
      setLoading(false);
      showToast("خطا در دریافت از سرور: " + (e.message||""), "err");
    }
  });
}

async function pushToServer(){
  ensureLoggedIn(async ()=>{
    setLoading(true, "در حال ارسال به سرور...");
    try{
      const all = await buildBackupObject();
      const bodyStr = JSON.stringify(all);
      const res = await fetch(SYNC_API, {
        method: "POST",
        headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
        body: bodyStr
      });
      if(res.status === 401){ authToken=null; authInfo=null; saveAuthToStorage(); setLoading(false); showToast("نشستت منقضی شده، دوباره وارد شو", "err"); return; }
      if(!res.ok) throw new Error("server responded " + res.status);
      lastServerSnapshot = bodyStr;
      markClean();
      setLoading(false);
      showToast(authInfo && authInfo.role === "admin" ? "اطلاعات با موفقیت روی سرور ذخیره شد" : "تغییرات پاساژهای مجاز تو ارسال شد", "ok");
      if(authInfo && authInfo.role === "admin") createManualBackupSnapshot();
    }catch(e){
      setLoading(false);
      showToast("خطا در ارسال به سرور: " + (e.message||""), "err");
    }
  });
}

async function createManualBackupSnapshot(){
  try{
    await fetch("/api/backups", {
      method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
      body: JSON.stringify({ type: "manual" })
    });
  }catch(e){ /* silent — backup browsing will just be missing this one entry */ }
}

/* ---- Auto-sync: near-real-time background pull/push (polling-based) ---- */
const AUTO_SYNC_KEY = "pasazh-manager-autosync";
let autoSyncEnabled = false;
let lastServerSnapshot = null;
let autoPushTimer = null;
let autoPullInterval = null;

function isEditingActive(){
  return editingRowKey !== null || editingAllRowRef !== null || document.getElementById("overlay")?.classList.contains("open");
}

async function silentPull(){
  if(!autoSyncEnabled || !isLoggedIn()) return;
  try{
    const res = await fetch(SYNC_API, { headers: authHeaders() });
    if(res.status === 401){ authToken=null; authInfo=null; saveAuthToStorage(); stopAutoSync(); return; }
    if(!res.ok) return;
    const text = await res.text();
    if(text === lastServerSnapshot) return; // nothing new
    if(isEditingActive()) return; // don't yank the table out from under an active edit; try again next tick
    let parsed;
    try{ parsed = JSON.parse(text); }catch(e){ return; }
    if(!parsed){ lastServerSnapshot = text; return; }
    await applyBackupObject(parsed);
    lastServerSnapshot = text;
    markClean();
    renderPasazhSelect(); renderUpdateChip(); renderFloorRail();
    if(currentPasazhData){ if(currentFloorIdx === "ALL") renderAllTableOnly(); else renderTableOnly(); }
    else renderMain();
    showToast("یه به‌روزرسانی جدید از یکی دیگه دریافت شد", "ok");
  }catch(e){ /* silent — will retry next tick */ }
}

async function silentPush(){
  if(!autoSyncEnabled || !isLoggedIn()) return;
  try{
    const all = await buildBackupObject();
    const bodyStr = JSON.stringify(all);
    const res = await fetch(SYNC_API, {
      method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
      body: bodyStr
    });
    if(res.status === 401){ authToken=null; authInfo=null; saveAuthToStorage(); stopAutoSync(); return; }
    if(res.ok){ lastServerSnapshot = bodyStr; markClean(); }
  }catch(e){ /* silent — will retry on next edit */ }
}

function scheduleAutoPush(){
  if(!autoSyncEnabled || !isLoggedIn()) return;
  clearTimeout(autoPushTimer);
  autoPushTimer = setTimeout(silentPush, 3500);
}

function startAutoSync(){
  stopAutoSync();
  if(!autoSyncEnabled || !isLoggedIn()) return;
  autoPullInterval = setInterval(silentPull, 10000);
  silentPull();
}
function stopAutoSync(){
  if(autoPullInterval) clearInterval(autoPullInterval);
  autoPullInterval = null;
  clearTimeout(autoPushTimer);
}

function openSyncSettingsModal(){
  const statusLine = isLoggedIn()
    ? `وارد شدی به‌عنوان «${escapeHtml(authInfo.username)}» — ${authInfo.role==='admin' ? 'مدیر کل (دسترسی به همه‌ی پاساژها)' : 'کاربر محدود'}`
    : "وارد نشدی";
  openModal(`
    <h3>تنظیمات همگام‌سازی آنلاین</h3>
    <p class="hint">${statusLine}</p>
    <div class="modal-actions" style="margin-bottom:16px; flex-wrap:wrap;">
      ${isLoggedIn() ? '<button class="btn btn-outline" id="logoutBtn">خروج از حساب</button>' : '<button class="btn btn-brass" id="loginBtn">ورود</button>'}
      ${isLoggedIn() && authInfo.role==='admin' ? '<button class="btn btn-outline" id="manageUsersBtn">👥 مدیریت کاربران</button>' : ''}
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;">
        <input type="checkbox" id="autoSyncToggle" ${autoSyncEnabled?'checked':''}>
        همگام‌سازی خودکار و زنده
      </label>
      <p class="hint" style="margin-top:6px;">وقتی فعال باشه: تغییرات خودت چند ثانیه بعد خودکار فرستاده می‌شه، و تغییرات بقیه هم هر ۱۰ ثانیه خودکار میاد. نیاز به ورود داره.</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-brass" id="saveSyncPrefsBtn">ذخیره</button>
      <button class="btn btn-outline" onclick="window.__closeModal()">بستن</button>
    </div>`);
  const loginBtn = document.getElementById("loginBtn");
  if(loginBtn) loginBtn.addEventListener("click", ()=>{ closeModal(); openLoginModal(openSyncSettingsModal); });
  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{ logout(); closeModal(); openSyncSettingsModal(); });
  const manageBtn = document.getElementById("manageUsersBtn");
  if(manageBtn) manageBtn.addEventListener("click", ()=>{ closeModal(); openUserManagementModal(); });
  document.getElementById("saveSyncPrefsBtn").addEventListener("click", ()=>{
    autoSyncEnabled = document.getElementById("autoSyncToggle").checked;
    try{ localStorage.setItem(AUTO_SYNC_KEY, autoSyncEnabled ? "1" : "0"); }catch(e){}
    closeModal();
    if(autoSyncEnabled) ensureLoggedIn(()=> startAutoSync());
    else stopAutoSync();
    showToast("تنظیمات ذخیره شد", "ok");
  });
}

async function openUserManagementModal(){
  openModal(`<h3>مدیریت کاربران</h3><p class="hint">در حال بارگذاری...</p>`);
  try{
    const res = await fetch("/api/users", { headers: authHeaders() });

}

function renderUserManagementList(users){
  let html = `<h3>مدیریت کاربران</h3><div style="max-height:320px;overflow:auto;margin-bottom:14px;">`;
  if(users.length === 0) html += `<p class="hint">هنوز کاربری ساخته نشده.</p>`;
  users.forEach(u=>{
    const allowedNames = (u.allowedPasazhIds||[]).map(id=>{
      const p = pasazhIndex.find(x=>x.id===id);
      return p ? p.name : id;
    }).join("، ") || "—";
    html += `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);">
      <div style="min-width:0;">
        <b>${escapeHtml(u.username)}</b> <span style="font-size:11px;color:var(--slate-soft);">(${u.role==='admin'?'مدیر کل':'کاربر محدود'})</span>
        <div style="font-size:11.5px;color:var(--slate-soft);">${u.role==='admin' ? 'دسترسی به همه‌ی پاساژها' : 'دسترسی: '+escapeHtml(allowedNames)}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-outline small" data-act="edituser" data-username="${escapeHtml(u.username)}">ویرایش</button>
        <button class="btn btn-danger small" data-act="deluser" data-username="${escapeHtml(u.username)}">حذف</button>
      </div>
    </div>`;
  });
  html += `</div>
    <div class="modal-actions"><button class="btn btn-brass" id="addUserBtn">+ کاربر جدید</button><button class="btn btn-outline" onclick="window.__closeModal()">بستن</button></div>`;
  openModal(html);

  document.getElementById("addUserBtn").addEventListener("click", ()=> openUserEditModal(null));

const XLSX_TITLE_STYLE = {
  font:{ bold:true, sz:13, color:{rgb:"FFFFFF"}, name:"Tahoma" },
  fill:{ fgColor:{rgb:"1B2430"} },
  alignment:{ horizontal:"center", vertical:"center" }
};
const XLSX_HEADER_STYLE = {
  font:{ bold:true, color:{rgb:"FFFFFF"}, sz:11.5, name:"Tahoma" },
  fill:{ fgColor:{rgb:"2B3140"} },
  alignment:{ horizontal:"center", vertical:"center", wrapText:true },
  border:{
    top:{style:"thin", color:{rgb:"B98D3E"}}, bottom:{style:"medium", color:{rgb:"B98D3E"}},
    left:{style:"thin", color:{rgb:"B98D3E"}}, right:{style:"thin", color:{rgb:"B98D3E"}}
  }
};
const XLSX_BORDER_THIN = {
  top:{style:"thin", color:{rgb:"E3DDCC"}}, bottom:{style:"thin", color:{rgb:"E3DDCC"}},
  left:{style:"thin", color:{rgb:"E3DDCC"}}, right:{style:"thin", color:{rgb:"E3DDCC"}}
};
const XLSX_CELL_STYLE = {
  font:{ name:"Tahoma", sz:10.5 },
  alignment:{ horizontal:"center", vertical:"center", wrapText:true },
  border: XLSX_BORDER_THIN
};
const XLSX_CELL_STYLE_ALT = Object.assign({}, XLSX_CELL_STYLE, { fill:{ fgColor:{rgb:"F7F4EE"} } });
const XLSX_CELL_STYLE_UPDATED = Object.assign({}, XLSX_CELL_STYLE, { fill:{ fgColor:{rgb:"FBE0A0"} }, font:{ name:"Tahoma", sz:10.5, bold:true } });

function computeContentWidthFromRows(rows, col){
  let maxLen = col.length;
  rows.forEach(r=>{
    const len = String(r[col] === undefined ? "" : r[col]).length;
    if(len > maxLen) maxLen = len;
  });
  const wch = maxLen > 22 ? 22 : maxLen + 3;
  return Math.max(7, Math.min(26, wch));
}

function buildStyledSheetGeneric(headerCols, dataRows, updatedFlags, titleText, widths){
  const titleRow = new Array(Math.max(headerCols.length,1)).fill("");
  titleRow[0] = titleText;
  const aoa = [titleRow, headerCols, ...dataRows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  const titleAddr = XLSX.utils.encode_cell({r:0, c:0});
  if(ws[titleAddr]) ws[titleAddr].s = XLSX_TITLE_STYLE;
  if(headerCols.length > 1){
    ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0, c:headerCols.length-1} }];
  }
  headerCols.forEach((c, ci)=>{
    const addr = XLSX.utils.encode_cell({r:1, c:ci});
    if(ws[addr]) ws[addr].s = XLSX_HEADER_STYLE;
  });
  dataRows.forEach((row, ri)=>{
    const isUpdatedRow = !!updatedFlags[ri];
    headerCols.forEach((c, ci)=>{
      const addr = XLSX.utils.encode_cell({r: ri+2, c:ci});
      if(ws[addr]) ws[addr].s = isUpdatedRow ? XLSX_CELL_STYLE_UPDATED : ((ri % 2 === 0) ? XLSX_CELL_STYLE : XLSX_CELL_STYLE_ALT);
    });
  });

  ws['!cols'] = widths;
  ws['!rows'] = [{ hpt: 24 }, { hpt: 30 }];
  if(headerCols.length){
    const lastCol = XLSX.utils.encode_col(headerCols.length-1);
    ws['!autofilter'] = { ref: `A2:${lastCol}${aoa.length}` };
  }
  return ws;
}

function buildStyledSheet(floor, titleText){
  const visibleCols = floor.columns.filter(c=> !(floor.hiddenColumns||[]).includes(c));
  const dataRows = floor.rows.map(r=> visibleCols.map(c=> r[c]===undefined?"":r[c]));
  const updatedFlags = floor.rows.map(r=> !!r.__updatedAt);
  const widths = visibleCols.map(c=> ({ wch: computeContentWidthFromRows(floor.rows, c) }));
  return buildStyledSheetGeneric(visibleCols, dataRows, updatedFlags, titleText, widths);
}

function buildStyledSheetFilteredFloor(floor, titleText){
  const visibleCols = floor.columns.filter(c=> !(floor.hiddenColumns||[]).includes(c));
  const rows = getFilteredRows(floor);
  const dataRows = rows.map(r=> visibleCols.map(c=> r[c]===undefined?"":r[c]));
  const updatedFlags = rows.map(r=> !!r.__updatedAt);
  const widths = visibleCols.map(c=> ({ wch: computeContentWidthFromRows(rows, c) }));
  return buildStyledSheetGeneric(visibleCols, dataRows, updatedFlags, titleText, widths);
}

function buildStyledSheetFilteredAll(titleText){
  const cfg = getAllViewConfig();
  const unionCols = getUnionColumns();
  const visibleCols = unionCols.filter(c=> !(cfg.hiddenColumns||[]).includes(c));
  const entries = getFilteredAllEntries();
  const headerCols = ["طبقه", ...visibleCols];
  const dataRows = entries.map(e=> [currentPasazhData.floors[e.floorIdx].name, ...visibleCols.map(c=> e.row[c]===undefined?"":e.row[c])]);
  const updatedFlags = entries.map(e=> !!e.row.__updatedAt);
  const plainRows = entries.map(e=> e.row);
  const widths = [{wch:14}, ...visibleCols.map(c=> ({ wch: computeContentWidthFromRows(plainRows, c) }))];
  return buildStyledSheetGeneric(headerCols, dataRows, updatedFlags, titleText, widths);
}

/* ---- Image helpers (resize before upload to keep KV entries small) ---- */
function resizeImageToDataUrl(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function fileToDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function dataUrlToBlob(dataUrl){
  const [header, base64] = dataUrl.split(",");
  const mimeMatch = header.match(/data:(.*?);base64/);
  const mime = mimeMatch ? mimeMatch[1] : "application/octet-stream";
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], {type: mime});
}

function openDataUrlInNewTab(dataUrl){
  // مرورگرها نمی‌ذارن window.open مستقیم رو یه data: URL بره (صفحه‌ی خالی نشون می‌ده)،
  // پس اول تبدیلش می‌کنیم به یه blob: URL که این محدودیت رو نداره.
  const blob = dataUrlToBlob(dataUrl);
  const url = URL.createObjectURL(blob);
  window.open(url, "_blank");
  setTimeout(()=> URL.revokeObjectURL(url), 60000);
}

async function fetchJsonSafe(url, opts){
  const res = await fetch(url, opts);
  const text = await res.text();
  let data;
  try{ data = JSON.parse(text); }
  catch(e){
    throw new Error("سرور جواب معتبر (JSON) نداد؛ احتمالاً این قابلیت هنوز روی سرور دیپلوی نشده. (کد " + res.status + ")");
  }
  if(!res.ok) throw new Error(data.error || ("خطای سرور " + res.status));
  return data;
}

async function loadAndRenderMapImage(floor){

  }).join("");

async function generateMapExportImage(floor, cols){
  setLoading(true, "در حال ساخت خروجی تصویر...");
  try{
    const data = await fetchJsonSafe("/api/file?key=" + encodeURIComponent(floor.mapImageKey), { headers: authHeaders() });
    const img = new Image();
    await new Promise((resolve,reject)=>{ img.onload = resolve; img.onerror = reject; img.src = data.dataUrl; });

    const canvas = document.createElement("canvas");
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    (floor.mapPins || []).forEach(pin=>{
      const row = floor.rows[pin.rowIndex];
      if(!row) return;
      const px = (pin.x/100) * canvas.width;
      const py = (pin.y/100) * canvas.height;

      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI*2);
      ctx.fillStyle = "#B98D3E";
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
      ctx.fill(); ctx.stroke();

      const lines = cols.map(c=> row[c]).filter(v=> v && v !== "*").map(String);
      ctx.font = "bold 14px Tahoma, sans-serif";
      ctx.textAlign = "center";
      let ty = py + 22;
      lines.forEach(text=>{
        const metrics = ctx.measureText(text);
        const pad = 5;
        ctx.fillStyle = "rgba(255,255,255,.92)";
        ctx.fillRect(px - metrics.width/2 - pad, ty - 13, metrics.width + pad*2, 18);
        ctx.strokeStyle = "rgba(27,36,48,.15)"; ctx.lineWidth = 1;
        ctx.strokeRect(px - metrics.width/2 - pad, ty - 13, metrics.width + pad*2, 18);
        ctx.fillStyle = "#1B2430";
        ctx.fillText(text, px, ty);
        ty += 19;
      });
    });

    canvas.toBlob((blob)=>{
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `نقشه-${floor.name}-${fmtDateToday()}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=> URL.revokeObjectURL(url), 5000);
      setLoading(false);
      showToast("تصویر خروجی آماده و دانلود شد", "ok");
    }, "image/png");
  }catch(e){
    setLoading(false);
    showToast("خطا در ساخت خروجی: " + e.message, "err");
  }
}

function renderAttachmentsModal(row, onChange){
  const list = (row.__attachments||[]).map((a,i)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px;">

        <button class="btn btn-danger small" data-act="delatt" data-idx="${i}">حذف</button>
      </span>
    </div>`).join("") || '<p class="hint">هنوز پیوستی اضافه نشده.</p>';
  openModal(`
    <h3>پیوست‌های این واحد</h3>
    <p class="hint">عکس یا فایل (حداکثر ۴ مگابایت) اضافه کن — قرارداد اسکن‌شده، عکس مغازه و...</p>

    <div class="modal-actions"><button class="btn btn-outline" onclick="window.__closeModal()">بستن</button></div>
  `);

  document.getElementById("attFileInput").addEventListener("change", async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 6*1024*1024){ showToast("فایل خیلی بزرگه (حداکثر حدود ۴-۶ مگابایت)", "err"); return; }
    setLoading(true, "در حال آپلود پیوست...");
    try{
      const dataUrl = file.type.startsWith("image/") ? await resizeImageToDataUrl(file, 1600, 0.8) : await fileToDataUrl(file);
      const res = await fetch("/api/upload", {
        method: "POST",
        headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
        body: JSON.stringify({ dataUrl, name: file.name })
      });
      const data = await res.json();
      setLoading(false);
      if(!res.ok) throw new Error(data.error || "خطا در آپلود");
      row.__attachments = row.__attachments || [];
      row.__attachments.push({ key: data.key, name: file.name });
      markDirty();
      renderAttachmentsModal(row, onChange);
      if(onChange) onChange();
    }catch(err){
      setLoading(false);
      showToast("خطا در آپلود پیوست: " + err.message, "err");
    }
  });

  document.querySelectorAll('[data-act="viewatt"]').forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const a = row.__attachments[parseInt(btn.dataset.idx,10)];
      setLoading(true, "در حال بارگذاری فایل...");
      try{
        const data = await fetchJsonSafe("/api/file?key=" + encodeURIComponent(a.key), { headers: authHeaders() });
        setLoading(false);
        openDataUrlInNewTab(data.dataUrl);
      }catch(err){
        setLoading(false);
        showToast("خطا در نمایش فایل: " + err.message, "err");
      }
    });
  });
  document.querySelectorAll('[data-act="delatt"]').forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const idx = parseInt(btn.dataset.idx,10);
      row.__attachments.splice(idx,1);
      markDirty();
      renderAttachmentsModal(row, onChange);
      if(onChange) onChange();
    });
  });
}

async function maybeCreateMonthlyBackup(){

  try{

    const [jy, jm] = gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());

    });

}

/* ================= THEME (light/dark) ================= */
const THEME_KEY = "pasazh-manager-theme";
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("themeToggleBtn");
  if(btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
}
document.getElementById("themeToggleBtn").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(cur === "dark" ? "light" : "dark");
});

/* ================= INIT ================= */
function showSplashCredit(){
  const el = document.getElementById("splashCredit");
  if(!el) return;
  requestAnimationFrame(()=> el.classList.add("show"));
  setTimeout(()=>{
    el.classList.remove("show");
    setTimeout(()=> el.remove(), 600);
  }, 2200);
}

function attachFillHandles(wrap, rowSelector, getRowObj, rerender){
  wrap.querySelectorAll(".fill-handle").forEach(handle=>{
    handle.addEventListener("click", (e)=> e.stopPropagation());
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      const td = handle.closest("td[data-col]");
      const col = td.dataset.col;
      const startTr = td.closest(rowSelector);
      if(!startTr) return;
      const startObj = getRowObj(startTr);
      const value = startObj[col] || "";
      let dragRows = [startTr];
      startTr.classList.add("fill-preview-row");

      function onMove(ev){
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        const tr = el ? el.closest(rowSelector) : null;
        if(!tr || !wrap.contains(tr)) return;
        const allTrs = Array.from(wrap.querySelectorAll(rowSelector));
        const startIdx = allTrs.indexOf(startTr);
        const curIdx = allTrs.indexOf(tr);
        if(startIdx === -1 || curIdx === -1) return;
        const a = Math.min(startIdx, curIdx), b = Math.max(startIdx, curIdx);
        allTrs.forEach((t,i)=> t.classList.toggle("fill-preview-row", i>=a && i<=b));
        dragRows = allTrs.slice(a, b+1);
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        if(dragRows.length > 1){
          const now = new Date().toISOString();
          dragRows.forEach(tr=>{
            const obj = getRowObj(tr);
            obj[col] = value;
            obj.__updatedAt = now;
          });
          markDirty();
          showToast(`مقدار روی ${dragRows.length} ردیف کپی شد`, "ok");
          rerender();
        } else {
          wrap.querySelectorAll(".fill-preview-row").forEach(t=> t.classList.remove("fill-preview-row"));
        }
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}

function openCellZoomModal(colLabel, value, onSave){
  renderView();

  function renderView(){
    openModal(`
      <h3>${escapeHtml(colLabel)}</h3>
      <div class="cell-zoom-body">${value ? escapeHtml(value) : '<span style="color:var(--slate-soft)">(خالی)</span>'}</div>
      <div class="modal-actions">
        ${onSave ? '<button class="btn btn-brass" id="cellZoomEditBtn">ویرایش</button>' : ''}
        <button class="btn btn-outline" onclick="window.__closeModal()">بستن</button>
      </div>
    `);
    if(onSave){
      document.getElementById("cellZoomEditBtn").addEventListener("click", renderEdit);
    }
  }

  function renderEdit(){
    openModal(`
      <h3>${escapeHtml(colLabel)}</h3>
      <textarea id="cellZoomInput" class="cell-zoom-input" rows="5">${escapeHtml(value||"")}</textarea>
      <div class="modal-actions">
        <button class="btn btn-brass" id="cellZoomSave">ذخیره</button>
        <button class="btn btn-outline" id="cellZoomCancel">انصراف</button>
      </div>
    `);
    const input = document.getElementById("cellZoomInput");
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
    document.getElementById("cellZoomSave").addEventListener("click", ()=>{
      onSave(input.value);
      closeModal();
    });
    document.getElementById("cellZoomCancel").addEventListener("click", renderView);
    input.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && (e.ctrlKey || e.metaKey)){ e.preventDefault(); document.getElementById("cellZoomSave").click(); }
      else if(e.key === "Escape"){ e.preventDefault(); renderView(); }
    });
  }
}

function init(){
  let savedTheme = "light";
  try{ savedTheme = localStorage.getItem(THEME_KEY) || "light"; }catch(e){}
  applyTheme(savedTheme);

  try{ autoSyncEnabled = localStorage.getItem(AUTO_SYNC_KEY) === "1"; }catch(e){ autoSyncEnabled = false; }
  loadAuthFromStorage();

  const restored = loadLocalIfAny();
  renderPasazhSelect();
  if(restored){
    switchToPasazh(pasazhIndex[0].id);
  } else {
    renderMain();
  }
  showSplashCredit();
  if(autoSyncEnabled) startAutoSync();
  if(isLoggedIn()) maybeCreateMonthlyBackup();
}
init();
})();
