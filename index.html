<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШҜЩҒШӘШұ Ш«ШЁШӘ ЩҲШ§ШӯШҜЩҮШ§ | Щ…ШҜЫҢШұЫҢШӘ ЩҫШ§ШіШ§Ъҳ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!--
  ШӘЩҲШ¬ЩҮ ШҜШұШЁШ§ШұЩҮвҖҢЫҢ ШўЩҒЩ„Ш§ЫҢЩҶ ШЁЩҲШҜЩҶ:
  ЩҮЩ…ЩҮвҖҢЫҢ ШҜШ§ШҜЩҮвҖҢЩҮШ§ ЩҲ Щ…ЩҶШ·ЩӮ Ш§ЫҢЩҶ ШЁШұЩҶШ§Щ…ЩҮ Ъ©Ш§Щ…Щ„Ш§ЩӢ Щ…ШӯЩ„ЫҢ ЩҮШіШӘЩҶ ЩҲ ШЁЩҮ ЩҮЫҢЪҶ ШіШұЩҲШұЫҢ ЩҲШөЩ„ ЩҶЩ…ЫҢвҖҢШҙЩҶ.
  ЩҒЩӮШ· Ш®Ш· ЩҫШ§ЫҢЫҢЩҶ (Ъ©ШӘШ§ШЁШ®ЩҲЩҶЩҮвҖҢЫҢ Ш®ЩҲШ§ЩҶШҜЩҶ/ЩҶЩҲШҙШӘЩҶ Ш§Ъ©ШіЩ„) Ш§ШІ Ш§ЫҢЩҶШӘШұЩҶШӘ Щ„ЩҲШҜ Щ…ЫҢвҖҢШҙЩҮШҢ ЪҶЩҲЩҶ
  ШӯШ¬Щ…Шҙ ШІЫҢШ§ШҜЩҮ ЩҲ ЩҶЩ…ЫҢвҖҢШҙЩҮ Щ…ШіШӘЩӮЫҢЩ… ШҜШ§Ш®Щ„ ЩҮЩ…ЫҢЩҶ ЩҒШ§ЫҢЩ„ ЩҶЩҲШҙШӘШҙ.

  Ш§ЪҜЩҮ Щ…ЫҢвҖҢШ®ЩҲШ§ЫҢШҜ Ш§ЫҢЩҶ ШөЩҒШӯЩҮ ШӯШӘЫҢ ШЁШ§Шұ Ш§ЩҲЩ„ЫҢ Ъ©ЩҮ ШЁШ§ШІ Щ…ЫҢвҖҢШҙЩҮ ЩҮЩ… ШЁЩҮ Ш§ЫҢЩҶШӘШұЩҶШӘ ЩҶЫҢШ§ШІ ЩҶШҜШ§ШҙШӘЩҮ ШЁШ§ШҙЩҮ:
  1) ЫҢЪ©вҖҢШЁШ§Шұ (ШЁШ§ Ш§ЫҢЩҶШӘШұЩҶШӘ) Ш§ЫҢЩҶ ШўШҜШұШі ШұЩҲ ШЁШ§ШІ Ъ©ЩҶЫҢШҜ ЩҲ ЩҒШ§ЫҢЩ„ ШұЩҲ Ш°Ш®ЫҢШұЩҮ Ъ©ЩҶЫҢШҜ:
     https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js
  2) ЩҒШ§ЫҢЩ„ ШҜШ§ЩҶЩ„ЩҲШҜ ШҙШҜЩҮ ШұЩҲ ШЁШ§ Ш§ШіЩ… "xlsx.bundle.js" Ъ©ЩҶШ§Шұ ЩҮЩ…ЫҢЩҶ ЩҒШ§ЫҢЩ„ HTML
     (ШӘЩҲ ЩҮЩ…ЩҲЩҶ ЩҫЩҲШҙЩҮвҖҢЫҢ ЩҒШ§ЫҢЩ„вҖҢШіШұЩҲШұ) ШЁШ°Ш§ШұЫҢШҜ.
  3) Ш®Ш· ШІЫҢШұ ШұЩҲ ШЁЩҮ Ш§ЫҢЩҶ ШӘШәЫҢЫҢШұ ШЁШҜЫҢШҜ:
     <script src="xlsx.bundle.js"></script>
  Ш§ШІ Ш§ЫҢЩҶ ШЁЩҮ ШЁШ№ШҜ ШҜЫҢЪҜЩҮ ЩҮЫҢЪҶвҖҢЩҲЩӮШӘ ШЁЩҮ Ш§ЫҢЩҶШӘШұЩҶШӘ ЩҶЫҢШ§ШІ ЩҶШҜШ§ШұЩҮШҢ ШӯШӘЫҢ ШЁШ§Шұ Ш§ЩҲЩ„.
-->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root{
    --ink:#1B2430; --ink-2:#242F3E;
    --paper:#F7F4EE; --paper-2:#EFEAE0;
    --brass:#B98D3E; --brass-light:#D9B876;
    --slate:#2B3140; --slate-soft:#6B7180;
    --settled:#4C7A5B; --settled-bg:#E6EEE8;
    --debt:#B24C4C; --debt-bg:#F5E6E6;
    --updated-bg:#FBE0A0;
    --line:#DCD5C4; --radius:12px;
    --card-bg:#fff; --input-bg:#fff;
    --row-alt:#FCFAF5; --row-hover:#FBF9F4; --row-alt-hover:#FBF6EA;
  }
  html[data-theme="dark"]{
    --ink:#0F1319; --ink-2:#161C25;
    --paper:#171B21; --paper-2:#20252D;
    --brass:#C79A4B; --brass-light:#E0B979;
    --slate:#E7E3D8; --slate-soft:#93A0AC;
    --settled:#7FBF95; --settled-bg:#20342A;
    --debt:#E68686; --debt-bg:#3A2426;
    --updated-bg:#4A3A16;
    --line:#333B45;
    --card-bg:#20252D; --input-bg:#262C35;
    --row-alt:#252B34; --row-hover:#282F39; --row-alt-hover:#2B333E;
  }
  html[data-theme="dark"] body{ background:var(--paper); }
  button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; border-radius:4px; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ font-family:'Vazirmatn', Tahoma, 'Segoe UI', Arial, sans-serif; background:var(--paper); color:var(--slate); min-height:100vh; transition:background-color .25s ease, color .25s ease; animation:pageIn .4s ease-out; }
  @keyframes pageIn{ from{opacity:0;} to{opacity:1;} }
  ::-webkit-scrollbar{height:10px;width:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .topbar{ background:linear-gradient(155deg, var(--ink), var(--ink-2)); color:#fff; padding:14px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:50; box-shadow:0 3px 16px rgba(0,0,0,.22); }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; margin-left:8px; }
  .brand .mark{ width:30px;height:30px;border-radius:8px; background:linear-gradient(155deg, var(--brass-light), var(--brass)); display:flex;align-items:center;justify-content:center; color:var(--ink); font-weight:800; font-size:14px; box-shadow:0 2px 8px rgba(185,141,62,.4); }
  select, input[type=text], input[type=number], input[type=date]{ font-family:inherit; background:var(--input-bg); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px; color:var(--slate); outline:none; transition:border-color .15s, box-shadow .15s, background-color .2s; }
  select:focus, input:focus{ border-color:var(--brass); box-shadow:0 0 0 3px rgba(185,141,62,.18); }
  .topbar select{ min-width:170px; }
  .pasazh-picker{ display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:10px; padding:2px 4px 2px 10px; transition:background-color .15s, border-color .15s; }
  .pasazh-picker:hover{ background:rgba(255,255,255,.13); border-color:rgba(217,184,118,.4); }
  .pasazh-picker-icon{ font-size:14px; opacity:.85; }
  .pasazh-picker select{ background:transparent; border:none; color:#fff; font-weight:700; padding:8px 4px; min-width:150px; }
  .pasazh-picker select:focus{ box-shadow:none; }
  .pasazh-picker select option{ color:var(--slate); background:var(--card-bg); font-weight:500; }
  .btn{ border:none; border-radius:9px; padding:9px 15px; font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; transition:transform .12s ease, box-shadow .12s ease, background-color .15s ease, color .15s ease, border-color .15s ease; }
  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:scale(.97) translateY(0); }
  .btn-brass{ background:linear-gradient(155deg, var(--brass-light), var(--brass)); color:#fff; box-shadow:0 2px 8px rgba(185,141,62,.35); }
  .btn-brass:hover{ box-shadow:0 4px 14px rgba(185,141,62,.5); }
  .btn-ghost{ background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.22); }
  .btn-ghost:hover{ background:rgba(255,255,255,.16); }
  .btn-outline{ background:var(--card-bg); color:var(--slate); border:1px solid var(--line); }
  .btn-outline:hover{ border-color:var(--brass); color:var(--brass); box-shadow:0 2px 8px rgba(185,141,62,.15); }
  .btn-danger{ background:var(--debt-bg); color:var(--debt); }
  .btn-danger:hover{ box-shadow:0 2px 8px rgba(178,76,76,.25); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none !important; }
  .btn.small{ padding:5px 9px; font-size:12px; }
  .spacer{ flex:1; }
  .update-chip{ display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); padding:6px 12px; border-radius:999px; font-size:12.5px; color:#EAE3D3; transition:background-color .2s; }
  .update-chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--brass-light); box-shadow:0 0 0 3px rgba(217,184,118,.25); }
  .mini-btn{ border:none; background:rgba(255,255,255,.15); color:#fff; border-radius:6px; padding:2px 7px; font-size:11px; cursor:pointer; transition:background-color .15s; }
  .mini-btn:hover{ background:rgba(255,255,255,.28); }

  .menu-grid-label{ font-size:11px; font-weight:700; color:var(--slate-soft); margin:16px 2px 7px; letter-spacing:.4px; }
  .menu-grid-label:first-child{ margin-top:0; }
  .menu-tiles{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .menu-tile{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; background:var(--paper-2); border:1px solid var(--line); border-radius:12px; padding:16px 10px; cursor:pointer; font-family:inherit; font-size:12.5px; color:var(--slate); font-weight:600; text-align:center; transition:transform .15s, box-shadow .15s, border-color .15s, background-color .15s; }
  .menu-tile:hover{ transform:translateY(-3px); box-shadow:0 10px 22px rgba(185,141,62,.2); border-color:var(--brass); background:var(--card-bg); }
  .menu-tile:active{ transform:translateY(-1px) scale(.98); }
  .menu-tile-icon{ font-size:23px; line-height:1; }
  .menu-tile.danger{ color:var(--debt); }
  .menu-tile.danger:hover{ border-color:var(--debt); box-shadow:0 10px 22px rgba(178,76,76,.2); background:var(--debt-bg); }

  .layout{ display:flex; align-items:flex-start; min-height:calc(100vh - 64px); }
  .floor-rail{ width:180px; flex-shrink:0; padding:20px 10px; display:flex; flex-direction:column; gap:6px; position:sticky; top:64px; max-height:calc(100vh - 64px); overflow-y:auto; }
  .floor-tab{ background:var(--paper-2); border:1px solid var(--line); border-left:none; border-radius:10px 0 0 10px; padding:9px 12px; font-size:13px; font-weight:600; cursor:pointer; color:var(--slate-soft); text-align:right; margin-left:-1px; display:flex; align-items:center; justify-content:space-between; gap:6px; transition:background-color .15s, box-shadow .15s, color .15s, transform .1s; }
  .floor-tab:hover{ transform:translateX(-2px); }
  .floor-tab .floor-main{ min-width:0; }
  .floor-tab .count{ font-weight:400; font-size:11px; opacity:.7; display:block; margin-top:2px; }
  .floor-tab.active{ background:var(--paper); color:var(--ink); border-color:var(--brass); box-shadow:-3px 0 0 var(--brass) inset, 0 2px 8px rgba(0,0,0,.05); }
  .floor-icon-btn{ border:none; background:transparent; cursor:pointer; font-size:12px; opacity:.55; padding:2px; transition:opacity .15s, transform .15s; }
  .floor-icon-btn:hover{ opacity:1; transform:scale(1.15); }
  .floor-tab.all-floors-tab{ background:var(--paper-2); font-weight:700; border-bottom:2px solid var(--line); margin-bottom:4px; }
  .floor-tab.all-floors-tab.active{ box-shadow:-3px 0 0 var(--brass) inset, 0 2px 8px rgba(0,0,0,.05); }
  .add-floor-btn{ margin-top:6px; border:1px dashed var(--line); background:transparent; color:var(--slate-soft); border-radius:8px; padding:8px; font-size:12.5px; cursor:pointer; transition:border-color .15s, color .15s; }
  .add-floor-btn:hover{ border-color:var(--brass); color:var(--brass); }
  .main{ flex:1; min-width:0; padding:22px 24px 40px; }

  .stat-cards{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; margin-bottom:10px; }
  .stat-card{ background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); padding:11px 18px; min-width:110px; box-shadow:0 1px 4px rgba(27,36,48,.04); animation:fadeInRow .3s ease both; transition:background-color .2s, transform .15s, box-shadow .15s; }
  .stat-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(27,36,48,.1); }
  .stat-card .num{ font-size:19px; font-weight:800; color:var(--ink); display:block; font-variant-numeric:tabular-nums; }
  .stat-card .lbl{ font-size:11.5px; color:var(--slate-soft); }
  .stat-card.debt .num{ color:var(--debt); }
  .stat-card.settled .num{ color:var(--settled); }
  .stat-card.updated .num{ color:var(--brass); }
  .stat-group{ background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); padding:8px 14px; box-shadow:0 1px 4px rgba(27,36,48,.04); animation:fadeInRow .3s ease both; }
  .stat-group-head{ display:flex; align-items:center; justify-content:space-between; gap:14px; font-size:11.5px; font-weight:700; color:var(--slate-soft); margin-bottom:6px; }
  .stat-remove{ border:none; background:transparent; cursor:pointer; color:var(--debt); font-size:11px; opacity:.55; padding:0; }
  .stat-remove:hover{ opacity:1; }
  .stat-group-chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .stat-chip{ background:var(--paper-2); border-radius:999px; padding:3px 10px; font-size:12px; color:var(--slate); white-space:nowrap; }
  .stat-chip b{ color:var(--brass); font-variant-numeric:tabular-nums; }
  .add-stat-btn{ align-self:center; }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); padding:11px 14px; margin-bottom:10px; box-shadow:0 1px 4px rgba(27,36,48,.04); transition:background-color .2s; }
  .toolbar input[type=text]{ min-width:200px; flex:1; }
  .filter-select{ min-width:120px; }
  .result-count{ font-size:12.5px; color:var(--slate-soft); margin-inline-start:auto; white-space:nowrap; }
  .updated-check{ display:flex; align-items:center; gap:6px; font-size:12.5px; white-space:nowrap; color:var(--slate); }
  .date-filter-active{ border-color:var(--brass) !important; color:var(--brass) !important; background:var(--paper-2) !important; font-weight:700; }
  .global-search-item{ padding:10px 8px; border-bottom:1px solid var(--line); cursor:pointer; border-radius:8px; transition:background-color .12s; }
  .global-search-item:hover{ background:var(--paper-2); }
  .global-search-item-title{ font-size:13.5px; font-weight:600; color:var(--slate); }
  .global-search-item-meta{ font-size:11.5px; color:var(--slate-soft); margin-top:2px; }
  .tag-expired{ background:var(--debt-bg); color:var(--debt); }
  .tag-expiring{ background:#FBE0A0; color:#8a5a00; }
  html[data-theme="dark"] .tag-expiring{ background:#5a4319; color:#f0c96a; }
  .map-pin{ position:absolute; width:18px; height:18px; background:var(--brass); border:2px solid #fff; border-radius:50%; transform:translate(-50%,-50%); cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.35); transition:transform .12s, background-color .12s; }
  .map-pin:hover{ background:var(--debt); transform:translate(-50%,-50%) scale(1.35); z-index:5; }

  .table-wrap{ background:var(--card-bg); border:1px solid var(--line); border-radius:var(--radius); overflow:auto; max-height:calc(100vh - 320px); box-shadow:0 1px 6px rgba(27,36,48,.05); transition:background-color .2s; }
  table{ border-collapse:collapse; width:100%; font-size:13px; min-width:600px; table-layout:fixed; }
  thead th:first-child, tbody td:first-child{ position:sticky; right:0; z-index:6; }
  thead th:first-child{ z-index:9; }
  tbody td:first-child{ background:var(--card-bg); box-shadow:1px 0 0 var(--line); }
  tbody tr:nth-child(even) td:first-child{ background:var(--row-alt); }
  table.table-auto{ table-layout:fixed; }
  table.table-auto th, table.table-auto td{ padding:8px 12px; }
  table.table-auto tbody td{ max-height:70px; }
  table.table-auto .cell-clamp{ display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  table.table-auto thead th:nth-child(1), table.table-auto thead th:nth-child(2){ position:sticky; z-index:9; }
  table.table-auto thead th:nth-child(1){ right:0; }
  table.table-auto thead th:nth-child(2){ right:112px; }
  table.table-auto tbody td:nth-child(1), table.table-auto tbody td:nth-child(2){ position:sticky; z-index:5; background:var(--card-bg); }
  table.table-auto tbody tr:nth-child(even) td:nth-child(1), table.table-auto tbody tr:nth-child(even) td:nth-child(2){ background:var(--row-alt); }
  table.table-auto tbody td:nth-child(1){ right:0; }
  table.table-auto tbody td:nth-child(2){ right:112px; box-shadow:1px 0 0 var(--line); }
  thead th{ position:sticky; top:0; background:linear-gradient(180deg, var(--ink-2), #1E2836); color:#EFEAE0; padding:10px 10px; text-align:center; font-weight:600; white-space:normal; word-break:break-word; line-height:1.4; border-left:1px solid rgba(255,255,255,.06); font-size:12px; vertical-align:middle; cursor:pointer; user-select:none; z-index:7; box-shadow:0 3px 6px rgba(0,0,0,.18); }
  thead th:hover{ background:linear-gradient(180deg, #2C3A4C, #1E2836); }
  th.col-th{ position:relative; }
  .col-resize-handle{ position:absolute; top:0; bottom:0; left:0; width:6px; cursor:col-resize; }
  tbody td:first-child{ position:relative; }
  .row-resize-handle{ position:absolute; left:0; right:0; bottom:-4px; height:8px; cursor:row-resize; z-index:5; }
  .row-resize-handle:hover, .row-resize-handle.active{ background:rgba(185,141,62,.55); }
  tbody td[data-col]{ cursor:zoom-in; position:relative; text-align:center; }
  tbody td{ text-align:center; }
  tbody td:first-child{ text-align:center; }
  .fill-handle{ position:absolute; bottom:0; left:0; width:9px; height:9px; background:var(--brass); border:1.5px solid var(--card-bg); border-radius:2px; cursor:crosshair; opacity:0; transition:opacity .12s; z-index:3; }
  td[data-col]:hover .fill-handle{ opacity:1; }
  tr.fill-preview-row{ background:rgba(185,141,62,.18) !important; }
  tr.fill-preview-row td:first-child{ background:rgba(185,141,62,.18) !important; }
  .cell-zoom-body{ font-size:15.5px; line-height:2; white-space:pre-wrap; word-break:break-word; color:var(--slate); max-height:60vh; overflow:auto; padding:8px 4px; }
  .cell-zoom-input{ width:100%; font-family:inherit; font-size:15px; line-height:1.9; padding:12px; border:1px solid var(--line); border-radius:8px; background:var(--input-bg); color:var(--slate); resize:vertical; min-height:110px; }

  .splash-credit{ position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; background:rgba(15,19,25,.4); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity .5s ease; }
  .splash-credit.show{ opacity:1; }
  .splash-credit-inner{ background:linear-gradient(155deg, var(--ink), var(--ink-2)); color:#EFEAE0; padding:22px 44px; border-radius:16px; font-size:18px; font-weight:800; letter-spacing:.3px; box-shadow:0 20px 60px rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.12); animation:modalIn .35s ease-out; text-align:center; }
  .splash-credit-inner small{ display:block; font-size:11.5px; font-weight:500; color:var(--brass-light); margin-top:6px; letter-spacing:0; }
  .col-resize-handle:hover, .col-resize-handle.active{ background:rgba(185,141,62,.6); }
  tbody td{ padding:8px 10px; border-bottom:1px solid var(--line); color:var(--slate); white-space:normal; word-break:break-word; }

<script>
(function(){
"use strict";

/* ================= STATE ================= */
let pasazhIndex = [];      // [{id, name, lastUpdateLabel, lastUpdateDate}]
let pasazhData = {};       // id -> {name, lastUpdateLabel, lastUpdateDate, floors:[...]}
let currentPasazhId = null;
let currentPasazhData = null;
let currentFloorIdx = 0;
let activeFilters = {};
let searchText = "";
let onlyUpdated = false;
let dateFilter = null; // {col, from, to, fromStr, toStr}
let rialFilter = null; // "ЫҢЪ© ШұЫҢШ§Щ„ЫҢ" | "ШҜЩҲ ШұЫҢШ§Щ„ЫҢ" | null
let expiryFilter = null; // "expired" | "soon" | null

function gregorianToJalali(gy, gm, gd){
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let gy2 = (gm > 2) ? (gy + 1) : gy;
  let days = 355666 + (365*gy) + Math.floor((gy2+3)/4) - Math.floor((gy2+99)/100) + Math.floor((gy2+399)/400) + gd + g_d_m[gm-1];
  let jy = -1595 + (33 * Math.floor(days/12053));
  days %= 12053;
  jy += 4 * Math.floor(days/1461);
  days %= 1461;
  if(days > 365){ jy += Math.floor((days-1)/365); days = (days-1) % 365; }
  let jm, jd;
  if(days < 186){ jm = 1 + Math.floor(days/31); jd = 1 + (days % 31); }
  else { jm = 7 + Math.floor((days-186)/30); jd = 1 + ((days-186) % 30); }
  return [jy, jm, jd];
}
function todayJalaliNum(){
  const now = new Date();
  const [jy,jm,jd] = gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
  return jy*10000 + jm*100 + jd;
}
function jalaliNumPlusMonths(baseNum, months){
  const jy = Math.floor(baseNum/10000), jm = Math.floor((baseNum%10000)/100), jd = baseNum%100;
  const totalM = (jm - 1) + months;
  const newY = jy + Math.floor(totalM/12);
  const newM = (totalM % 12) + 1;
  return newY*10000 + newM*100 + jd;
}
function getExpiryStatus(row, column){
  if(!column) return null;
  const num = parseFlexibleDate(row[column]);
  if(num === null) return null;
  const today = todayJalaliNum();
  if(num < today) return "expired";
  const settings = currentPasazhData ? currentPasazhData.expirySettings : null;
  const months = settings ? (settings.months || 2) : 2;
  const threshold = jalaliNumPlusMonths(today, months);
  if(num <= threshold) return "soon";
  return null;
}
let editingRowKey = null;
let hasUnsavedChanges = false;

const LOCAL_KEY = "pasazh-manager-db-v1";

/* ================= HELPERS ================= */
function slugify(name){
  const base = (name || "pasazh").trim().replace(/[\s\/\\'"]+/g, "-").slice(0, 40);
  return (base || "pasazh") + "-" + Math.random().toString(36).slice(2,7);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function fmtDateToday(){ return new Date().toISOString().slice(0,10); }
function normalizeDigits(str){
  if(str === undefined || str === null) return str;
  const persian = "Ы°ЫұЫІЫіЫҙЫөЫ¶Ы·ЫёЫ№";
  const arabic = "Щ ЩЎЩўЩЈЩӨЩҘЩҰЩ§ЩЁЩ©";
  return String(str).replace(/[Ы°-Ы№Щ -Щ©]/g, (ch)=>{
    let idx = persian.indexOf(ch);
    if(idx > -1) return String(idx);
    idx = arabic.indexOf(ch);
    if(idx > -1) return String(idx);
    return ch;
  });
}
function bumpYear(str){
  const s = normalizeDigits(String(str||""));
  const m = s.match(/\d{4}/);
  if(!m) return str;
  const y = parseInt(m[0],10) + 1;
  return s.slice(0,m.index) + y + s.slice(m.index + m[0].length);
}
function looksLikeDate(v){
  if(!v) return false;
  return /^\d{2,4}[\/\-.]\d{1,2}[\/\-.]\d{1,2}$/.test(normalizeDigits(String(v).trim()));
}
function parseFlexibleDate(v){
  if(!v) return null;
  const m = normalizeDigits(String(v).trim()).match(/^(\d{2,4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if(!m) return null;
  const y = parseInt(m[1],10), mo = parseInt(m[2],10), d = parseInt(m[3],10);
  if(mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return y*10000 + mo*100 + d; // comparable number, e.g. 1404/1/5 -> 14040105
}
function getDateLikeColumns(columns, rows){
  return columns.filter(c=>{
    const vals = rows.map(r=>r[c]).filter(v=>v);
    if(vals.length === 0) return false;
    const matches = vals.filter(v=>looksLikeDate(v)).length;
    return matches / vals.length > 0.25;
  });
}

function findColumnByHints(columns, hints){
  return columns.find(c=> hints.every(h=> c.includes(h)));
}
function isAlaeddinOwner(name){
  if(!name) return false;
  const n = String(name).trim()
    .replace(/[\u200c\s]/g, "")   // remove ZWNJ and spaces (Ш№Щ„Ш§ЫҢвҖҢШ§Щ„ШҜЫҢЩҶ -> Ш№Щ„Ш§ЫҢШ§Щ„ШҜЫҢЩҶ)
    .replace(/[ШЎШЈШҘШҰЩ”]/g, "")        // remove hamza variants (Ш№Щ„Ш§ШЎШ§Щ„ШҜЫҢЩҶ -> Ш№Щ„Ш§Ш§Щ„ШҜЫҢЩҶ)
    .replace(/ЩҠ/g, "ЫҢ")
    .replace(/Щғ/g, "Ъ©");
  return n.startsWith("Ш№Щ„Ш§") && n.includes("Ш§Щ„ШҜЫҢЩҶ");
}
function isRentedRow(row, statusCol, tenantNameCol){
  if(statusCol && row[statusCol] !== undefined && row[statusCol] !== ""){
    const v = String(row[statusCol]).trim();
    if(v === "Щ…ШіШӘШ§Ш¬Шұ") return true;
    if(v === "Щ…Ш§Щ„Ъ©") return false;
  }
  if(tenantNameCol){
    const v = String(row[tenantNameCol]||"").trim();
    return v !== "" && v !== "*";
  }
  return false;
}
function getRialType(row, columns){
  const ownerCol = findColumnByHints(columns, ["ЩҶШ§Щ…","Щ…Ш§Щ„Ъ©"]) || findColumnByHints(columns, ["Щ…Ш§Щ„Ъ©"]);
  if(!ownerCol) return null;
  const statusCol = findColumnByHints(columns, ["ЩҲШ¶Ш№ЫҢШӘ","ЩҲШ§ШӯШҜ"]);
  const tenantNameCol = findColumnByHints(columns, ["ЩҶШ§Щ…","Щ…ШіШӘШ§Ш¬Шұ"]);
  if(!isRentedRow(row, statusCol, tenantNameCol)) return null;
  return isAlaeddinOwner(row[ownerCol]) ? "ЫҢЪ© ШұЫҢШ§Щ„ЫҢ" : "ШҜЩҲ ШұЫҢШ§Щ„ЫҢ";
}
function openDateFilterModal(columns, currentFilter, onApply, onClear){
  const options = columns.map(c=>`<option value="${escapeHtml(c)}" ${currentFilter && currentFilter.col===c?'selected':''}>${escapeHtml(c)}</option>`).join("");
  openModal(`
    <h3>ЩҒЫҢЩ„ШӘШұ ШЁШұ Ш§ШіШ§Ші ШӘШ§ШұЫҢШ®</h3>
    <p class="hint">ЫҢЩҮ ШіШӘЩҲЩҶ ШӘШ§ШұЫҢШ® ЩҲ ЫҢЩҮ ШЁШ§ШІЩҮ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶ. ЩҒШұЩ…ШӘвҖҢЩҮШ§ЫҢ Щ…Ш®ШӘЩ„ЩҒ (ШЁШ§ ЫҢШ§ ШЁШҜЩҲЩҶ ШөЩҒШұ Ш§ШЁШӘШҜШ§ЫҢЫҢШҢ Ш¬ШҜШ§Ъ©ЩҶЩҶШҜЩҮ / ЫҢШ§ -) ШӘШҙШ®ЫҢШө ШҜШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҶ вҖ” Щ…Ш«Щ„Ш§ЩӢ 1404/1/5 ЩҲ 1404/01/05 ЫҢЪ©ЫҢ ШӯШіШ§ШЁ Щ…ЫҢвҖҢШҙЩҶ.</p>
    <div class="field"><label>ШіШӘЩҲЩҶ ШӘШ§ШұЫҢШ®</label><select id="dateFilterCol">${options}</select></div>
    <div class="field"><label>Ш§ШІ ШӘШ§ШұЫҢШ® (Ш§Ш®ШӘЫҢШ§ШұЫҢ)</label><input type="text" id="dateFilterFrom" placeholder="Щ…Ш«Щ„Ш§ 1404/01/01" value="${currentFilter && currentFilter.fromStr ? escapeHtml(currentFilter.fromStr) : ''}"></div>
    <div class="field"><label>ШӘШ§ ШӘШ§ШұЫҢШ® (Ш§Ш®ШӘЫҢШ§ШұЫҢ)</label><input type="text" id="dateFilterTo" placeholder="Щ…Ш«Щ„Ш§ 1404/12/29" value="${currentFilter && currentFilter.toStr ? escapeHtml(currentFilter.toStr) : ''}"></div>
    <div class="modal-actions">
      <button class="btn btn-brass" id="applyDateFilterBtn">Ш§Ш№Щ…Ш§Щ„ ЩҒЫҢЩ„ШӘШұ</button>
      ${currentFilter ? '<button class="btn btn-danger" id="clearDateFilterBtn">ЩҫШ§Ъ©вҖҢЪ©ШұШҜЩҶ ЩҒЫҢЩ„ШӘШұ ШӘШ§ШұЫҢШ®</button>' : ''}
      <button class="btn btn-outline" onclick="window.__closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button>
    </div>
  `);
  document.getElementById("applyDateFilterBtn").addEventListener("click", ()=>{
    const col = document.getElementById("dateFilterCol").value;
    const fromStr = document.getElementById("dateFilterFrom").value.trim();
    const toStr = document.getElementById("dateFilterTo").value.trim();
    if(!fromStr && !toStr){ showToast("ШӯШҜШ§ЩӮЩ„ ЫҢЪ©ЫҢ Ш§ШІ ШӘШ§ШұЫҢШ®вҖҢЩҮШ§ЫҢ Ш§ШІ/ШӘШ§ ШұЩҲ ЩҲШ§ШұШҜ Ъ©ЩҶ", "err"); return; }
    if(fromStr && !parseFlexibleDate(fromStr)){ showToast("ЩҒШұЩ…ШӘ В«Ш§ШІ ШӘШ§ШұЫҢШ®В» ШҜШұШіШӘ ЩҶЫҢШіШӘ", "err"); return; }
    if(toStr && !parseFlexibleDate(toStr)){ showToast("ЩҒШұЩ…ШӘ В«ШӘШ§ ШӘШ§ШұЫҢШ®В» ШҜШұШіШӘ ЩҶЫҢШіШӘ", "err"); return; }
    closeModal();
    onApply({ col, from: fromStr ? parseFlexibleDate(fromStr) : null, to: toStr ? parseFlexibleDate(toStr) : null, fromStr, toStr });
  });
  const clearBtn = document.getElementById("clearDateFilterBtn");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ closeModal(); onClear(); });
}
function showToast(msg, type, action){
  const t = document.getElementById("toast");
  t.innerHTML = "";
  const span = document.createElement("span");
  span.textContent = msg;
  t.appendChild(span);
  if(action){
    const btn = document.createElement("button");
    btn.textContent = action.label;
    btn.className = "toast-action-btn";
    btn.addEventListener("click", ()=>{ action.onClick(); t.className = "toast"; });
    t.appendChild(btn);
  }
  t.className = "toast show" + (type ? " " + type : "");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>{ t.className = "toast"; }, action ? 6000 : 3400);
}

/* ================= NORMALIZATION (backward compatibility) ================= */
function detectFilterableColumns(floor){
  const result = [];
  floor.columns.forEach(col=>{
    const values = floor.rows.map(r=>r[col]).filter(v=>v!==undefined && v!=="");
    if(values.length === 0) return;
    const distinct = Array.from(new Set(values));
    if(distinct.length > 1 && distinct.length <= 12 && distinct.length < values.length * 0.6){
      result.push({col, options: distinct.sort()});
    }
  });
  return result;
}
function normalizeFloor(floor){
  floor.hiddenColumns = floor.hiddenColumns || [];
  floor.columnWidths = floor.columnWidths || {};
  floor.rows = floor.rows || [];
  floor.statColumns = floor.statColumns || [];

  // de-duplicate column names: two identically-named columns share one data
  // slot on each row, which made row-wide edits silently overwrite each other.
  const seenNames = {};
  floor.columns = (floor.columns||[]).map(c=>{
    if(seenNames[c] === undefined){ seenNames[c] = 1; return c; }
    seenNames[c]++;
    return c + " (" + seenNames[c] + ")";
  });

  if(!floor.filterColumns){
    floor.filterColumns = detectFilterableColumns(floor).map(o=>o.col);
  }
  return floor;
}
function normalizePasazh(data){
  data.floors = (data.floors||[]).map(normalizeFloor);
  data.allView = data.allView || {hiddenColumns:[], columnWidths:{}, filterColumns:[], statColumns:[], columnOrder:null, autoHiddenApplied:false};
  data.expirySettings = data.expirySettings || { column: null, months: 2 };
  return data;
}

/* ================= EXCEL PARSING (import) ================= */
function parseWorkbook(arrayBuffer){
  const wb = XLSX.read(arrayBuffer, {type:"array"});
  const floors = [];
  wb.SheetNames.forEach(sheetName=>{
    const ws = wb.Sheets[sheetName];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:"", raw:false});
    if(!aoa || aoa.length < 2) return;

    let headerRowIdx = 1;
    for(let i=0; i<Math.min(aoa.length,4); i++){
      const nonEmpty = aoa[i].filter(c=>String(c).trim()!=="").length;
      if(nonEmpty >= 3){ headerRowIdx = i; break; }
    }
    const headerRow = aoa[headerRowIdx].map(c=>String(c).trim());
    const columns = [];
    const seenNames = {};
    headerRow.forEach((h, idx)=>{
      if(h === "") return;
      let key = h;
      if(seenNames[h] !== undefined){
        seenNames[h]++;
        key = h + " (" + seenNames[h] + ")";
      } else {
        seenNames[h] = 1;
      }
      columns.push({key, colIdx: idx});
    });
    if(columns.length === 0) return;

    const rows = [];
    for(let r = headerRowIdx+1; r < aoa.length; r++){
      const raw = aoa[r];
      if(!raw || raw.every(c=>String(c).trim()==="")) continue;
      const rowObj = {};
      let hasAny = false;
      columns.forEach(col=>{
        const v = raw[col.colIdx] !== undefined ? String(raw[col.colIdx]).trim() : "";
        rowObj[col.key] = v;
        if(v !== "") hasAny = true;
      });
      if(hasAny) rows.push(rowObj);
    }

    const floor = { name: sheetName, columns: columns.map(c=>c.key), hiddenColumns:[], columnWidths:{}, rows };
    floor.filterColumns = detectFilterableColumns(floor).map(o=>o.col);
    floors.push(floor);
  });
  return floors;
}

/* ================= FILTER / SEARCH ================= */
function styleForValue(v){
  const s = String(v);
  if(/ШӘШіЩҲЫҢЩҮ|вң“/.test(s) && !/ШЁШҜЩҮЪ©Ш§Шұ|ШЁШҜЩҲЩҶ/.test(s)) return "tag tag-settled";
  if(/ШЁШҜЩҮЪ©Ш§Шұ|ШЁШҜЩҲЩҶ ЩҫШұШҜШ§Ш®ШӘЫҢ|ШЁШҜЩҮЫҢ/.test(s)) return "tag tag-debt";
  return "";
}
function matchesDateFilter(row){
  if(!dateFilter) return true;
  const num = parseFlexibleDate(row[dateFilter.col]);
  if(num === null) return false;
  if(dateFilter.from !== null && num < dateFilter.from) return false;
  if(dateFilter.to !== null && num > dateFilter.to) return false;
  return true;
}
function getFilteredRows(floor){
  let rows = floor.rows;
  Object.keys(activeFilters).forEach(col=>{ rows = rows.filter(r=>r[col] === activeFilters[col]); });
  if(searchText.trim()){
    const q = searchText.trim().toLowerCase();
    rows = rows.filter(r=> floor.columns.some(c=> String(r[c]||"").toLowerCase().includes(q)));
  }
  if(onlyUpdated) rows = rows.filter(r=> !!r.__updatedAt);
  if(dateFilter) rows = rows.filter(matchesDateFilter);
  if(rialFilter) rows = rows.filter(r=> getRialType(r, floor.columns) === rialFilter);
  if(expiryFilter && currentPasazhData && currentPasazhData.expirySettings.column){
    rows = rows.filter(r=> getExpiryStatus(r, currentPasazhData.expirySettings.column) === expiryFilter);
  }
  return rows;
}

function computeColumnBreakdown(floor, col){
  const counts = {};
  floor.rows.forEach(r=>{
    const raw = r[col];
    const v = (raw === undefined || raw === "") ? "Ш®Ш§Щ„ЫҢ" : String(raw);
    counts[v] = (counts[v]||0) + 1;
  });
  return Object.keys(counts).sort((a,b)=> counts[b]-counts[a]).map(v=>({value:v, count:counts[v]}));
}

function buildStatCardsHTML(floor){
  const updatedCount = floor.rows.filter(r=>r.__updatedAt).length;
  let html = `
    <div class="stat-card"><span class="num">${floor.rows.length}</span><span class="lbl">Ъ©Щ„ ЩҲШ§ШӯШҜЩҮШ§</span></div>
    <div class="stat-card updated"><span class="num">${updatedCount}</span><span class="lbl">ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢвҖҢШҙШҜЩҮ</span></div>`;
  const expiryCol = currentPasazhData.expirySettings.column;
  if(expiryCol && floor.columns.includes(expiryCol)){
    const expiredCount = floor.rows.filter(r=> getExpiryStatus(r, expiryCol) === "expired").length;
    const soonCount = floor.rows.filter(r=> getExpiryStatus(r, expiryCol) === "soon").length;
    html += `<div class="stat-card debt"><span class="num">${expiredCount}</span><span class="lbl">Щ…ЩҶЩӮШ¶ЫҢвҖҢШҙШҜЩҮ</span></div>`;
    html += `<div class="stat-card"><span class="num" style="color:#8a5a00;">${soonCount}</span><span class="lbl">ЩҶШІШҜЫҢЪ© Ш§ЩҶЩӮШ¶Ш§</span></div>`;
  }
  (floor.statColumns||[]).forEach(col=>{
    if(!floor.columns.includes(col)) return;
    const breakdown = computeColumnBreakdown(floor, col);
    html += `<div class="stat-group" data-col="${escapeHtml(col)}">
      <div class="stat-group-head"><span>${escapeHtml(col)}</span><button class="stat-remove" data-act="removestat" data-col="${escapeHtml(col)}" title="ШӯШ°ЩҒ Ш§ЫҢЩҶ ШўЩ…Ш§Шұ">вң•</button></div>
      <div class="stat-group-chips">${breakdown.map(b=>`<span class="stat-chip">${escapeHtml(b.value)}: <b>${b.count}</b></span>`).join("")}</div>
    </div>`;
  });
  html += `<button class="btn btn-outline small add-stat-btn" data-act="addstat">+ Ш§ЩҒШІЩҲШҜЩҶ ШўЩ…Ш§Шұ</button>`;
  return html;
}

let editingAllRowRef = null;
let flashAllRowRef = null;

function getAllRows(){
  const list = [];
  currentPasazhData.floors.forEach((f, fi)=> f.rows.forEach(r=> list.push({row:r, floorIdx:fi})));
  return list;
}
function getAllViewConfig(){
  currentPasazhData.allView = currentPasazhData.allView || {hiddenColumns:[], columnWidths:{}, filterColumns:[], statColumns:[], columnOrder:null};
  return currentPasazhData.allView;
}
function getUnionColumns(){
  const cfg = getAllViewConfig();
  const raw = [];
  currentPasazhData.floors.forEach(f=> f.columns.forEach(c=>{ if(!raw.includes(c)) raw.push(c); }));
  if(!cfg.columnOrder){
    cfg.columnOrder = [...raw];
  } else {
    const existing = cfg.columnOrder.filter(c=> raw.includes(c));
    const newOnes = raw.filter(c=> !existing.includes(c));
    cfg.columnOrder = [...existing, ...newOnes];
  }

  // first time only: auto-hide columns that belong to fewer than half the floors,
  // so the merged view doesn't start out cluttered with dozens of sparse columns.
  if(!cfg.autoHiddenApplied){
    const floorCount = currentPasazhData.floors.length;
    const presenceCount = {};
    raw.forEach(c=>{
      presenceCount[c] = currentPasazhData.floors.filter(f=> f.columns.includes(c)).length;
    });
    cfg.hiddenColumns = cfg.hiddenColumns || [];
    raw.forEach(c=>{
      if(presenceCount[c] < Math.ceil(floorCount/2) && !cfg.hiddenColumns.includes(c)){
        cfg.hiddenColumns.push(c);
      }
    });
    cfg.autoHiddenApplied = true;
  }

  return cfg.columnOrder;
}
function getFilteredAllEntries(){
  let entries = getAllRows();
  const unionCols = getUnionColumns();
  Object.keys(activeFilters).forEach(col=>{ entries = entries.filter(e=> e.row[col] === activeFilters[col]); });
  if(searchText.trim()){
    const q = searchText.trim().toLowerCase();
    entries = entries.filter(e=> currentPasazhData.floors[e.floorIdx].name.toLowerCase().includes(q) || unionCols.some(c=> String(e.row[c]||"").toLowerCase().includes(q)));
  }
  if(onlyUpdated) entries = entries.filter(e=> !!e.row.__updatedAt);
  if(dateFilter) entries = entries.filter(e=> matchesDateFilter(e.row));
  if(rialFilter) entries = entries.filter(e=> getRialType(e.row, currentPasazhData.floors[e.floorIdx].columns) === rialFilter);
  if(expiryFilter && currentPasazhData.expirySettings.column){
    entries = entries.filter(e=> getExpiryStatus(e.row, currentPasazhData.expirySettings.column) === expiryFilter);
  }
  return entries;
}

function buildAllStatCardsHTML(){
  const cfg = getAllViewConfig();
  const allRows = getAllRows().map(e=>e.row);
  const updatedCount = allRows.filter(r=>r.__updatedAt).length;
  let html = `

  const expiryCol = currentPasazhData.expirySettings.column;
  if(expiryCol){
    const expiredCount = allRows.filter(r=> getExpiryStatus(r, expiryCol) === "expired").length;
    const soonCount = allRows.filter(r=> getExpiryStatus(r, expiryCol) === "soon").length;
    html += `<div class="stat-card debt"><span class="num">${expiredCount}</span><span class="lbl">Щ…ЩҶЩӮШ¶ЫҢвҖҢШҙШҜЩҮ</span></div>`;
    html += `<div class="stat-card"><span class="num" style="color:#8a5a00;">${soonCount}</span><span class="lbl">ЩҶШІШҜЫҢЪ© Ш§ЩҶЩӮШ¶Ш§</span></div>`;
  }
  (cfg.statColumns||[]).forEach(col=>{
    const counts = {};
    allRows.forEach(r=>{
      const raw = r[col];
      const v = (raw===undefined || raw==="") ? "Ш®Ш§Щ„ЫҢ" : String(raw);
      counts[v] = (counts[v]||0)+1;
    });
    const breakdown = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).map(v=>({value:v, count:counts[v]}));
    html += `<div class="stat-group" data-col="${escapeHtml(col)}">
      <div class="stat-group-head"><span>${escapeHtml(col)}</span><button class="stat-remove" data-act="removestat" data-col="${escapeHtml(col)}" title="ШӯШ°ЩҒ Ш§ЫҢЩҶ ШўЩ…Ш§Шұ">вң•</button></div>
      <div class="stat-group-chips">${breakdown.map(b=>`<span class="stat-chip">${escapeHtml(b.value)}: <b>${b.count}</b></span>`).join("")}</div>
    </div>`;
  });
  html += `<button class="btn btn-outline small add-stat-btn" data-act="addstat">+ Ш§ЩҒШІЩҲШҜЩҶ ШўЩ…Ш§Шұ</button>`;
  return html;
}
function bindAllStatCardEvents(){

      cfg.statColumns = (cfg.statColumns||[]).filter(c=>c!==btn.dataset.col);

  };

  showAllColsBtn.className = "btn btn-outline small"; showAllColsBtn.textContent = "ЩҶЩ…Ш§ЫҢШҙ ЩҮЩ…ЩҮвҖҢЫҢ ШіШӘЩҲЩҶвҖҢЩҮШ§";
  showAllColsBtn.title = "ШЁШұШ§ЫҢ Ш¬Щ„ЩҲЪҜЫҢШұЫҢ Ш§ШІ ШҙЩ„ЩҲШәЫҢШҢ ШіШӘЩҲЩҶвҖҢЩҮШ§ЫҢ Ъ©Щ…вҖҢЪ©Ш§ШұШЁШұШҜ Ш§ЩҲЩ„Шҙ Ш®ЩҲШҜЪ©Ш§Шұ Щ…Ш®ЩҒЫҢ Щ…ЫҢвҖҢШҙЩҶШӣ ШЁШ§ Ш§ЫҢЩҶ ШҜЪ©Щ…ЩҮ ЩҮЩ…ЩҮвҖҢШҙЩҲЩҶ ШұЩҲ ЩҶШҙЩҲЩҶ ШЁШҜЩҮ";
  showAllColsBtn.addEventListener("click", ()=>{
    const cfg = getAllViewConfig();
    cfg.hiddenColumns = [];
    markDirty(); renderAllTableOnly();
    showToast("ЩҮЩ…ЩҮвҖҢЫҢ ШіШӘЩҲЩҶвҖҢЩҮШ§ ЩҶЩ…Ш§ЫҢШҙ ШҜШ§ШҜЩҮ ШҙШҜЩҶ", "ok");
  });
  toolbar2.appendChild(editColsBtn);
  toolbar2.appendChild(filterColsBtn);
  toolbar2.appendChild(addRowBtn);
  toolbar2.appendChild(showAllColsBtn);
  const convertDigitsBtn = document.createElement("button");
  convertDigitsBtn.className = "btn btn-outline small"; convertDigitsBtn.textContent = "рҹ”Ө Ш§Ш№ШҜШ§ШҜ ЩҒШ§ШұШіЫҢ вҶ’ Ш§ЩҶЪҜЩ„ЫҢШіЫҢ (Ъ©Щ„ ЩҫШ§ШіШ§Ъҳ)";
  convertDigitsBtn.addEventListener("click", convertDigitsAllFloors);
  toolbar2.appendChild(convertDigitsBtn);
  toolbar2.appendChild(clearMarksBtn);
  main.appendChild(toolbar2);

  const note = document.createElement("p");
  note.style.cssText = "font-size:12px;color:var(--slate-soft);margin:0 0 10px;";
  note.textContent = "ЩҮЩ…ЩҮвҖҢЫҢ Ш·ШЁЩӮШ§ШӘ Ш§ЫҢЩҶ ЩҫШ§ШіШ§Ъҳ ШЁШ§ ЩҮЩ…Шӣ ЩҲЫҢШұШ§ЫҢШҙ ЩҲ ШӯШ°ЩҒ Щ…ШіШӘЩӮЫҢЩ… ШұЩҲЫҢ Ш®ЩҲШҜ Ш·ШЁЩӮЩҮвҖҢЫҢ Ш§ШөЩ„ЫҢ Ш§Ш№Щ…Ш§Щ„ Щ…ЫҢвҖҢШҙЩҮ. ШіШӘЩҲЩҶвҖҢЩҮШ§ЫҢ Ъ©Щ…вҖҢЪ©Ш§ШұШЁШұШҜ Ш§ЩҲЩ„ Ш®ЩҲШҜЪ©Ш§Шұ Щ…Ш®ЩҒЫҢ ШҙШҜЩҶ вҖ” ШЁШ§ В«ЩҲЫҢШұШ§ЫҢШҙ ШіШӘЩҲЩҶвҖҢЩҮШ§В» ЫҢШ§ В«ЩҶЩ…Ш§ЫҢШҙ ЩҮЩ…ЩҮвҖҢЫҢ ШіШӘЩҲЩҶвҖҢЩҮШ§В» Щ…ЫҢвҖҢШӘЩҲЩҶЫҢ Ш№ЩҲШ¶Шҙ Ъ©ЩҶЫҢ.";
  main.appendChild(note);

  const tableWrap = document.createElement("div");
  tableWrap.className = "table-wrap"; tableWrap.id = "tableWrapAll";
  main.appendChild(tableWrap);

  renderAllTableOnly();
}

function renderAllTableOnly(){
  const cfg = getAllViewConfig();
  const unionCols = getUnionColumns();
  const visibleCols = unionCols.filter(c=> !(cfg.hiddenColumns||[]).includes(c));
  let entries = getFilteredAllEntries();

  const wrap = document.getElementById("tableWrapAll");
  const countEl = document.getElementById("resultCountAll");
  const totalAll = getAllRows().length;
  if(countEl) countEl.textContent = entries.length + " Ш§ШІ " + totalAll + " ЩҲШ§ШӯШҜ";

  const statCards = document.getElementById("statCardsAll");
  if(statCards){ statCards.innerHTML = buildAllStatCardsHTML(); bindAllStatCardEvents(); }

  const sKey = currentPasazhId + ":ALL";
  const sort = sortState[sKey];
  if(sort){
    entries = [...entries].sort((a,b)=>{
      const va = String(a.row[sort.col]||""), vb = String(b.row[sort.col]||"");
      const da = parseFlexibleDate(va), db = parseFlexibleDate(vb);
      const na = parseFloat(normalizeDigits(va).replace(/,/g,"")), nb = parseFloat(normalizeDigits(vb).replace(/,/g,""));
      let cmp;
      if(da !== null && db !== null){ cmp = da - db; }
      else if(!isNaN(na) && !isNaN(nb) && va.trim()!=="" && vb.trim()!==""){ cmp = na - nb; }
      else { cmp = va.localeCompare(vb, "fa"); }
      return sort.dir === "asc" ? cmp : -cmp;
    });
  }

  let html = "<table class='table-auto'><colgroup><col style='width:112px'><col style='width:110px'>";
  visibleCols.forEach(c=> html += `<col data-col-width="${escapeHtml(c)}" style="width:${(cfg.columnWidths&&cfg.columnWidths[c])||130}px">`);
  html += "</colgroup><thead><tr><th></th><th>Ш·ШЁЩӮЩҮ</th>";
  visibleCols.forEach(c=>{
    const arrow = sort && sort.col===c ? (sort.dir==="asc" ? " в–І" : " в–ј") : "";
    html += `<th class="col-th" data-col="${escapeHtml(c)}" title="Ъ©Щ„ЫҢЪ© ШЁШұШ§ЫҢ Щ…ШұШӘШЁвҖҢШіШ§ШІЫҢ">${escapeHtml(c)}${arrow}<span class="col-resize-handle"></span></th>`;
  });
  html += "</tr></thead><tbody>";

  if(entries.length === 0){
    html += `<tr><td colspan="${visibleCols.length+2}" style="text-align:center;color:var(--slate-soft);padding:30px;">Щ…ЩҲШұШҜЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ</td></tr>`;
  } else {
    entries.forEach((entry, i)=>{
      const floor = currentPasazhData.floors[entry.floorIdx];
      const r = entry.row;
      const isEditing = editingAllRowRef === r;
      const styleParts = [];
      if(!isEditing && r.__updatedAt) styleParts.push("background:var(--updated-bg);border-inline-start:3px solid var(--brass);");
      if(r.__rowHeight) styleParts.push(`height:${r.__rowHeight}px;`);
      const rowStyle = styleParts.length ? ` style="${styleParts.join(" ")}"` : "";
      html += `<tr data-entry-idx="${i}"${rowStyle}>`;
      if(isEditing){
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="Ш°Ш®ЫҢШұЩҮ">рҹ’ҫ</button>
            <button class="row-action cancel-btn" data-act="cancel" title="Ш§ЩҶШөШұШ§ЩҒ">вң•</button>
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      } else {
        html += `<td>
          <div class="row-actions-wrap">
            <button class="row-action edit-btn" data-act="edit" title="ЩҲЫҢШұШ§ЫҢШҙ">вңҺ</button>
            <button class="row-action del-btn" data-act="del" title="ШӯШ°ЩҒ ШұШҜЫҢЩҒ">рҹ—‘</button>
            <button class="row-action edit-btn" data-act="attach" title="ЩҫЫҢЩҲШіШӘвҖҢЩҮШ§${r.__attachments&&r.__attachments.length?' ('+r.__attachments.length+')':''}">рҹ“Һ</button>
            ${r.__updatedAt ? `<button class="row-action clear-btn" data-act="clearmark" title="ЩҫШ§Ъ©вҖҢЪ©ШұШҜЩҶ ШұЩҶЪҜ Ш§ЫҢЩҶ ШұШҜЫҢЩҒ">рҹ§№</button>` : ""}
          </div>
          <span class="row-resize-handle"></span>
        </td>`;
      }
      html += `<td><b>${escapeHtml(floor.name)}</b></td>`;
      visibleCols.forEach(c=>{
        const v = r[c] === undefined ? "" : r[c];
        if(isEditing){
          html += `<td><input type="text" class="cell-edit-input" data-col="${escapeHtml(c)}" value="${escapeHtml(v)}"></td>`;
        } else {
          const expiryCol = currentPasazhData.expirySettings.column;
          const expStatus = (expiryCol && c === expiryCol) ? getExpiryStatus(r, expiryCol) : null;
          const cls = expStatus === "expired" ? "tag tag-expired" : expStatus === "soon" ? "tag tag-expiring" : styleForValue(v);
          const clampStyle = r.__rowHeight ? ` style="max-height:${Math.max(16,r.__rowHeight-18)}px;"` : "";
          let inner = cls ? `<span class="${cls}">${escapeHtml(v)}</span>` : `<span class="cell-clamp"${clampStyle}>${escapeHtml(v)}</span>`;
          if(looksLikeDate(v)){
            inner += `<button class="date-plus-btn" data-act="plusyear" data-col="${escapeHtml(c)}" title="ЫҢЪ© ШіШ§Щ„ Ш§Ш¶Ш§ЩҒЩҮ Ъ©ЩҶ">+ЫұШіШ§Щ„</button>`;
          }
          inner += `<span class="fill-handle" title="ШЁЪ©Шҙ ЩҫШ§ЫҢЫҢЩҶ ШЁШұШ§ЫҢ Ъ©ЩҫЫҢ Ш§ЫҢЩҶ Щ…ЩӮШҜШ§Шұ ШұЩҲЫҢ ШұШҜЫҢЩҒвҖҢЩҮШ§ЫҢ ШЁШ№ШҜЫҢ"></span>`;
          html += `<td data-col="${escapeHtml(c)}" title="${escapeHtml(v)}">${inner}</td>`;
        }
      });
      html += "</tr>";
    });
  }
  html += "</tbody></table>";
  wrap.innerHTML = html;

  if(flashAllRowRef){
    entries.forEach((entry, i)=>{
      if(entry.row === flashAllRowRef){
        const tr = wrap.querySelector(`tr[data-entry-idx="${i}"]`);
        if(tr) tr.classList.add("flash-update");
      }
    });
    flashAllRowRef = null;
  }

  wrap.querySelectorAll(".cell-edit-input").forEach(inp=>{
    inp.addEventListener("keydown", (e)=>{
      const rowTr = inp.closest("tr");
      if(e.key === "Enter"){ e.preventDefault(); rowTr.querySelector('button[data-act="edit"]')?.click(); }
      else if(e.key === "Escape"){ e.preventDefault(); rowTr.querySelector('button[data-act="cancel"]')?.click(); }
    });
  });

  attachFillHandles(wrap, "tr[data-entry-idx]",
    (tr)=> entries[parseInt(tr.dataset.entryIdx, 10)].row,
    ()=> renderAllTableOnly());

  wrap.querySelectorAll("th.col-th").forEach(th=>{
    th.addEventListener("click", (e)=>{
      if(e.target.classList.contains("col-resize-handle")) return;
      const col = th.dataset.col;
      const cur = sortState[sKey];
      if(cur && cur.col === col) sortState[sKey] = cur.dir === "asc" ? {col, dir:"desc"} : null;
      else sortState[sKey] = {col, dir:"asc"};
      renderAllTableOnly();
    });
  });

  wrap.querySelectorAll("th.col-th").forEach(th=>{
    const handle = th.querySelector(".col-resize-handle");
    const col = th.dataset.col;
    handle.addEventListener("click", (e)=> e.stopPropagation());
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const startX = e.clientX;
      cfg.columnWidths = cfg.columnWidths || {};
      const startWidth = cfg.columnWidths[col] || th.offsetWidth;
      const colEl = wrap.querySelector(`col[data-col-width="${CSS.escape(col)}"]`);
      function onMove(ev){
        const delta = ev.clientX - startX;
        const newWidth = Math.max(50, Math.round(startWidth + delta));
        if(colEl) colEl.style.width = newWidth + "px";
        cfg.columnWidths[col] = newWidth;
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  wrap.querySelectorAll(".row-resize-handle").forEach(handle=>{
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      handle.classList.add("active");
      const tr = handle.closest("tr[data-entry-idx]");
      const idx = parseInt(tr.dataset.entryIdx, 10);
      const r = entries[idx].row;
      const startY = e.clientY;
      const startHeight = tr.offsetHeight;
      function onMove(ev){
        const delta = ev.clientY - startY;
        const newHeight = Math.max(32, Math.round(startHeight + delta));
        tr.style.height = newHeight + "px";
        r.__rowHeight = newHeight;
        tr.querySelectorAll(".cell-clamp").forEach(el=> el.style.maxHeight = Math.max(16,newHeight-18)+"px");
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("active");
        markDirty();
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });

  wrap.onclick = (e)=>{
    const actBtn = e.target.closest("[data-act]");
    if(actBtn){
      const tr = actBtn.closest("tr[data-entry-idx]");
      const idx = parseInt(tr.dataset.entryIdx, 10);
      const entry = entries[idx];
      const floor = currentPasazhData.floors[entry.floorIdx];
      const r = entry.row;
      const act = actBtn.dataset.act;

      if(act === "edit"){
        if(editingAllRowRef === r){
          const inputs = tr.querySelectorAll(".cell-edit-input");
          inputs.forEach(inp=>{ r[inp.dataset.col] = inp.value; });
          r.__updatedAt = new Date().toISOString();
          editingAllRowRef = null;
          markDirty();
          flashAllRowRef = r;
        } else {
          editingAllRowRef = r;
        }
        renderAllTableOnly();
      } else if(act === "cancel"){
        editingAllRowRef = null;
        renderAllTableOnly();
      } else if(act === "del"){
        if(confirm(`Ш§ЫҢЩҶ ШұШҜЫҢЩҒ (Ш·ШЁЩӮЩҮ В«${floor.name}В») ШӯШ°ЩҒ ШЁШҙЩҮШҹ`)){
          const realIdx = floor.rows.indexOf(r);
          if(realIdx >= 0) floor.rows.splice(realIdx, 1);
          markDirty(); renderFloorRail(); renderAllTableOnly();
        }
      } else if(act === "plusyear"){
        const col = actBtn.dataset.col;
        r[col] = bumpYear(r[col]);
        r.__updatedAt = new Date().toISOString();
        markDirty(); flashAllRowRef = r; renderAllTableOnly();
      } else if(act === "clearmark"){
        delete r.__updatedAt;
        markDirty(); renderAllTableOnly();
      } else if(act === "attach"){
        openAttachmentsModal(r, ()=> renderAllTableOnly());
      }
      return;
    }

    const zoomTd = e.target.closest("td[data-col]");
    if(zoomTd){
      const col = zoomTd.dataset.col;
      const tr = zoomTd.closest("tr[data-entry-idx]");
      const idx = parseInt(tr.dataset.entryIdx, 10);
      const r = entries[idx].row;
      openCellZoomModal(col, r[col] || "", (val)=>{
        r[col] = val;
        r.__updatedAt = new Date().toISOString();
        markDirty();
        flashAllRowRef = r;
        renderAllTableOnly();
      });
    }
  };
}

/* ================= RENDER: main area ================= */
function renderMain(){
  const main = document.getElementById("mainArea");
  main.innerHTML = "";

  if(!currentPasazhData){
    main.innerHTML = `
      <div class="empty-state">
        <h2>ЩҮЩҶЩҲШІ Ш§Ш·Щ„Ш§Ш№Ш§ШӘЫҢ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҶШҙШҜЩҮ</h2>
        <p>
          Ш§ЫҢЩҶ ШөЩҒШӯЩҮ Ъ©Ш§Щ…Щ„Ш§ЩӢ ШўЩҒЩ„Ш§ЫҢЩҶ Ш§ШіШӘ ЩҲ ЩҮЫҢЪҶ Ш§ШӘШөШ§Щ„ЫҢ ШЁЩҮ ШіШұЩҲЫҢШі Ш§ШЁШұЫҢ ЩҶШҜШ§ШұЩҮШӣ Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ШұЩҲЫҢ ЩҮЩ…ЫҢЩҶ ШіЫҢШіШӘЩ… (Щ…ШұЩҲШұЪҜШұ) Ш°Ш®ЫҢШұЩҮ Щ…ЫҢвҖҢЩ…ЩҲЩҶЩҮ.<br>
          Ш§ЪҜШұ ЩӮШЁЩ„Ш§ЩӢ ЩҒШ§ЫҢЩ„ Щ…ШҙШӘШұЪ© (JSON) ШұЩҲ Ш§ШІ ЩҒШ§ЫҢЩ„вҖҢШіШұЩҲШұ ШҜШ§ШұЫҢШҜШҢ Ш§ЩҲЩ„ Ш§ЩҲЩҶ ШұЩҲ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Ъ©ЩҶЫҢШҜ.<br>
          Ш§ЪҜШұ Ш§ЩҲЩ„ЫҢЩҶ ШЁШ§Шұ Ш§ШіШӘШҢ ЫҢЪ© ЩҒШ§ЫҢЩ„ Ш§Ъ©ШіЩ„ ЩҫШ§ШіШ§Ъҳ ШұЩҲ Щ…ШіШӘЩӮЫҢЩ… ЩҲШ§ШұШҜ Ъ©ЩҶЫҢШҜ.
        </p>
        <button class="btn btn-outline" onclick="document.getElementById('jsonFileInput').click()" style="margin-inline-end:8px;">ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҒШ§ЫҢЩ„ Щ…ШҙШӘШұЪ©</button>
        <button class="btn btn-brass" onclick="document.getElementById('importExcelBtn').click()">ЩҲШ§ШұШҜ Ъ©ШұШҜЩҶ Ш§Ъ©ШіЩ„</button>
      </div>`;
    return;
  }

  if(currentFloorIdx === "ALL"){
    renderAllFloorsView(main);
    return;
  }

  const floor = currentPasazhData.floors[currentFloorIdx];
  if(!floor){ main.innerHTML = '<div class="empty-state"><p>Ш·ШЁЩӮЩҮвҖҢШ§ЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</p></div>'; return; }

  // ---- Stat cards ----
  const statsRow = document.createElement("div");
  statsRow.className = "stat-cards";
  statsRow.id = "statCards";
  statsRow.innerHTML = buildStatCardsHTML(floor);
  main.appendChild(statsRow);
  bindStatCardEvents();

  const toolbar = document.createElement("div");

  searchInput.value = searchText;
  searchInput.addEventListener("input", (e)=>{ searchText = e.target.value; renderTableOnly(); });

  (floor.filterColumns||[]).forEach(col=>{

    sel.addEventListener("change", (e)=>{
      if(e.target.value) activeFilters[col] = e.target.value; else delete activeFilters[col];
      renderTableOnly();
    });
    toolbar.appendChild(sel);
  });

    openDateFilterModal(dateCols, dateFilter,
      (f)=>{ dateFilter = f; sortState[sortKey()] = {col:f.col, dir:"asc"}; renderTableOnly(); },

  const rialSelect = document.createElement("select");
